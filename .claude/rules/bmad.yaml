BMAD strategic documents are the project's source of truth for product
direction, architecture decisions, and requirement traceability.
When modifying these files:
1. NEVER remove existing content without explicit user approval
2. ADD new sections for new work — do not replace existing sections
3. Move completed items to "Completed" sections rather than deleting
4. Update the "Last Reconciled" date in architecture.md when making changes
5. Ensure traceability.md stays in sync with openspec/capabilities/*/spec.md
