# Carnot Research Roadmap — Milestone 2026.04.15
# "Semantic Grounding: Typed Constraints, Live Benchmarks, Self-Learning"
#
# CONTEXT: 2026.04.14 proved that live instruction-tuned failures are mostly
# semantic/question-grounding errors, not arithmetic normalization failures.
# The next milestone makes those outputs monitorable, builds semantic and
# property-based verifiers, validates them live on the two target small models,
# and turns the resulting traces into continuous self-learning inputs.

milestone: "2026.04.15"
milestone_title: "Semantic Grounding: Typed Constraints, Live Benchmarks, Self-Learning"
milestone_doc: "openspec/change-proposals/research-roadmap-vNEXT.md"

tasks:
  # ── Phase 65: Make Instruction-Tuned Outputs Monitorable ────
  - id: exp211-constraint-ir-benchmark
    milestone: "2026.04.15"
    deliverable: data/research/constraint_ir_benchmark_211.jsonl
    title: "Exp 211: Instruction-to-constraint IR benchmark for live IT models"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.
      Use {date} as the run date for any artifacts or metadata you create.

      CONTEXT: Exp 203, Exp 206, and Exp 207 showed that live wrong answers on
      Gemma4-E4B-it are mostly semantic/question-grounding failures. Before
      building another verifier, Carnot needs a benchmark that defines what
      structured constraints and claims should be extracted from instruction-
      tuned outputs in the first place.

      EXISTING CODE TO READ FIRST:
      - research-program.md — current priorities and the "Continuous Self-Learning" section
      - results/experiment_203_results.json — live extraction autopsy
      - results/experiment_206_results.json — Z3 live benchmark
      - results/experiment_207_results.json — LLM extractor live benchmark
      - research-references.md — newly added 2026.04.15 planning references

      TASK: Create data/research/constraint_ir_benchmark_211.jsonl

      CONCRETE STEPS:
      1. Create a curated benchmark of 80-120 examples covering:
         - live GSM8K semantic failures from Exp 203/206/207
         - multi-constraint instruction-following prompts inspired by VIFBench / ConstraintBench / CFBench
         - code prompts where requirements can be represented as typed properties
      2. For each example, record:
         - prompt
         - gold atomic constraints
         - constraint types
         - expected verifier path
         - expected answer schema
         - whether free-form reasoning should be considered monitorable
      3. Include a mix of literal constraints, compositional constraints, and semantic/question-grounding constraints.
      4. Create scripts/experiment_211_constraint_ir_benchmark.py to generate the dataset and write a summary report to results/experiment_211_results.json.
      5. Keep the schema simple enough for later typed parsing and structured decoding experiments.
      6. Run: .venv/bin/python scripts/experiment_211_constraint_ir_benchmark.py
      7. Do NOT push. Do NOT modify scripts/research_conductor.py.

  - id: exp213-monitorability-audit
    milestone: "2026.04.15"
    deliverable: results/experiment_213_results.json
    title: "Exp 213: Chain-of-thought monitorability audit and fallback policy"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.
      Use {date} as the run date for any artifacts or metadata you create.

      CONTEXT: Carnot cannot assume chain-of-thought is a faithful verifier
      input. Recent monitoring papers and Exp 203/206/207 both suggest that
      free-form reasoning can hide the real failure mode. This experiment
      measures when free-form traces are useful, when structured traces are
      better, and when Carnot should skip reasoning text entirely.

      EXISTING CODE TO READ FIRST:
      - data/research/constraint_ir_benchmark_211.jsonl — benchmark from Exp 211
      - results/experiment_203_results.json — live failure examples
      - results/experiment_208_results.json — live code benchmark
      - python/carnot/inference/model_loader.py — live model loading
      - research-references.md — monitorability references

      TASK: Create results/experiment_213_results.json

      CONCRETE STEPS:
      1. Evaluate Qwen3.5-0.8B and google/gemma-4-E4B-it on a representative subset of Exp 211 in three response modes:
         - free-form reasoning
         - answer-only / terse output
         - structured JSON / typed reasoning scaffold
      2. Measure:
         - parseability
         - constraint coverage
         - semantic visibility of the true error
         - answer quality
         - token cost / latency
      3. Define a fallback policy stating when Carnot should:
         - request structured reasoning
         - accept terse output
         - distrust free-form traces
      4. Save the policy as results/monitorability_policy_213.json and summarize the findings in results/experiment_213_results.json.
      5. Create scripts/experiment_213_monitorability_audit.py if needed to run the evaluation.
      6. Run: CARNOT_FORCE_LIVE=1 .venv/bin/python scripts/experiment_213_monitorability_audit.py
      7. Do NOT push. Do NOT modify scripts/research_conductor.py.

  - id: exp212-typed-reasoning-ir
    milestone: "2026.04.15"
    deliverable: python/carnot/pipeline/typed_reasoning.py
    title: "Exp 212: Typed reasoning IR and dual-path extraction"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.
      Use {date} as the run date for any artifacts or metadata you create.

      CONTEXT: After Exp 211 defines the benchmark and Exp 213 defines the
      monitorability policy, Carnot needs an intermediate representation that
      can hold constraints, claims, reasoning steps, and final answers in a
      verifier-friendly form.

      EXISTING CODE TO READ FIRST:
      - python/carnot/pipeline/extract.py — current extractor interfaces
      - python/carnot/pipeline/verify_repair.py — pipeline integration points
      - data/research/constraint_ir_benchmark_211.jsonl — benchmark contract
      - results/experiment_213_results.json — monitorability findings

      TASK: Create python/carnot/pipeline/typed_reasoning.py

      CONCRETE STEPS:
      1. Implement a typed reasoning IR that can represent:
         - user constraints
         - reasoning steps
         - atomic claims
         - final answers
         - provenance / extraction method
      2. Support a dual-path extractor:
         - parse direct structured JSON when the model emits it
         - fall back to post-hoc parsing for plain-text outputs
      3. Add validation and serialization helpers so later verifiers can consume this IR deterministically.
      4. Wire the new IR into the pipeline in a backward-compatible way without breaking existing extractors.
      5. Add tests for both direct-JSON and fallback parsing paths.
      6. Run: .venv/bin/pytest tests/python -q
      7. Do NOT push. Do NOT modify scripts/research_conductor.py.

  # ── Phase 66: Build Semantic and Property-Based Verifiers ───
  - id: exp214-semantic-failure-corpus
    milestone: "2026.04.15"
    deliverable: data/research/semantic_failure_corpus_214.jsonl
    title: "Exp 214: Semantic failure corpus from live verifier traces"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.
      Use {date} as the run date for any artifacts or metadata you create.

      CONTEXT: Exp 203, Exp 206, and Exp 207 showed that Carnot's live blind
      spot is semantic/question-grounding error, not arithmetic formatting.
      This experiment creates the labeled corpus needed to test a semantic
      verifier instead of guessing at the failure taxonomy.

      EXISTING CODE TO READ FIRST:
      - results/experiment_203_results.json — autopsy examples
      - results/experiment_206_results.json — shared live GSM8K cohort
      - results/experiment_207_results.json — paired LLM-vs-Z3 cohort
      - results/experiment_208_results.json — code-path live failures
      - ops/conductor-log.md — recent experiment provenance

      TASK: Create data/research/semantic_failure_corpus_214.jsonl

      CONCRETE STEPS:
      1. Build a labeled corpus of at least 60 high-quality failure cases from live traces and targeted follow-up prompts.
      2. Use a taxonomy that separates:
         - question-grounding failures
         - omitted premises
         - entity / quantity binding errors
         - unit / aggregation errors
         - genuine arithmetic slips
         - code-specific oracle/property misses
      3. For each example, include the prompt, response, gold diagnosis, expected verifier signal, and whether structured reasoning would have helped.
      4. Create scripts/experiment_214_semantic_failure_corpus.py to generate the corpus and write a summary to results/experiment_214_results.json.
      5. Keep the file format easy to turn into unit tests for later verifier work.
      6. Run: .venv/bin/python scripts/experiment_214_semantic_failure_corpus.py
      7. Do NOT push. Do NOT modify scripts/research_conductor.py.

  - id: exp215-semantic-grounding-verifier
    milestone: "2026.04.15"
    deliverable: python/carnot/pipeline/semantic_grounding.py
    title: "Exp 215: Semantic grounding verifier for question-aligned claims"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.
      Use {date} as the run date for any artifacts or metadata you create.

      CONTEXT: The next verifier must catch cases where the model solves the
      wrong problem correctly. Carnot needs a question-grounding and semantic
      claim verifier, not another arithmetic parser.

      EXISTING CODE TO READ FIRST:
      - python/carnot/pipeline/typed_reasoning.py — typed IR from Exp 212
      - data/research/semantic_failure_corpus_214.jsonl — labeled failure corpus
      - python/carnot/pipeline/verify_repair.py — pipeline integration
      - research-references.md — MARCH / BEAVER notes

      TASK: Create python/carnot/pipeline/semantic_grounding.py

      CONCRETE STEPS:
      1. Implement a verifier that:
         - decomposes responses into atomic claims
         - aligns claims to question entities, quantities, and required outputs
         - detects missing or unsupported claims
         - returns structured violation objects compatible with VerifyRepairPipeline
      2. Make the first layer deterministic where possible: entity coverage, quantity coverage, answer-target mismatch, unsupported references.
      3. Add an optional refinement path for ambiguous cases, but do not require hidden chain-of-thought to get value.
      4. Add tests grounded in Exp 214's corpus and verify that obvious semantic failures are now caught.
      5. Keep false positives low enough that the verifier is usable in live repair loops.
      6. Run: .venv/bin/pytest tests/python -q
      7. Do NOT push. Do NOT modify scripts/research_conductor.py.

