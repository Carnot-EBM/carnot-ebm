  # ── Phase 48: Live GPU Inference Validation ──────────────────
  - id: exp180-gpu-inference-baseline
    milestone: "2026.04.13"
    deliverable: results/experiment_180_results.json
    title: "Exp 180: GPU inference baseline — Qwen3.5 + Gemma4 on RTX 3090"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: Two NVIDIA RTX 3090s (48GB total VRAM) are now available via CUDA.
      PyTorch 2.11.0+cu126 and JAX CUDA are installed. This experiment establishes
      baseline inference speed and validates live model loading on GPU.

      EXISTING CODE TO READ FIRST:
      - python/carnot/inference/model_loader.py — robust model loading
      - scripts/experiment_91_gsm8k_live.py — GSM8K benchmark (was simulated)
      - research-hardware-wishlist.md — hardware details

      TASK: Create results/experiment_180_results.json by running:

      CONCRETE STEPS:
      1. Load Qwen3.5-0.8B on GPU 0 — measure load time and VRAM usage
      2. Load Gemma4-E4B-it on GPU 1 — measure load time and VRAM usage
      3. Benchmark inference on 50 questions per model:
         - Tokens/second, latency per generation (p50, p95)
         - Compare: GPU vs CPU inference speed
      4. Test: both models loaded simultaneously (one per GPU)
      5. Save results with load times, VRAM, throughput, latency
      6. Run: .venv/bin/python scripts/experiment_180_gpu_baseline.py
      7. Do NOT push. Do NOT modify scripts/research_conductor.py.

  - id: exp181-gsm8k-live-gpu
    milestone: "2026.04.13"
    deliverable: results/experiment_181_results.json
    title: "Exp 181: GSM8K full 1319 with LIVE GPU inference — publishable"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: RTX 3090 GPUs are available. Previous GSM8K experiments used
      simulated inference. This is the DEFINITIVE run with real model outputs.

      EXISTING CODE TO READ FIRST:
      - scripts/experiment_161_gsm8k_full.py — previous attempt (simulated)
      - results/experiment_180_results.json — GPU baseline (Exp 180)
      - python/carnot/inference/model_loader.py — model loading
      - python/carnot/pipeline/verify_repair.py — VerifyRepairPipeline

      TASK: Create results/experiment_181_results.json

      CONCRETE STEPS:
      1. Load Qwen3.5-0.8B on GPU, set CARNOT_FORCE_LIVE=1
      2. Run full 1,319 GSM8K test questions through 3 modes:
         a. Baseline (LLM only)
         b. Verify-only
         c. Verify-repair (max 3 iterations)
      3. Report with 95% bootstrap confidence intervals
      4. Compare to published Qwen3.5-0.8B GSM8K baselines
      5. Repeat with Gemma4-E4B-it on GPU 1
      6. Save comprehensive results with CIs
      7. Run: CARNOT_FORCE_LIVE=1 .venv/bin/python scripts/experiment_181_gsm8k_live_gpu.py
      8. Do NOT push. Do NOT modify scripts/research_conductor.py.

