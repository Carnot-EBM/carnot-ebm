  - id: exp96-intermediate-result-extractor
    milestone: "2026.04.6"
    deliverable: python/carnot/pipeline/extract.py
    title: "Exp 96: Intermediate result constraint extractor"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: Exp 88 (failure-driven constraint mining) revealed a 93% false
      negative rate on the verify-repair pipeline. The #1 gap category is
      `intermediate_result` — arithmetic chains where the final answer depends on
      intermediate computations (e.g., "first compute 3×5=15, then add 7 to get 22").
      The existing ArithmeticExtractor only catches simple "X + Y = Z" patterns.
      An intermediate result extractor would catch an estimated 44.8% of current
      false negatives according to Exp 88's analysis.

      Target models: Qwen3.5-0.8B, google/gemma-4-E4B-it

      EXISTING CODE TO READ FIRST:
      - python/carnot/pipeline/extract.py — ArithmeticExtractor, AutoExtractor, ConstraintExtractor Protocol
      - python/carnot/pipeline/mining.py — FailureAnalyzer, gap categories from Exp 88
      - scripts/experiment_88_failure_mining.py — the false negative analysis
      - results/experiment_88_results.json — specific failure examples (if exists)
      - python/carnot/verify/constraint.py — ComposedEnergy, ConstraintTerm

      TASK: Add IntermediateResultExtractor to python/carnot/pipeline/extract.py

      CONCRETE STEPS:
      1. Add IntermediateResultExtractor class implementing ConstraintExtractor Protocol:
         a. Pattern detection for multi-step arithmetic chains:
            - "first/then/next/so/therefore/thus/which gives/this means" + number
            - "step 1: ... step 2: ..." patterns
            - "X op Y = Z, then Z op W = V" sequential computation chains
            - Numbered list items with arithmetic in each
         b. For each detected chain, extract ALL intermediate results as separate
            constraints (not just the final answer)
         c. Chain verification: verify each intermediate step independently
            AND verify that step K's result is used correctly in step K+1
         d. Return list of ConstraintResult objects, one per intermediate step

      2. Register IntermediateResultExtractor in AutoExtractor:
         a. Add to the default extractor list
         b. Auto-detect: trigger when response contains sequential computation
            indicators ("first", "then", "step", numbered lists with math)

      3. Create tests/python/test_intermediate_extractor.py:
         a. Test simple chains: "3×5=15, then 15+7=22"
         b. Test complex chains: 4+ step computations
         c. Test incorrect intermediate: "3×5=16, then 16+7=23" (should catch 15≠16)
         d. Test no false positives on non-chain text
         e. Test integration with AutoExtractor
         f. Every test references REQ-VERIFY-001 or SCENARIO-VERIFY-002

      4. Run the extractor on Exp 88's false negative examples:
         a. Load or recreate the 134 false negatives from Exp 88
         b. Run IntermediateResultExtractor on each
         c. Report: how many would now be caught? (target: 44.8% = ~60 of 134)

      5. Save results to {project_root}/results/experiment_96_results.json

      6. Run: JAX_PLATFORMS=cpu .venv/bin/pytest tests/python/test_intermediate_extractor.py -q
      7. Run: JAX_PLATFORMS=cpu .venv/bin/pytest tests/python -q
      8. Do NOT push. Do NOT modify scripts/research_conductor.py.

  - id: exp97-comparison-extractor
    milestone: "2026.04.6"
    deliverable: python/carnot/pipeline/extract.py
    title: "Exp 97: Comparison constraint extractor"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: Exp 88 identified `comparison` as the second-highest gap category
      (40 instances). These are claims like "X is greater than Y", "A has more
      than B", "temperature increased from X to Y". The current extractors don't
      handle inequality/comparison relationships at all. This is a straightforward
      pattern-matching addition.

      Target models: Qwen3.5-0.8B, google/gemma-4-E4B-it

      EXISTING CODE TO READ FIRST:
      - python/carnot/pipeline/extract.py — existing extractors, ConstraintExtractor Protocol
      - python/carnot/pipeline/mining.py — FailureAnalyzer gap categories
      - python/carnot/verify/constraint.py — ComposedEnergy, ConstraintTerm

      TASK: Add ComparisonExtractor to python/carnot/pipeline/extract.py

      CONCRETE STEPS:
      1. Add ComparisonExtractor class implementing ConstraintExtractor Protocol:
         a. Pattern detection for comparison claims:
            - "X is greater/less/more/fewer/higher/lower/bigger/smaller than Y"
            - "X > Y", "X < Y", "X >= Y", "X <= Y" (symbolic comparisons)
            - "X increased/decreased from A to B" (implies A < B or A > B)
            - "X is the largest/smallest/highest/lowest" (superlative claims)
            - "X has more/fewer N than Y" (quantified comparisons)
         b. Extract: left value, operator, right value
         c. If both values are numeric: verify the comparison directly
         d. If values are non-numeric: create constraint term but mark as
            "structural" (comparison claimed but not numerically verifiable)
         e. Encode verifiable comparisons as energy terms:
            - Energy = 0 if comparison is satisfied
            - Energy = |left - right| if comparison is violated
            - Use a BoundConstraint wrapper from carnot.verify

      2. Register ComparisonExtractor in AutoExtractor:
         a. Add to the default extractor list
         b. Auto-detect: trigger when response contains comparison language

      3. Create tests/python/test_comparison_extractor.py:
         a. Test numeric comparisons: "15 is greater than 10" → verified
         b. Test violated comparisons: "5 is greater than 10" → violation
         c. Test directional: "increased from 10 to 20" → verified
         d. Test superlatives: "highest value is 42" (structural constraint)
         e. Test no false positives on non-comparison text
         f. Every test references REQ-VERIFY-001 or SCENARIO-VERIFY-002

      4. Run on Exp 88 false negatives to measure catch rate

      5. Save results to {project_root}/results/experiment_97_results.json

      6. Run: JAX_PLATFORMS=cpu .venv/bin/pytest tests/python/test_comparison_extractor.py -q
      7. Run: JAX_PLATFORMS=cpu .venv/bin/pytest tests/python -q
      8. Do NOT push. Do NOT modify scripts/research_conductor.py.

  - id: exp98-factual-kb-extractor
    milestone: "2026.04.6"
    deliverable: python/carnot/pipeline/knowledge_base.py
    title: "Exp 98: Knowledge-base factual claim verifier"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: The "definitive finding" from 94 experiments is: you cannot detect
      factual hallucination without access to factual knowledge. No internal signal
      — activations, logit lens, NLI, confidence — can distinguish "Neil Armstrong
      walked on Mars" from "Neil Armstrong walked on the Moon." This experiment
      creates a knowledge-base-backed factual claim verifier that checks claims
      against a curated set of common facts. Exp 88 showed `world_knowledge` as a
      gap category (8 instances directly, but factual domain has ~0% coverage).

      Target models: Qwen3.5-0.8B, google/gemma-4-E4B-it

      EXISTING CODE TO READ FIRST:
      - python/carnot/pipeline/extract.py — NLExtractor (current pattern-based NL extractor)
      - python/carnot/pipeline/mining.py — world_knowledge gap category
      - python/carnot/verify/constraint.py — ConstraintTerm

      TASK: Create python/carnot/pipeline/knowledge_base.py + FactualKBExtractor

      CONCRETE STEPS:
      1. Create python/carnot/pipeline/knowledge_base.py:
         a. KnowledgeBase class:
            - __init__(facts_path: str | None = None) — loads from JSON file
            - lookup(entity: str, relation: str) -> str | None — returns value or None
            - verify_claim(entity: str, relation: str, claimed_value: str) -> VerifyResult
              where VerifyResult = "verified" | "contradicted" | "unknown"
            - Built-in default: 1000 common facts as embedded dict (no external file needed):
              * 200 country capitals ("France" → "capital" → "Paris")
              * 100 populations (approximate, with tolerance range)
              * 100 historical dates ("Moon landing" → "year" → "1969")
              * 100 scientific constants ("speed of light" → "value" → "299792458 m/s")
              * 100 geographic facts ("longest river" → "name" → "Nile")
              * 200 person facts ("Albert Einstein" → "birth_year" → "1879")
              * 200 miscellaneous (element symbols, planet order, etc.)

      2. Add FactualKBExtractor to python/carnot/pipeline/extract.py:
         a. Implements ConstraintExtractor Protocol
         b. Claim extraction: detect entity-relation-value patterns in text:
            - "X is the capital of Y" → (Y, capital, X)
            - "X was born in Y" → (X, birth_year, Y)
            - "The population of X is Y" → (X, population, Y)
            - "X discovered/invented Y in Z" → (X, invention_year, Z)
            - Simple subject-verb-object patterns with named entities
         c. For each extracted claim, look up in KnowledgeBase:
            - verified → energy = 0.0, constraint satisfied
            - contradicted → energy = 1.0, constraint violated (include correct value)
            - unknown → skip (do NOT hallucinate verification!)
         d. Return ConstraintResult with claim text, lookup result, energy

      3. Register FactualKBExtractor in AutoExtractor

      4. Create tests/python/test_factual_kb.py:
         a. Test KnowledgeBase lookup for known facts
         b. Test claim extraction from various sentence patterns
         c. Test verified claims: "Paris is the capital of France"
         d. Test contradicted claims: "Berlin is the capital of France"
         e. Test unknown claims: "Zorgon is the capital of Blargonia"
         f. Test integration with AutoExtractor and VerifyRepairPipeline
         g. Every test references REQ-VERIFY-001 or SCENARIO-VERIFY-002

      5. Create scripts/experiment_98_factual_kb.py:
         a. Generate 100 factual questions (50 with correct facts, 50 with false facts)
         b. Run through VerifyRepairPipeline with FactualKBExtractor
         c. Measure: precision, recall, false positive rate
         d. Breakdown: which fact categories are best/worst covered?
         e. Measure: KB hit rate (what fraction of claims match a KB entry?)

      6. Save results to {project_root}/results/experiment_98_results.json

      7. Run: JAX_PLATFORMS=cpu .venv/bin/pytest tests/python/test_factual_kb.py -q
      8. Run: JAX_PLATFORMS=cpu .venv/bin/pytest tests/python -q
      9. Run: JAX_PLATFORMS=cpu .venv/bin/python scripts/experiment_98_factual_kb.py
      10. Do NOT push. Do NOT modify scripts/research_conductor.py.

  # ── Phase 22: Multi-Turn Agentic Verification ───────────────────
  - id: exp99-constraint-state-propagation
    milestone: "2026.04.6"
    deliverable: python/carnot/pipeline/agentic.py
    title: "Exp 99: Constraint state propagation across agent steps"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: Currently verification is single-turn: one question, one answer,
      one verify call. Real AI agents execute multi-step workflows where each step's
      output becomes the next step's input. A constraint violation in step 2 may
      invalidate steps 3-5. This experiment builds the core primitive for multi-turn
      agentic verification: a ConstraintState that accumulates verified facts across
      turns and propagates constraints between steps.

      This is research-program.md Goal #2 (BIGGEST UNTAPPED OPPORTUNITY) — no one
      else is building constraint propagation across agent reasoning chains.

      Target models: Qwen3.5-0.8B, google/gemma-4-E4B-it

      EXISTING CODE TO READ FIRST:
      - python/carnot/pipeline/verify_repair.py — VerifyRepairPipeline, VerificationResult
      - python/carnot/pipeline/extract.py — AutoExtractor, ConstraintResult
      - python/carnot/verify/constraint.py — ComposedEnergy, ConstraintTerm
      - scripts/experiment_92_math_benchmark.py — step-level verification (precursor)

      TASK: Create python/carnot/pipeline/agentic.py

      CONCRETE STEPS:
      1. Create python/carnot/pipeline/agentic.py with these classes:

         a. FactStatus enum: VERIFIED, ASSUMED, VIOLATED

         b. TrackedFact dataclass:
            - fact: str (the claim text)
            - status: FactStatus
            - introduced_at_step: int
            - verified_at_step: int | None
            - energy: float
            - constraint: ConstraintResult | None

         c. ConstraintState class:
            - facts: dict[str, TrackedFact] (keyed by normalized claim text)
            - add_fact(fact, step_index, status) -> None
            - verify_fact(fact_key, step_index, energy) -> None
            - get_verified() -> list[TrackedFact]
            - get_assumed() -> list[TrackedFact]
            - get_violated() -> list[TrackedFact]
            - get_all_constraints() -> list[ConstraintResult]
            - snapshot() -> dict (serializable state for logging)

         d. AgentStep dataclass:
            - step_index: int
            - input_text: str
            - output_text: str
            - constraints: list[ConstraintResult]
            - verification: VerificationResult | None
            - state_before: ConstraintState (snapshot)
            - state_after: ConstraintState (snapshot)

         e. propagate(state: ConstraintState, step: AgentStep,
                      pipeline: VerifyRepairPipeline) -> ConstraintState:
            - Extract constraints from step.output_text via pipeline
            - Verify all constraints (both new and accumulated from prior steps)
            - Update state: new facts as ASSUMED, verified facts as VERIFIED,
              violated constraints as VIOLATED
            - Return updated state

      2. Create tests/python/test_agentic.py:
         a. Test ConstraintState accumulation across 3 steps
         b. Test fact status transitions: ASSUMED → VERIFIED, ASSUMED → VIOLATED
         c. Test propagate() with mock pipeline results
         d. Test that step N+1 inherits step N's verified facts
         e. Test snapshot serialization
         f. Every test references REQ-VERIFY-001 or SCENARIO-VERIFY-005

      3. Create scripts/experiment_99_constraint_propagation.py:
         a. Define 10 synthetic 5-step reasoning chains:
            - 5 fully correct chains
            - 5 with a planted error at varying steps (step 2, 3, or 4)
         b. Example chain: "What is 3×4+5?"
            Step 1: "First, multiply 3×4 = 12"
            Step 2: "Then, add 5 to get 12+5 = 17"
            Step 3: "The answer is 17"
         c. Run each chain through propagate() step by step
         d. Track: does the state correctly accumulate? Does a violation at
            step K mark subsequent facts as suspect?
         e. Report: state accumulation correctness, violation detection step

      4. Update python/carnot/pipeline/__init__.py to export agentic classes

      5. Save results to {project_root}/results/experiment_99_results.json

      6. Run: JAX_PLATFORMS=cpu .venv/bin/pytest tests/python/test_agentic.py -q
      7. Run: JAX_PLATFORMS=cpu .venv/bin/pytest tests/python -q
      8. Run: JAX_PLATFORMS=cpu .venv/bin/python scripts/experiment_99_constraint_propagation.py
      9. Do NOT push. Do NOT modify scripts/research_conductor.py.

  - id: exp100-multi-step-rollback
    milestone: "2026.04.6"
    deliverable: python/carnot/pipeline/agentic.py
    title: "Exp 100: Multi-step verification with rollback"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: Exp 99 built ConstraintState propagation across agent steps. This
      experiment adds the rollback mechanism: when a constraint violation is detected
      at step K, trace back through the dependency chain to find the ROOT CAUSE step
      and repair from there instead of just repairing the current step.

      Target models: Qwen3.5-0.8B, google/gemma-4-E4B-it

      EXISTING CODE TO READ FIRST:
      - python/carnot/pipeline/agentic.py — ConstraintState, AgentStep, propagate() (Exp 99)
      - python/carnot/pipeline/verify_repair.py — VerifyRepairPipeline (repair mechanism)
      - python/carnot/pipeline/extract.py — AutoExtractor

      TASK: Extend python/carnot/pipeline/agentic.py with rollback and AgentVerifier

      CONCRETE STEPS:
      1. Add dependency tracking to ConstraintState:
         a. Each TrackedFact records which prior facts it depends on
            (fact X at step 3 depends on fact Y from step 1)
         b. depends_on: list[str] field in TrackedFact
         c. When a fact is violated, trace depends_on chain backward to find
            the earliest fact that is violated or incorrect

      2. Add AgentVerifier class:
         a. __init__(pipeline: VerifyRepairPipeline)
         b. verify_chain(steps: list[AgentStep]) -> ChainVerificationResult:
            - Run propagate() for each step in sequence
            - Build full dependency graph
            - Return: overall verified (bool), per-step results, violation trace
         c. find_root_cause(chain_result: ChainVerificationResult) -> int:
            - Given a violated step, trace back through dependency graph
            - Return index of the earliest step that introduced the error
            - Heuristic: the first step whose output constraint is violated
         d. rollback_to(state: ConstraintState, step_index: int) -> ConstraintState:
            - Remove all facts introduced at or after step_index
            - Return clean state from just before the bad step
         e. repair_chain(steps: list[AgentStep], from_step: int) -> list[AgentStep]:
            - Rollback state to from_step
            - Re-run verify_and_repair on from_step
            - Re-propagate constraints through subsequent steps
            - Return repaired chain

      3. ChainVerificationResult dataclass:
         - steps: list[AgentStep]
         - overall_verified: bool
         - first_violation_step: int | None
         - root_cause_step: int | None
         - dependency_graph: dict[str, list[str]]
         - state_history: list[ConstraintState]

      4. Update tests/python/test_agentic.py:
         a. Test verify_chain on correct 5-step chain
         b. Test verify_chain on chain with error at step 3
         c. Test find_root_cause traces back from step 4 violation to step 2 error
         d. Test rollback_to removes facts correctly
         e. Test repair_chain re-runs from root cause
         f. Every test references REQ-VERIFY-001 or SCENARIO-VERIFY-005

      5. Create scripts/experiment_100_rollback.py:
         a. Generate 20 synthetic 5-step reasoning chains:
            - 10 correct
            - 10 with planted errors at various steps (2, 3, or 4)
            - Include dependency chains (step 3 uses step 2's result)
         b. Run verify_chain on each
         c. For chains with errors: test find_root_cause accuracy
         d. Test repair_chain: does repairing from root cause fix downstream?
         e. Compare: repair from detected step vs repair from root cause step
         f. Report: root cause accuracy, repair success rate, false positives

      6. Save results to {project_root}/results/experiment_100_results.json

      7. Run: JAX_PLATFORMS=cpu .venv/bin/pytest tests/python/test_agentic.py -q
      8. Run: JAX_PLATFORMS=cpu .venv/bin/pytest tests/python -q
      9. Run: JAX_PLATFORMS=cpu .venv/bin/python scripts/experiment_100_rollback.py
      10. Do NOT push. Do NOT modify scripts/research_conductor.py.

  - id: exp102-latency-benchmark
    milestone: "2026.04.6"
    deliverable: scripts/experiment_102_latency_benchmark.py
    title: "Exp 102: Constraint check latency microbenchmark"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: The differentiable constraint pipeline (Exp 66) achieves 1.0 test
      AUROC. The critical question: is it fast enough for per-token use during LLM
      generation? If a single constraint check takes <1ms, energy-guided decoding
      is viable (the Kona path). If >10ms, we stick with post-hoc verify-repair.
      This experiment measures the exact latency at various scales. Quick experiment,
      high signal — answers research-program.md Goal #4.

      Target models: Qwen3.5-0.8B, google/gemma-4-E4B-it

      EXISTING CODE TO READ FIRST:
      - scripts/experiment_66_differentiable_constraints.py — differentiable pipeline
      - python/carnot/pipeline/verify_repair.py — VerifyRepairPipeline.verify()
      - python/carnot/pipeline/extract.py — AutoExtractor
      - scripts/benchmark_pipeline.py — existing pipeline benchmarks (Exp 83)
      - crates/carnot-constraints/src/pipeline.rs — Rust VerifyPipeline (Exp 94)

      TASK: Create scripts/experiment_102_latency_benchmark.py

      CONCRETE STEPS:
      1. Benchmark the FULL differentiable pipeline forward pass:
         a. Component-level timing (each measured independently):
            - Sentence embedding computation (all-MiniLM-L6-v2 or simulated)
            - Constraint extraction via AutoExtractor
            - Continuous Ising energy computation via JAX
            - Joint MLP scoring
            - Total end-to-end forward pass
         b. Warm up: run 100 iterations before timing (JIT compilation)
         c. Measure: 1000 iterations, report p50/p95/p99/mean/std

      2. Scale sweeps:
         a. Input length: 10, 50, 100, 500, 1000 tokens (simulated text)
         b. Constraint count: 1, 5, 10, 50 constraints (synthetic)
         c. Matrix: input_length × constraint_count, measure latency per cell

      3. Backend comparison (where available):
         a. Python VerifyRepairPipeline.verify() — the production path
         b. JAX JIT-compiled differentiable forward pass
         c. Rust VerifyPipeline (if carnot-python bindings available)
         d. For each: same 100 inputs, same timing methodology

      4. Analysis:
         a. Classify result:
            - <1ms mean → "VIABLE for per-token guided decoding"
            - 1-10ms mean → "VIABLE for per-sentence or batched verification"
            - >10ms mean → "POST-HOC only, not viable for generation-time use"
         b. Identify bottleneck component (embedding? extraction? energy? MLP?)
         c. Project: what latency would we need at 50 tokens/second generation?
            (20ms budget per token → constraint check must be <10ms)
         d. Recommendation: guided decoding viable? What optimization needed?

      5. Save results to {project_root}/results/experiment_102_results.json
      6. Save summary to {project_root}/ops/latency-benchmark.md

      7. Run: JAX_PLATFORMS=cpu .venv/bin/python scripts/experiment_102_latency_benchmark.py
      8. Do NOT push. Do NOT modify scripts/research_conductor.py.

  - id: exp103-kan-energy-tier
    milestone: "2026.04.6"
    deliverable: python/carnot/models/kan.py
    title: "Exp 103: KAN energy tier prototype"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: The Ising model uses fixed quadratic energy E = -s^T J s + b^T s.
      This is interpretable but has limited expressiveness — Exp 62/88 showed that
      linear features can't capture nonlinear constraint relationships (e.g.,
      "if X > 10 AND Y < 5 then Z must be positive" requires nonlinear interactions).
      Kolmogorov-Arnold Networks (KANs) use learnable spline activations on edges
      instead of fixed quadratic interactions. A KAN-based energy function has
      E = sum of spline_ij(s_i, s_j) over edges — strictly more expressive than
      Ising while remaining interpretable (you can plot the learned spline shapes).
      This is research-program.md Goal #7.

      Tier placement: Ising (quadratic) → KAN (spline) → Gibbs (MLP) → Boltzmann (deep)

      Target models: Qwen3.5-0.8B, google/gemma-4-E4B-it

      EXISTING CODE TO READ FIRST:
      - python/carnot/models/ising.py — IsingModel (quadratic energy)
      - python/carnot/models/gibbs.py — GibbsModel (MLP energy)
      - python/carnot/core/energy.py — EnergyFunction protocol
      - python/carnot/training/contrastive_divergence.py — CD training
      - scripts/experiment_62_domain_constraint_learning.py — domain CD data
      - crates/carnot-core/src/lib.rs — Rust EnergyFunction trait

      TASK: Create python/carnot/models/kan.py + crates/carnot-kan/ scaffold

      CONCRETE STEPS:
      1. Create python/carnot/models/kan.py:
         a. BSpline class:
            - Parameterized by control points (learnable via JAX)
            - evaluate(x: jnp.ndarray) -> jnp.ndarray
            - num_knots, degree as hyperparameters (default: 10 knots, degree 3)
         b. KANEnergyFunction class implementing EnergyFunction protocol:
            - edges: list of (i, j) pairs (like Ising's coupling matrix, but sparse)
            - splines: one BSpline per edge (learnable)
            - biases: one BSpline per node (learnable, replaces linear bias)
            - energy(state): sum of spline_ij(s_i * s_j) + sum of bias_i(s_i)
            - grad_energy(state): JAX autodiff through splines
            - n_params property: total learnable parameters
            - interpret_edge(i, j): return the spline shape for visualization
         c. KANModel class (wraps energy + training state):
            - from_ising(ising_model): initialize KAN splines from Ising couplings
              (each spline starts as linear function matching J_ij weight)
            - train_cd(data, n_epochs, lr): CD training with spline parameter updates
            - plot_splines(edge_indices): matplotlib visualization of learned shapes

      2. Create crates/carnot-kan/Cargo.toml and crates/carnot-kan/src/lib.rs:
         a. Minimal scaffold: KanEnergyFunction struct implementing EnergyFunction trait
         b. BSpline struct with evaluate() using lookup table (for future FPGA path)
         c. energy(), gradient() methods
         d. Mark with TODO comments for full implementation later
         e. Add to workspace Cargo.toml members list

      3. Create tests/python/test_kan.py:
         a. Test BSpline evaluation at knot points
         b. Test KANEnergyFunction produces finite energy
         c. Test gradient computation (JAX grad) through splines
         d. Test from_ising initialization: KAN initialized from Ising should produce
            similar energy values on the same inputs
         e. Test that KAN has MORE parameters than equivalent Ising but FEWER than Gibbs
         f. Every test references REQ-CORE-001 or SCENARIO-CORE-001

      4. Create scripts/experiment_103_kan_energy.py:
         a. Load Exp 62's domain-specific constraint data (10K triples, 3 domains)
         b. Train KAN energy model via CD (same setup as Exp 62)
         c. Compare: KAN AUROC vs Ising AUROC vs Gibbs MLP AUROC
