      EXISTING CODE TO READ:
      - scripts/experiment_56_live_llm_pipeline.py — live LLM pipeline
      - scripts/experiment_57_verify_repair_loop.py — verify-repair loop

      TASK: Create scripts/experiment_59_constraint_prompting.py

      CONCRETE STEPS:
      1. Implement build_constraint_prompt(question, domain) -> str
      2. Test three modes on 15 questions: baseline, constraint-aware, combined
      3. Metrics per mode: accuracy, hallucination rate, constraint satisfaction
      4. Run: JAX_PLATFORMS=cpu .venv/bin/python scripts/experiment_59_constraint_prompting.py
      5. Do NOT push. Do NOT modify scripts/research_conductor.py.

