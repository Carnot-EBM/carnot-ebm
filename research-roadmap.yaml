      But two patterns were not fully implemented: negation_scope and arithmetic_carry.
      The current NegationConstraint uses placeholder logic; CarryChainConstraint misses
      subtraction borrowing and digit-count checks. This experiment implements both properly.

      Date: {date}. Target models: Qwen3.5-0.8B, google/gemma-4-E4B-it

      EXISTING CODE TO READ FIRST:
