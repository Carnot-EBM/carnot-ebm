  # ── Phase 49: Multi-Model Scaling ───────────────────────────
  - id: exp184-3b-model-verify
    milestone: "2026.04.13"
    deliverable: results/experiment_184_results.json
    title: "Exp 184: 3B model verification — does verify-repair help larger models?"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: All experiments so far used 0.6-0.8B models. With 24GB VRAM
      per GPU, we can test 3B models. Key question: does verify-repair still
      help when the base model is already stronger?

      EXISTING CODE TO READ FIRST:
      - python/carnot/pipeline/verify_repair.py — pipeline
      - results/experiment_181_results.json — 0.8B GSM8K results

      TASK: Create results/experiment_184_results.json

      CONCRETE STEPS:
      1. Load Qwen3-3B (or Qwen3.5-3B if available) on GPU
      2. Run 200 GSM8K questions: baseline vs verify-repair
      3. Compare improvement delta to 0.8B results (Exp 181)
      4. Hypothesis: verify-repair helps LESS on larger models because they
         make fewer arithmetic errors — but still helps on adversarial
      5. Run 200 adversarial (number-swapped) on 3B model
      6. Report: is adversarial improvement still significant at 3B?
      7. Run: CARNOT_FORCE_LIVE=1 .venv/bin/python scripts/experiment_184_3b_model.py
      8. Do NOT push. Do NOT modify scripts/research_conductor.py.

