  - id: exp123-fix-model-loading
    milestone: "2026.04.8"
    deliverable: python/carnot/inference/model_loader.py
    title: "Exp 123: Robust model loading for experiments"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: Many experiments fall back to simulated LLM outputs because model
      loading fails in the conductor's claude -p subprocess. Qwen3.5-0.8B (752M
      params, ~1.5GB) loads fine when run directly but fails inconsistently in
      subprocesses. This must be fixed for benchmark credibility.

      Target models: Qwen3.5-0.8B, google/gemma-4-E4B-it

      EXISTING CODE TO READ FIRST:
      - scripts/experiment_56_live_llm_pipeline.py — model loading pattern
      - scripts/experiment_91_gsm8k_live.py — model loading with fallback
      - python/carnot/pipeline/verify_repair.py — _load_model method

      TASK: Create python/carnot/inference/model_loader.py

      CONCRETE STEPS:
      1. Create a robust model loader module:
         a. load_model(model_name, device="cpu", dtype=None, max_retries=3):
            - Check available memory before loading (psutil.virtual_memory)
            - Default dtype=torch.float32 on CPU (not float16 which can fail)
            - Retry on OOM with gc.collect() + torch.cuda.empty_cache()
            - Return (model, tokenizer) or raise ModelLoadError with details

         b. generate(model, tokenizer, prompt, max_new_tokens=256):
            - Handle chat template (with/without enable_thinking)
            - Strip think tokens from Qwen output
            - Return generated text

         c. Environment variable: CARNOT_FORCE_LIVE=1
            - When set, raise instead of falling back to simulated
            - Default: allow fallback (backward compatible)

      2. Update python/carnot/inference/__init__.py to export load_model, generate

      3. Create tests/python/test_model_loader.py:
         - Test load_model with mock (patch transformers)
         - Test memory check logic
         - Test retry on OOM
         - Test CARNOT_FORCE_LIVE env var
         - Test generate with chat template

      4. Run: JAX_PLATFORMS=cpu .venv/bin/pytest tests/python -q
      5. Do NOT push. Do NOT modify scripts/research_conductor.py.

  - id: exp121-adversarial-verify-repair
    milestone: "2026.04.8"
    deliverable: scripts/experiment_121_adversarial_verify_repair.py
    title: "Exp 121: Carnot verify-repair on adversarial GSM8K"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: This is THE credibility experiment. Exp 120 showed that LLMs
      drop accuracy on adversarial GSM8K variants. This experiment shows that
      Carnot's verify-repair pipeline MAINTAINS accuracy because Ising constraint
      verification catches arithmetic errors regardless of irrelevant context.

      The hypothesis: Carnot's improvement is LARGER on adversarial variants
      than standard GSM8K, because there are more arithmetic errors to catch
      when the LLM is confused by irrelevant information.

      Target models: Qwen3.5-0.8B, google/gemma-4-E4B-it

      EXISTING CODE TO READ FIRST:
      - scripts/experiment_120_adversarial_baseline.py — baseline results
      - results/adversarial_gsm8k_data.json — adversarial datasets
      - results/experiment_120_results.json — baseline accuracy
      - python/carnot/pipeline/verify_repair.py — VerifyRepairPipeline
      - scripts/experiment_91_gsm8k_live.py — verify-repair on GSM8K

      TASK: Create scripts/experiment_121_adversarial_verify_repair.py

      CONCRETE STEPS:
      1. Load adversarial data and baseline results

      2. For each model x each variant (4 x 200 = 800 questions):
         Run 3 modes:
         a. Baseline (from Exp 120, or re-run)
         b. Verify-only: extract arithmetic constraints, check via Ising
         c. Verify-repair: full loop (max 3 iterations)

      3. Key metrics:
         - Accuracy per mode per variant
         - Improvement delta: (verify-repair - baseline) per variant
         - Is delta LARGER on adversarial variants? (core hypothesis)
         - Error type breakdown: which errors does Ising catch?
         - Does Ising correctly ignore the irrelevant sentence?

      4. Statistical analysis:
         - 95% bootstrap confidence intervals on all accuracy numbers
         - Paired test: is adversarial improvement significantly > standard?

      5. Print comprehensive results table
      6. Save to results/experiment_121_results.json

      7. Run: JAX_PLATFORMS=cpu .venv/bin/python scripts/experiment_121_adversarial_verify_repair.py
      8. Do NOT push. Do NOT modify scripts/research_conductor.py.

