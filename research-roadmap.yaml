# Carnot Research Roadmap — Milestone 2026.04.14
# "Ground Truth: Rebuild Extraction for Real Models"
#
# CONTEXT: All previous positive results were simulation artifacts.
# Live GPU testing showed 0% improvement (base models) and 0 violations
# detected (instruction-tuned models). The constraint EXTRACTION is broken,
# not the verification infrastructure.
#
# This milestone rebuilds extraction from scratch for real IT models.

milestone: "2026.04.14"
milestone_title: "Ground Truth: Rebuild Extraction for Real Models"
milestone_doc: "openspec/change-proposals/research-roadmap-v19.md"

tasks:
  # ── Phase 60: Understand the Extraction Failure ──────────────
  - id: exp203-extraction-autopsy
    milestone: "2026.04.14"
    deliverable: results/experiment_203_results.json
    title: "Exp 203: Extraction autopsy — why ArithmeticExtractor finds 0 violations on IT models"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: Gemma4-E4B-it scores 80% on GSM8K with LIVE GPU inference.
      But the ArithmeticExtractor found ZERO violations on all 20 questions —
      even the 4 wrong answers. This experiment investigates WHY.

      EXISTING CODE TO READ FIRST:
      - python/carnot/pipeline/extract.py — ArithmeticExtractor (regex-based)
      - scripts/experiment_181_gsm8k_live_gpu.py — extraction logic

      TASK: Create results/experiment_203_results.json

      CONCRETE STEPS:
      1. Load Gemma4-E4B-it on GPU
      2. Run 20 GSM8K questions, save FULL response text for each
      3. For each of the ~4 wrong answers:
         a. Print the full response
         b. Show what the ArithmeticExtractor regex matched (or didn't)
         c. Identify the actual error in the reasoning
         d. Categorize: format mismatch, subtle logic error, rounding, etc.
      4. For 3 correct answers, also show extraction results
      5. Propose: what extraction approach WOULD have caught each error?
      6. Save detailed analysis
      7. Run: CARNOT_FORCE_LIVE=1 .venv/bin/python scripts/experiment_203_extraction_autopsy.py
      8. Do NOT push. Do NOT modify scripts/research_conductor.py.

  - id: exp204-z3-smt-extractor
    milestone: "2026.04.14"
    deliverable: python/carnot/pipeline/z3_extractor.py
    title: "Exp 204: Z3 SMT constraint extractor — formal verification with zero FP"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: The regex ArithmeticExtractor fails on instruction-tuned models.
      NSVIF (arxiv 2601.17789) showed that formalizing constraints as first-order
      logic and solving with Z3 SMT eliminates false positives. This experiment
      implements a Z3-based extractor.

      EXISTING CODE TO READ FIRST:
      - python/carnot/pipeline/extract.py — current extractors (ConstraintExtractor protocol)
      - results/experiment_203_results.json — extraction autopsy findings

      TASK: Create python/carnot/pipeline/z3_extractor.py

      CONCRETE STEPS:
      1. pip install z3-solver if not installed
      2. Create Z3ArithmeticExtractor implementing ConstraintExtractor protocol:
         a. Parse chain-of-thought response into steps
         b. For each step with a calculation, extract operands and result
         c. Encode as Z3 constraint: a + b == c (or a * b == c, etc.)
         d. Check satisfiability — if UNSAT, the step is wrong
         e. Return ConstraintResult with violation details
      3. Key difference from regex: Z3 handles:
         - Implicit calculations ("half of 48" → 48/2 == 24)
         - Multi-step chains (a + b = c, then c * d = e)
         - Approximate values ("about 150" → 145 <= x <= 155)
      4. Test on the 4 wrong Gemma4 answers from Exp 203
      5. Test on 3 correct answers — verify ZERO false positives
      6. Write tests, 100% coverage
      7. Run: .venv/bin/pytest tests/python -q
      8. Do NOT push. Do NOT modify scripts/research_conductor.py.

  - id: exp205-llm-as-extractor
    milestone: "2026.04.14"
    deliverable: python/carnot/pipeline/llm_extractor.py
    title: "Exp 205: LLM-as-extractor — use a second LLM call to extract constraints"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: As an alternative to Z3, use a small LLM to extract verifiable
      claims from a response. The LLM understands natural language better than
      regex or even Z3 parsing. The extracted claims are then verified by Ising.

      EXISTING CODE TO READ FIRST:
      - python/carnot/pipeline/extract.py — ConstraintExtractor protocol
      - python/carnot/inference/model_loader.py — model loading

      TASK: Create python/carnot/pipeline/llm_extractor.py

      CONCRETE STEPS:
      1. Create LLMConstraintExtractor implementing ConstraintExtractor protocol:
         a. Takes a response text
         b. Prompts a small model (can be same model or different):
            "List all verifiable arithmetic claims in this response.
             Format each as: CLAIM: a OP b = c"
         c. Parses the extraction output
         d. Returns ConstraintResults that can be verified by Ising
      2. Test: can the LLM-extractor find errors that regex misses?
      3. Test on Gemma4-E4B-it's 4 wrong GSM8K answers
      4. Measure: extraction latency (acceptable if <1s per response)
      5. Write tests
      6. Run: .venv/bin/pytest tests/python -q
      7. Do NOT push. Do NOT modify scripts/research_conductor.py.

  # ── Phase 61: Test New Extractors on Live IT Models ──────────
  - id: exp206-z3-live-benchmark
    milestone: "2026.04.14"
    deliverable: results/experiment_206_results.json
    title: "Exp 206: Z3 extractor on 100 live GSM8K (Gemma4-E4B-it) — the real test"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: This is the experiment that determines if Carnot's value
      proposition is real. Using the Z3 SMT extractor (Exp 204) on
      instruction-tuned Gemma4-E4B-it with LIVE GPU inference.

      EXISTING CODE TO READ FIRST:
      - python/carnot/pipeline/z3_extractor.py — Z3 extractor (Exp 204)
      - python/carnot/pipeline/verify_repair.py — VerifyRepairPipeline

      TASK: Create results/experiment_206_results.json

      CONCRETE STEPS:
      1. Load Gemma4-E4B-it on GPU
      2. Configure VerifyRepairPipeline with Z3ArithmeticExtractor
      3. Run 100 GSM8K questions through 3 modes:
         a. Baseline (LLM only)
         b. Verify-only (Z3 extraction + Ising verification)
         c. Verify-repair (Z3 + Ising + repair loop)
      4. CRITICAL METRICS:
         - Baseline accuracy (should be ~80%)
         - Violations detected (should be >0 on wrong answers)
         - False positive rate (should be ~0% with Z3)
         - Net improvement delta with 95% CI
         - THIS IS THE NUMBER THAT MATTERS
      5. Compare to old regex extractor (should be strictly better)
      6. Save with inference_mode="live_gpu"
      7. Run: CARNOT_FORCE_LIVE=1 .venv/bin/python scripts/experiment_206_z3_live.py
      8. Do NOT push. Do NOT modify scripts/research_conductor.py.

