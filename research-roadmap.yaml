  - id: exp140-guided-latency
    milestone: "2026.04.10"
    deliverable: scripts/experiment_140_guided_latency.py
    title: "Exp 140: Constraint-projection guided decoding latency benchmark"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: Exp 138 benchmarked the alpha-penalty guided decoding approach (Exp 110).
      This experiment implements a constraint-PROJECTION operator — projecting token logits
      onto the constraint-satisfying subspace via the KAN energy gradient — and measures
      its wall-clock overhead. This addresses Goal #4 from research-program.md.
      Proposed as Exp 140 by the Exp 139 arxiv scan.

      Target models: Qwen3.5-0.8B, google/gemma-4-E4B-it

      EXISTING CODE TO READ FIRST:
      - python/carnot/inference/guided_decoding.py — EnergyGuidedSampler (Exp 110)
      - python/carnot/models/kan.py — KAN energy tier (Exp 103/108)
      - scripts/experiment_102_latency_benchmark.py — latency benchmark methodology
      - exports/guided-decoding-adapter/config.json — current constraint weights
      - research-program.md — Goal #4 (guided decoding latency)

      TASK: Create scripts/experiment_140_guided_latency.py

      CONCRETE STEPS:
      1. Add `project_logits(logits, energy_grad, alpha=0.1)` to EnergyGuidedSampler:
         - Compute unit vector of energy gradient
         - Subtract alpha * dot(logits, grad_unit) * grad_unit from logits
         - This projects logits away from high-energy token directions
      2. Benchmark projection overhead at batch sizes 1, 8, 32:
         - Use KAN energy (carnot.models.kan.KANConstraintModel) for gradient
         - Measure: (a) gradient computation time, (b) projection time, (c) total
         - 1000 repetitions, report p50/p95/p99
      3. Compare to Exp 138's alpha-penalty approach on 50 GSM8K questions:
         - Accuracy: projection vs penalty vs no-guidance
         - Overhead: projection vs penalty
      4. Success criterion: total overhead <5ms per token at batch=1
      5. Save results to results/experiment_140_results.json
      6. Run: JAX_PLATFORMS=cpu .venv/bin/python scripts/experiment_140_guided_latency.py
      7. Do NOT push. Do NOT modify scripts/research_conductor.py.

  - id: exp143-jepa-pairs
    milestone: "2026.04.10"
    deliverable: results/jepa_training_pairs.json
    title: "Exp 143: Collect (partial response, final violation) JEPA training pairs"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: JEPA predictive verification (research-program.md Tier 3, Goal #2) requires
      a training set of (partial_response, final_violated) pairs. We have accumulated
      verify-repair logs from Exp 130-138 and can mine them retroactively. This experiment
      collects and formats that training data.

      Target models: Qwen3.5-0.8B, google/gemma-4-E4B-it

      EXISTING CODE TO READ FIRST:
      - results/experiment_121_results.json — adversarial verify-repair results (if exists)
      - results/experiment_130_results.json — adversarial verify-repair run
      - results/experiment_136_results.json — cross-session benchmark
      - results/experiment_138_results.json — guided decoding benchmark
      - python/carnot/embeddings/fast_embedding.py — RandomProjection (Exp 112, 0.026ms)
      - research-program.md — "Continuous Self-Learning" Tier 3

      TASK: Create scripts/experiment_143_collect_pairs.py and results/jepa_training_pairs.json

      CONCRETE STEPS:
      1. Load all available verify-repair result files from results/ directory
      2. For each (question, llm_response, was_violated) tuple found:
         a. Tokenize response (use simple whitespace split if no tokenizer available)
         b. Create 4 prefix lengths: 10%, 25%, 50%, 75% of tokens
         c. Embed each prefix with RandomProjection (256-dim, seed=42)
         d. Record: (prefix_ratio, embedding, violated_arithmetic, violated_code,
                     violated_logic, any_violated, source_exp)
      3. If fewer than 500 pairs exist in logs, SUPPLEMENT by generating:
         - 200 synthetic arithmetic questions (x+y, x*y, multi-step)
         - Run AutoExtractor + Ising verify on each
         - Use first 25% and 75% of the response as prefixes
         - Label with actual violation result
      4. Save to results/jepa_training_pairs.json:
         (pairs: [(prefix_ratio, embedding_256d, violated, domain, source_exp)...],
          total: N, domain_counts: (arithmetic: N, code: N, logic: N))
      5. Print summary: total pairs, per-domain breakdown, positive rate
      6. Run: JAX_PLATFORMS=cpu .venv/bin/python scripts/experiment_143_collect_pairs.py
      7. Do NOT push. Do NOT modify scripts/research_conductor.py.

  - id: exp141-constraint-generation
    milestone: "2026.04.10"
    deliverable: python/carnot/pipeline/generation.py
    title: "Exp 141: Memory-augmented constraint generation"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: Exp 134 showed that precision-based constraint REWEIGHTING produced no
      measurable improvement (fixed=0.53, adaptive=0.55). The root cause: reweighting
      existing constraints cannot close gaps caused by missing constraint types entirely.
      The fix from research-program.md §"Next Milestone Focus (2026.04.10)" #1: wire
      ConstraintMemory into AutoExtractor to ADD new constraints from learned patterns.

      Target models: Qwen3.5-0.8B, google/gemma-4-E4B-it

      EXISTING CODE TO READ FIRST:
      - python/carnot/pipeline/memory.py — ConstraintMemory (Exp 135)
      - python/carnot/pipeline/extract.py — AutoExtractor, ConstraintExtractor Protocol
      - python/carnot/pipeline/verify_repair.py — VerifyRepairPipeline
      - python/carnot/verify/constraint.py — ComposedEnergy, ConstraintTerm
      - results/experiment_134_results.json — shows reweighting failure
      - research-program.md — "Next Milestone Focus" #1

      TASK: Create python/carnot/pipeline/generation.py

      CONCRETE STEPS:
      1. ConstraintGenerator class:
         - from_memory(memory: ConstraintMemory) -> ConstraintGenerator
         - generate(text: str, domain: str) -> list[ConstraintTerm]
           Reads memory patterns for domain and maps them to new ConstraintTerms:
           * "arithmetic_carry" pattern → CarryChainConstraint (from extract.py or new)
           * "comparison_boundary" pattern → BoundConstraint
           * "negation_scope" pattern → NegationConstraint (new: detect "not X" patterns)
         - Threshold: only add constraints for patterns seen ≥3 times in memory

      2. Extend AutoExtractor.extract(text, domain=None, memory=None):
         - If memory provided: instantiate ConstraintGenerator, call generate()
         - Merge generated constraints with static extraction results
         - Deduplicate by constraint type (don't add ArithmeticConstraint twice)
         - Backward compatible: memory=None produces identical behavior to current

      3. Benchmark on 200 GSM8K questions:
         - Warmup: first 100 questions build memory (use results from Exp 132-136 if available)
         - Test: next 100 questions compare AutoExtractor vs memory-augmented
         - Metric: constraint count per question, accuracy with/without generation
         - Save to results/experiment_141_results.json

      4. Tests in tests/python/test_generation.py:
         - Test ConstraintGenerator with mocked memory patterns
         - Test AutoExtractor with memory= parameter
         - Test memory threshold (patterns seen < 3 times → no constraint added)
         - 100% coverage required

      5. Run: JAX_PLATFORMS=cpu .venv/bin/pytest tests/python/test_generation.py -q
      6. Run: JAX_PLATFORMS=cpu .venv/bin/python scripts/experiment_141_constraint_generation.py
         (create this script as the benchmark from step 3)
      7. Do NOT push. Do NOT modify scripts/research_conductor.py.

  - id: exp144-jepa-predictor
    milestone: "2026.04.10"
    deliverable: python/carnot/pipeline/jepa_predictor.py
    title: "Exp 144: Train JEPA violation predictor"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: Exp 143 collected (partial_response_embedding, final_violated) training pairs.
      This experiment trains a small MLP to predict constraint violations from partial responses
      — the Tier 3 JEPA predictive verification mechanism from research-program.md.

      Target models: Qwen3.5-0.8B, google/gemma-4-E4B-it

      EXISTING CODE TO READ FIRST:
      - results/jepa_training_pairs.json — training data from Exp 143
      - python/carnot/embeddings/fast_embedding.py — RandomProjection (same embeddings)
      - python/carnot/models/kan.py — KAN training pattern to follow
      - python/carnot/training/ — CD and training loop patterns
      - research-program.md — "Continuous Self-Learning" Tier 3

      TASK: Create python/carnot/pipeline/jepa_predictor.py

      CONCRETE STEPS:
      1. JEPAViolationPredictor class implementing EnergyFunction protocol:
         - Architecture: Linear(256, 64) → ReLU → Linear(64, 32) → ReLU → Linear(32, N_domains)
           where N_domains = number of constraint types (arithmetic, code, logic, etc.)
         - predict(partial_embedding: jnp.ndarray) -> dict[str, float] (per-domain probabilities)
         - is_high_risk(partial_embedding, threshold=0.5) -> bool
         - save(path: str) — safetensors format
         - load(path: str) — restore from safetensors
         - train(pairs: list[dict]) -> training_log — binary cross-entropy, 50 epochs, Adam

      2. Training:
         - Load results/jepa_training_pairs.json
         - 80/20 train/val split (stratified by domain)
         - Run training, report per-domain AUROC on val set
         - Save model to results/jepa_predictor.safetensors

      3. Evaluation metrics:
         - AUROC per domain + macro AUROC
         - Precision and recall at threshold=0.5
         - Confusion matrix (fast-path errors: false negatives are costly)
         - Target: macro AUROC > 0.65

      4. Tests in tests/python/test_jepa_predictor.py:
         - Test predict() with random embeddings
         - Test save/load round-trip
         - Test is_high_risk() threshold behavior
         - 100% coverage required

      5. Run: JAX_PLATFORMS=cpu .venv/bin/pytest tests/python/test_jepa_predictor.py -q
      6. Run: JAX_PLATFORMS=cpu .venv/bin/python scripts/experiment_144_train_jepa.py
         (create this script: loads data, trains, prints AUROC, saves model)
      7. Do NOT push. Do NOT modify scripts/research_conductor.py.

  - id: exp142-combined-learning
    milestone: "2026.04.10"
    deliverable: scripts/experiment_142_combined_learning.py
    title: "Exp 142: Combined Tier 1+2 learning benchmark"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: Tier 1 (ConstraintTracker + AdaptiveWeighter, Exp 132-134) adjusts weights
      on existing constraints. Tier 2 (ConstraintMemory, Exp 135 + ConstraintGenerator, Exp 141)
      adds new constraint types. This experiment benchmarks all four combinations on 500
      questions to determine which learning mechanism actually helps and how they compose.

      Target models: Qwen3.5-0.8B, google/gemma-4-E4B-it

      EXISTING CODE TO READ FIRST:
      - python/carnot/pipeline/tracker.py — ConstraintTracker (Exp 132)
      - python/carnot/pipeline/adaptive.py — AdaptiveWeighter (Exp 133)
      - python/carnot/pipeline/memory.py — ConstraintMemory (Exp 135)
      - python/carnot/pipeline/generation.py — ConstraintGenerator (Exp 141)
      - python/carnot/pipeline/verify_repair.py — VerifyRepairPipeline
      - results/experiment_134_results.json — Tier 1 baseline (fixed=0.53, adaptive=0.55)

      TASK: Create scripts/experiment_142_combined_learning.py

      CONCRETE STEPS:
      1. Build four pipeline configurations:
         a. Baseline: default VerifyRepairPipeline (fixed weights, no memory)
         b. Tier1: + ConstraintTracker + AdaptiveWeighter (reweighting only)
         c. Tier2: + ConstraintMemory + ConstraintGenerator (new constraints only)
