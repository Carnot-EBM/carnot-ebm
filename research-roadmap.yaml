  - id: exp63-hierarchical-ising
    milestone: "2026.04.3"
    deliverable: scripts/experiment_63_hierarchical_ising.py
    title: "Exp 63: Hierarchical Ising (1000+ vars)"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: Exp 61 (scripts/experiment_61_sparse_ising.py) uses sparse Ising
      at 500+ vars. This experiment adds HIERARCHICAL structure: group spins into
      blocks and learn both intra-block and inter-block couplings separately.

      EXISTING CODE TO READ FIRST:
      - scripts/experiment_61_sparse_ising.py — sparse Ising at 500+ vars
      - scripts/experiment_60_scale_cd_training.py — CD at 100+ vars
      - scripts/experiment_46b_scale_sat_parallel.py — large SAT benchmarks
      - scripts/experiment_39_thrml_sat.py — sat_to_ising, random_3sat
      - python/carnot/samplers/parallel_ising.py — ParallelIsingSampler

      TASK: Create scripts/experiment_63_hierarchical_ising.py

      CONCRETE STEPS:
      1. Implement hierarchical_encode(clauses, n_vars, block_size=50):
         - Group variables into blocks of block_size
         - Intra-block: dense coupling matrix (block_size × block_size)
         - Inter-block: sparse coupling (only edges crossing block boundaries)
         - Return: list of (intra_J, inter_edges) per block

      2. Implement hierarchical_sample(blocks, n_steps, beta):
         - Outer loop: update inter-block couplings (coarse grain)
         - Inner loop: parallel Gibbs within each block (fine grain)
         - Anneal beta from low to high

      3. Implement hierarchical_cd_train(blocks, data, epochs, lr):
         - Train intra-block couplings first (fast, small matrices)
         - Then train inter-block couplings (sparse, large but few)
         - L1 regularization on inter-block connections

      4. Benchmark on SAT at multiple scales:
         - 200 vars (4 blocks of 50)
         - 500 vars (10 blocks of 50)
         - 1000 vars (20 blocks of 50)
         Compare: hierarchical vs flat sparse vs flat dense vs random

      5. Print scaling table: vars × method × (accuracy, time, memory)
      6. Run: JAX_PLATFORMS=cpu .venv/bin/python scripts/experiment_63_hierarchical_ising.py
      7. Do NOT push. Do NOT modify scripts/research_conductor.py.

