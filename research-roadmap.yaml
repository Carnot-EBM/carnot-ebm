  - id: exp154-jepa-multidom-pairs
    milestone: "2026.04.11"
    deliverable: results/jepa_training_pairs_v2.json
    title: "Exp 154: Collect multi-domain JEPA training pairs (code + logic + factual)"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: Exp 143 collected only arithmetic (partial_response, violation) pairs, leaving
      code/logic AUROC=0.5 (chance). Exp 145 confirmed: the fast-path gate fires correctly but
      19.8% accuracy degradation is caused entirely by missing code/logic signal. This experiment
      collects multi-domain training data to fix the JEPA predictor.

      Target models: Qwen3.5-0.8B, google/gemma-4-E4B-it

      EXISTING CODE TO READ FIRST:
      - results/jepa_training_pairs.json — Exp 143 arithmetic-only pairs (schema to reuse)
      - scripts/experiment_143_collect_pairs.py — data collection methodology
      - python/carnot/embeddings/fast_embedding.py — RandomProjectionEmbedding(256, seed=42)
      - python/carnot/pipeline/extract.py — CodeExtractor, LogicExtractor, AutoExtractor
      - python/carnot/pipeline/verify_repair.py — VerifyRepairPipeline
      - research-program.md — "Continuous Self-Learning" Tier 3

      TASK: Create scripts/experiment_154_collect_multidom_pairs.py
            and results/jepa_training_pairs_v2.json

      CONCRETE STEPS:
      1. Load existing results/jepa_training_pairs.json (arithmetic pairs from Exp 143)
         as the arithmetic domain base (~800 pairs).

      2. Generate 200 CODE domain pairs:
         a. Create 50 Python function templates (sorting, search, math, string ops)
         b. Generate "correct" and "buggy" versions of each (introduce 1-2 AST errors)
         c. For each response (function body), extract 4 prefix lengths (10%, 25%, 50%, 75%)
         d. Run CodeExtractor on each full response to get violation labels
         e. Embed each prefix with RandomProjectionEmbedding(embed_dim=256, seed=42)
         f. Record: (prefix_ratio, embedding[256], violated_code, domain="code", source_exp=154)

      3. Generate 200 LOGIC domain pairs:
         a. Create 50 logical reasoning problems (syllogisms, propositional logic, 3-step chains)
         b. Generate "valid" and "invalid" argument forms for each
         c. Extract prefixes (10%, 25%, 50%, 75%), embed with same RandomProjection
         d. Run LogicExtractor on full response for violation labels
         e. Record with domain="logic"

      4. Merge arithmetic + code + logic into results/jepa_training_pairs_v2.json:
         - Same schema as Exp 143: (pairs:[...], total, domain_counts, positive_rate)
         - Ensure roughly balanced domain distribution (aim for ~33% per domain)
         - Print summary: total pairs by domain, positive rate per domain

      5. Verify balance: assert at least 150 positive examples per domain
         (violated=True). If fewer, generate additional pairs for that domain.

      6. Run: JAX_PLATFORMS=cpu .venv/bin/python scripts/experiment_154_collect_multidom_pairs.py
      7. Do NOT push. Do NOT modify scripts/research_conductor.py.

  - id: exp155-jepa-v2-retrain
    milestone: "2026.04.11"
    deliverable: results/jepa_predictor_v2.safetensors
    title: "Exp 155: Retrain JEPA violation predictor v2 with multi-domain data"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: Exp 144 trained JEPAViolationPredictor on arithmetic-only data, achieving
      arithmetic AUROC=0.7126 but code/logic AUROC=0.5 (chance). Exp 154 collected
      balanced multi-domain training pairs. This experiment retrains the predictor.

      Target models: Qwen3.5-0.8B, google/gemma-4-E4B-it

      EXISTING CODE TO READ FIRST:
      - python/carnot/pipeline/jepa_predictor.py — JEPAViolationPredictor (Exp 144)
      - results/jepa_predictor.safetensors — v1 model to compare against
      - results/jepa_training_pairs_v2.json — multi-domain training data (Exp 154)
      - scripts/experiment_144_train_jepa.py — training script to extend
      - research-program.md — "Continuous Self-Learning" Tier 3

      TASK: Create scripts/experiment_155_train_jepa_v2.py
            and results/jepa_predictor_v2.safetensors

      CONCRETE STEPS:
      1. Load results/jepa_training_pairs_v2.json (all domains combined).

      2. Retrain JEPAViolationPredictor with the following improvements:
         a. Stratified 80/20 train/val split — stratify by domain AND violated label
            to ensure each domain is represented in validation set
         b. Class-weighted loss: upweight positive (violated=True) examples per domain
            since some domains may have fewer positives
         c. Same architecture (256→64→32→3) — don't change the model structure
         d. Train for 100 epochs (doubled from Exp 144) with early stopping on val AUROC

      3. Evaluate on held-out validation set:
         - Per-domain AUROC: arithmetic, code, logic
         - Macro AUROC (target: >0.70)
         - Precision/recall at threshold=0.5 per domain
         - Print comparison table vs Exp 144 (v1) results

      4. Save to results/jepa_predictor_v2.safetensors (same safetensors format as v1)

      5. Save results to results/experiment_155_results.json:
         (v1_macro_auroc, v2_macro_auroc, per_domain_v1, per_domain_v2, improvement)

      6. Add tests in tests/python/test_jepa_predictor.py if not already covering v2:
         - Test that load() works with the v2 model file
         - Test prediction on code and logic domains (sanity check non-random output)
         - 100% coverage required for any new code

      7. Run: JAX_PLATFORMS=cpu .venv/bin/pytest tests/python/test_jepa_predictor.py -q
      8. Run: JAX_PLATFORMS=cpu .venv/bin/python scripts/experiment_155_train_jepa_v2.py
      9. Do NOT push. Do NOT modify scripts/research_conductor.py.

