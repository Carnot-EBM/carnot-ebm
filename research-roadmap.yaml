      - results/adversarial_gsm8k_data.json — generated datasets
      - scripts/experiment_91_gsm8k_live.py — GSM8K inference infrastructure

      TASK: Create scripts/experiment_120_adversarial_baseline.py

      CONCRETE STEPS:
