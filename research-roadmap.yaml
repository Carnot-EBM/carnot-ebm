  # ── Phase 44: Credibility Benchmarks ────────────────────────
  - id: exp147-apple-gsm8k
    milestone: "2026.04.10"
    deliverable: scripts/experiment_147_apple_gsm8k.py
    title: "Exp 147: Apple GSM8K adversarial benchmark — THE credibility experiment"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: Apple (arxiv 2410.05229) proved that LLMs pattern-match math — swapping numbers
      or adding one irrelevant sentence drops accuracy up to 65%, even o1-preview drops from
      92.7% → 77.4%. This experiment runs Carnot's verify-repair pipeline on the Apple adversarial
      variant and proves that constraint verification is immune to this. This is Goal #5 from
      research-program.md and is described as "the single most compelling experiment we can run."

      Target models: Qwen3.5-0.8B, google/gemma-4-E4B-it

      EXISTING CODE TO READ FIRST:
      - scripts/experiment_119_adversarial_generator.py — Apple adversarial generator
      - results/adversarial_gsm8k_data.json — pre-generated adversarial data (if exists)
      - scripts/experiment_120_adversarial_baseline.py — baseline methodology
      - scripts/experiment_121_adversarial_verify_repair.py — verify-repair script
      - results/experiment_121_results.json — prior results (if exists from Exp 130)
      - python/carnot/inference/model_loader.py — robust loader (Exp 123)
      - python/carnot/pipeline/verify_repair.py — VerifyRepairPipeline
      - research-program.md — Goal #5 and research-references.md Apple paper section

      TASK: Create scripts/experiment_147_apple_gsm8k.py

      CONCRETE STEPS:
      1. Load or generate adversarial dataset (200 GSM8K questions, 3 variants each):
         - control: original question
         - number_swapped: same structure, all numbers replaced with fresh values
         - irrelevant_sentence: one semantically irrelevant numeric sentence injected
         - combined: both perturbations applied
         If results/adversarial_gsm8k_data.json exists, use it directly.

      2. For each of 4 variants × 2 models × 3 modes (baseline/verify/verify-repair):
         a. baseline: model answers directly
         b. verify: verify only (flag violations, don't repair)
         c. verify-repair: full pipeline (up to 3 repair iterations)
         Use model_loader.load_model() with CARNOT_FORCE_LIVE or simulated fallback.

      3. Score answers (exact match or arithmetic equivalence for number-swapped).

      4. Report:
         - Accuracy table: model × variant × mode
         - Improvement delta (verify-repair vs baseline) per variant
         - Key result: delta on combined adversarial vs delta on control
         - Error breakdown: what types of errors does Ising catch on adversarial?
         - 95% bootstrap CI on each accuracy estimate

      5. The hypothesis to test: improvement delta is LARGER on adversarial variants than
         on control (because adversarial inputs cause more arithmetic errors to catch).

      6. Save full results to results/experiment_147_results.json
      7. Run: JAX_PLATFORMS=cpu .venv/bin/python scripts/experiment_147_apple_gsm8k.py
      8. Do NOT push. Do NOT modify scripts/research_conductor.py.

