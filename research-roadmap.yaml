  # ── Phase 46: eGPU Setup + Live Benchmarks ───────────────────
  - id: exp160-egpu-setup
    milestone: "2026.04.11"
    deliverable: scripts/experiment_160_egpu_setup.py
    title: "Exp 160: Connect eGPU (RX 7900 XTX via Thunderbolt) and validate ROCm/JAX stack"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: The machine has a Radeon RX 7900 XTX (24GB VRAM) available via Thunderbolt
      eGPU chassis (research-hardware-wishlist.md §"Current Hardware Inventory"). This GPU has
      gfx1100 architecture — unlike the iGPU (gfx1150), gfx1100 has full ROCm + JAX support.
      Connecting it would unblock Goals #1, #5, #6 (live model inference at scale). This
      experiment validates the hardware and software stack.

      EXISTING FILES TO READ FIRST:
      - research-hardware-wishlist.md — "ACTION: Connect RX 7900 XTX via Thunderbolt" section
      - research-program.md — Goal #1 (live model loading), Goal #5 (adversarial benchmark),
        Goal #6 (real benchmark validation at scale)

      TASK: Create scripts/experiment_160_egpu_setup.py
            and results/experiment_160_results.json

      CONCRETE STEPS:
      1. System detection:
         a. Check if eGPU is detected: `rocminfo 2>/dev/null | grep -i gfx`
         b. Check PyTorch ROCm: `import torch; torch.cuda.is_available()`
         c. Check JAX GPU: `import jax; print(jax.devices())`
         d. Record: (egpu_detected: bool, rocm_devices: list, jax_devices: list)

      2. If eGPU detected:
         a. Benchmark Qwen3.5-0.8B inference on eGPU vs CPU:
            - Use load_model from python/carnot/inference/model_loader.py
            - Generate 10 responses (warmup), then 20 responses for timing
            - Record: cpu_p50_ms, cpu_p99_ms, gpu_p50_ms, gpu_p99_ms, speedup_ratio
         b. Test JAX on GPU: run a 1000x1000 matmul, compare to CPU
         c. Update research-program.md: if JAX works on gfx1100, note that
            JAX_PLATFORMS=cpu is no longer required for Exp 161+

      3. If eGPU NOT detected:
         a. Document the blocker clearly (no Thunderbolt connection vs driver issue vs
            chassis not powered)
         b. Record fallback plan: subsequent live-inference experiments use
            CARNOT_SKIP_LLM=1 (simulation mode) and note the hardware blocker
         c. Still run CPU inference baseline for comparison

      4. Save to results/experiment_160_results.json:
         (egpu_detected, rocm_version, jax_backend, cpu_inference_ms, gpu_inference_ms,
          speedup_ratio, blocker_if_any)

      5. Hardware note: If the Thunderbolt chassis requires physical connection that
         hasn't been done yet, write the script to detect the current state and report
         it — do not fail, just document. The script should run successfully in either case.

      6. Run: .venv/bin/python scripts/experiment_160_egpu_setup.py
         (NO JAX_PLATFORMS=cpu prefix — this experiment is testing GPU availability)
      7. Do NOT push. Do NOT modify scripts/research_conductor.py.

