  - id: exp152-continual-learning
    milestone: "2026.04.10"
    deliverable: python/carnot/models/continual_gibbs.py
    title: "Exp 152: Continual learning for constraint retention across agent steps"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: Exp 116 showed LNN adaptive couplings hurt multi-step performance (10% vs 100%
      for static Ising). The failure mode: adapting within a chain destroys previously verified
      constraints. The fix proposed by Exp 139 arxiv scan (LoRA continual learning papers):
      use orthogonal parameter updates — when learning new step N constraints, project the
      gradient update onto the null space of prior step constraints. This preserves all previous
      verifications while adapting to new observations.

      Target models: Qwen3.5-0.8B, google/gemma-4-E4B-it

      EXISTING CODE TO READ FIRST:
      - python/carnot/models/gibbs.py — GibbsEBM (base model to extend)
      - scripts/experiment_116_lnn_coupling.py — LNN baseline (10% accuracy)
      - scripts/experiment_127_agent_workflow.py — agent workflow benchmark
      - python/carnot/pipeline/state_machine.py — ConstraintStateMachine (Exp 125)
      - research-program.md — §"What LNN Taught Us (Exp 116)"

      TASK: Create python/carnot/models/continual_gibbs.py

      CONCRETE STEPS:
      1. ContinualGibbsModel class extending GibbsEBM:
         - gradient_buffer: list of prior step gradients (as unit vectors)
         - update_step(observations: jnp.ndarray, step_idx: int):
             * Compute gradient of energy w.r.t. observations for current step
             * Project gradient onto null space of all prior step gradients
               (Gram-Schmidt orthogonalization against gradient_buffer)
             * Apply orthogonal component only as parameter update
         - reset() — clears gradient buffer (call at start of new agent chain)
         - Backward compatible with GibbsEBM interface (implements EnergyFunction)

      2. Benchmark on 5-step math reasoning chains (20 problems):
         - Compare: static Ising, LNN (Exp 116 results), ContinualGibbs
         - Metric: accuracy on step 5 when steps 1-4 constraints are accumulated
         - Secondary: does accuracy degrade from step 1 to step 5 under each approach?
         - Target: ContinualGibbs > 80% on step 5 (vs LNN 10%, static Ising 100%)

      3. Tests in tests/python/test_continual_gibbs.py:
         - Test that orthogonal updates preserve prior step gradients
         - Test reset() clears buffer correctly
         - 100% coverage

      4. Save to results/experiment_152_results.json
      5. Run: JAX_PLATFORMS=cpu .venv/bin/pytest tests/python/test_continual_gibbs.py -q
      6. Run: JAX_PLATFORMS=cpu .venv/bin/python scripts/experiment_152_continual.py
         (create this script: runs the 5-step chain benchmark from step 2)
      7. Do NOT push. Do NOT modify scripts/research_conductor.py.

  - id: exp153-kan-refinement
    milestone: "2026.04.10"
    deliverable: scripts/experiment_153_kan_refinement.py
    title: "Exp 153: KAN adaptive mesh refinement for energy landscapes"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: KAN achieves 0.994 AUROC with 8.7x fewer params than Ising (Exp 108-109).
      The spline structure allows adaptive mesh refinement: edges with high curvature (complex
      nonlinear constraints) get more knots; near-linear edges get fewer. This is the Tier 4
      "adaptive energy structure" mechanism from research-program.md. The KAEM paper from
      Exp 139 (arxiv 2506.14167) and EvoKAN (arxiv 2503.01618) validate this direction.

      EXISTING CODE TO READ FIRST:
      - python/carnot/models/kan.py — KANConstraintModel (Exp 103/108)
      - scripts/experiment_108_kan_prototype.py — KAN training results
      - scripts/experiment_109_kan_benchmark.py — 0.994 AUROC results
      - research-references.md — §"KAN Adaptive Mesh Refinement for Energy Landscapes"
      - research-program.md — "Continuous Self-Learning" Tier 4

      TASK: Create scripts/experiment_153_kan_refinement.py

      CONCRETE STEPS:
      1. Add refinement to KANConstraintModel:
         - compute_edge_curvature() -> dict[edge_id, curvature_score]
           Method: sample 100 points per edge, compute |d²f/dx²| via JAX autodiff
         - refine(threshold_multiplier=1.5):
           * For each edge: if curvature > threshold_multiplier × mean_curvature:
               insert knot at the highest-curvature point (bisect the interval)
           * For each edge: if curvature < mean_curvature / threshold_multiplier:
               merge adjacent knots if curvature difference is minimal
           * Returns: (added_knots: int, removed_knots: int)
         - This modifies the spline grid in-place and re-initializes affected weights

      2. Benchmark on constraint verification task (arithmetic + logic 200 questions):
         a. Train KAN to baseline (same as Exp 109 methodology)
         b. Run refinement(threshold_multiplier=1.5)
         c. Fine-tune for 10 more epochs post-refinement
         d. Compare AUROC before vs after refinement
         e. Compare parameter count before vs after

      3. Analysis:
         - Which edges gained knots? (High-curvature → complex nonlinear constraint)
         - Which edges lost knots? (Near-linear → effectively linear constraint)
         - Interpretability: do high-curvature edges correspond to semantically complex
           constraint interactions?

      4. Target: AUROC maintained or improved post-refinement;
                 parameter count changes by ≤ ±20%

      5. Save to results/experiment_153_results.json
      6. Run: JAX_PLATFORMS=cpu .venv/bin/python scripts/experiment_153_kan_refinement.py
      7. Do NOT push. Do NOT modify scripts/research_conductor.py.
