  # ── Phase 10b: Constraint Coverage ──────────────────────────
  - id: exp73-constraint-coverage
    milestone: "2026.04.3"
    deliverable: scripts/experiment_73_constraint_coverage.py
    title: "Exp 73: Constraint coverage metric"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: The constraint pipeline extracts and verifies constraints, but we
      don't know what FRACTION of an LLM's claims are actually covered. This
      experiment quantifies the gap — the "dark matter" that escapes verification.

      EXISTING CODE TO READ FIRST:
      - scripts/experiment_58_multi_domain_benchmark.py — benchmark results
      - scripts/experiment_47_llm_self_constraints.py — constraint extraction
      - scripts/experiment_48_code_constraints.py — code constraints
      - scripts/experiment_49_nl_constraints.py — NL constraints

      TASK: Create scripts/experiment_73_constraint_coverage.py

      CONCRETE STEPS:
      1. Define claim types taxonomy:
         a. Arithmetic claims (numeric values, comparisons)
         b. Logical claims (implications, contradictions)
         c. Factual claims (named entities, dates, quantities)
         d. Structural claims (code types, bounds, returns)
         e. Semantic claims (meaning, intent, correctness of logic)

      2. For 50 LLM answers (from Exp 58 or generate fresh):
         - Manually annotate total verifiable claims per answer
         - Run constraint extractor pipeline
         - Count how many claims have corresponding constraints

      3. Compute constraint coverage = extracted / total per domain:
         - Arithmetic: expect high (types, bounds, carry chains)
         - Code: expect medium (types/bounds but not logic)
         - Logic: expect medium (entailment but not all cases)
         - Factual: expect low (no KB lookup in pipeline)
         - Semantic: expect near-zero (fundamental limitation)

      4. Correlate coverage with accuracy:
         - Do higher-coverage answers have higher accuracy after repair?
         - Is there a coverage threshold below which repair doesn't help?

      5. Print coverage breakdown table per domain and claim type
      6. Run: JAX_PLATFORMS=cpu .venv/bin/python scripts/experiment_73_constraint_coverage.py
      7. Do NOT push. Do NOT modify scripts/research_conductor.py.

