  - id: exp166-jepa-logic-symbolic-features
    milestone: "2026.04.12"
    deliverable: results/jepa_training_pairs_logic_v3.json
    title: "Exp 166: Logic-aware JEPA training data with symbolic features"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: Exp 155 trained JEPA v2 with multi-domain data but logic AUROC=0.479 (chance).
      Root cause: RandomProjection byte-histogram embeddings cannot distinguish valid from invalid
      logical arguments at the byte level. Logic requires structured symbolic features:
      truth table consistency, quantifier patterns, negation scope, entailment structure.
      This experiment generates 500 logic pairs with 40-dimensional symbolic feature vectors
      to replace RandomProjection for the logic domain.

      Date: {date}. Target models: Qwen3.5-0.8B, google/gemma-4-E4B-it

      EXISTING CODE TO READ FIRST:
      - results/jepa_training_pairs_v2.json — Exp 155 data schema to extend
      - scripts/experiment_154_collect_multidom_pairs.py — multi-domain collection methodology
      - python/carnot/pipeline/extract.py — LogicExtractor for violation labeling
      - python/carnot/embeddings/fast_embedding.py — RandomProjectionEmbedding (do NOT use for logic)
      - research-program.md — Tier 3 self-learning, JEPA fast-path targets

      TASK: Create scripts/experiment_166_logic_symbolic_features.py
            and results/jepa_training_pairs_logic_v3.json

      CONCRETE STEPS:
      1. Define logic_feature_vector(text: str) -> np.ndarray[256] that computes:
         a. 40-dim symbolic features:
            - has_negation: count("not"|"no"|"never"|"neither"|"nor") / len(tokens)
            - has_quantifier_all: count("all"|"every"|"each") > 0
            - has_quantifier_some: count("some"|"many"|"most") > 0
            - has_quantifier_no: count("no "|"none"|"neither") > 0
            - has_therefore: count("therefore"|"thus"|"hence"|"so ") > 0
            - has_if_then: count("if ") > 0 and count("then ") > 0
            - has_contradiction: count("but"|"however"|"although"|"yet") > 0
            - conditional_depth: min(count("if "), 3) / 3
            - n_clauses: count(","|";"|".") / max(len(tokens), 1)
            - conclusion_ratio: len(last_sentence) / max(len(text), 1)
            - negation_after_quantifier: 1 if "all...not" or "no...all" pattern
            - double_negation: 1 if "not.*not" in text (re.search)
            - [pad remaining 40-dim features with derived combinations and zeros]
         b. Pad to 256 dims: np.pad(features_40, (0, 216), mode='constant')
         c. L2-normalize the 256-dim vector

      2. Generate 500 logic problem pairs (250 valid, 250 with deliberate violations):
         VALID ARGUMENT TYPES (125 pairs, each with correct prefix extracts):
         - Modus ponens: "If P then Q. P is true. Therefore Q."
         - Modus tollens: "If P then Q. Q is false. Therefore P is false."
         - Disjunctive syllogism: "P or Q. Not P. Therefore Q."
         - Universal instantiation: "All A are B. X is an A. Therefore X is a B."
         - Categorical syllogism: "All M are P. All S are M. Therefore All S are P."

         INVALID ARGUMENT TYPES (125 pairs, each with false conclusion):
         - Affirming the consequent: "If P then Q. Q. Therefore P." (FALLACY)
         - Denying the antecedent: "If P then Q. Not P. Therefore not Q." (FALLACY)
         - Undistributed middle: "All A are C. All B are C. Therefore A=B." (FALLACY)
         - Negation scope error: "Not all A are B" → "All A are not B" (WRONG)
         - Quantifier shift: "Some A are B. Some B are C. Therefore some A are C." (INVALID)

         Use concrete subject matter (animals, shapes, people, cities) for naturalness.
         Generate 5 instances per argument type with varied content.

      3. For each of the 500 logic texts, extract 4 prefix ratios (10%, 25%, 50%, 75%):
         a. Compute logic_feature_vector(prefix_text) → embedding[256]
         b. Run LogicExtractor(full_text) to get violated_logic label
         c. Record: (prefix_ratio, embedding[256], violated_logic, domain="logic", source_exp=166)

      4. Merge with arithmetic data from results/jepa_training_pairs_v2.json (arithmetic only):
         Combined schema: (pairs:[...], total, domain_counts, positive_rate_per_domain)
         Ensure: at least 200 positive (violated=True) examples in logic domain.

      5. Print balance summary: pairs per domain, positive rate, feature vector stats.

      6. Run: JAX_PLATFORMS=cpu .venv/bin/python scripts/experiment_166_logic_symbolic_features.py
      7. Do NOT push. Do NOT modify scripts/research_conductor.py.

  - id: exp167-jepa-v3-symbolic-heads
    milestone: "2026.04.12"
    deliverable: results/jepa_predictor_v3.safetensors
    title: "Exp 167: JEPA predictor v3 — domain-specific symbolic embedding heads"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: Exp 155 achieved logic AUROC=0.479 (chance) because RandomProjection byte-histogram
      cannot represent logical structure. Exp 166 collected 500 logic pairs with 40-dim symbolic
      features padded to 256 dims. This experiment retrains JEPAViolationPredictor with the new
      logic data, targeting logic AUROC >0.70 and macro AUROC >0.75.

      Date: {date}. Target models: Qwen3.5-0.8B, google/gemma-4-E4B-it

      EXISTING CODE TO READ FIRST:
      - python/carnot/pipeline/jepa_predictor.py — JEPAViolationPredictor (256→64→32→3 MLP)
      - results/jepa_predictor_v2.safetensors — v2 model (baseline to beat)
      - results/jepa_training_pairs_logic_v3.json — new logic pairs from Exp 166
      - results/jepa_training_pairs_v2.json — existing arithmetic + code data (Exp 155)
      - scripts/experiment_155_train_jepa_v2.py — v2 training script to extend
      - research-program.md — Tier 3 self-learning targets

      TASK: Create scripts/experiment_167_train_jepa_v3.py
            and results/jepa_predictor_v3.safetensors

      CONCRETE STEPS:
      1. Load training data:
         a. results/jepa_training_pairs_v2.json — arithmetic + code pairs
         b. results/jepa_training_pairs_logic_v3.json — new symbolic logic pairs
         c. Combine: verify each pair has embedding[256], violated_arithmetic/code/logic, domain

      2. Verify embedding compatibility:
         - Arithmetic pairs: RandomProjection embeddings (float32[256], L2-normalized)
         - Code pairs: RandomProjection embeddings (float32[256], L2-normalized)
         - Logic pairs: symbolic features padded to 256 dims, L2-normalized (Exp 166)
         All 256-dim → compatible with existing MLP input layer. No architecture change needed.

      3. Retrain JEPAViolationPredictor with improvements:
         a. Stratified 80/20 split by (domain × violated) label
         b. Per-domain class weights: pos_weight = n_neg/n_pos per domain (clip [0.5, 10])
         c. Domain-weighted loss: multiply logic loss by 2.0 (logic is the failing domain,
            give it priority during training without changing architecture)
         d. Same architecture: Linear(256, 64) → ReLU → Linear(64, 32) → ReLU → Linear(32, 3)
         e. 200 epochs with early stopping on val macro AUROC (patience=20)
         f. Adam lr=1e-3, weight decay=1e-4

      4. Evaluate on held-out validation set:
         - Per-domain AUROC: arithmetic, code, logic
         - Macro AUROC (target: >0.75)
         - Precision/recall at threshold=0.5 per domain
         - Print comparison table vs v2 (arithmetic=0.721, code=0.776, logic=0.479)

      5. Save to results/jepa_predictor_v3.safetensors (same safetensors format as v1/v2)
         Include metadata key: ("version": "v3", "macro_auroc": "...", "logic_auroc": "...")

      6. Save results to results/experiment_167_results.json:
         (v2_per_domain, v3_per_domain, macro_improvement, logic_improvement, target_met: bool)

      7. Add/update tests in tests/python/test_jepa_predictor.py:
         - Test v3 loads without error
         - Test logic domain prediction varies across symbolic valid vs invalid inputs
         - 100% coverage on any new code paths
         Run: JAX_PLATFORMS=cpu .venv/bin/pytest tests/python/test_jepa_predictor.py -q

      8. Run: JAX_PLATFORMS=cpu .venv/bin/python scripts/experiment_167_train_jepa_v3.py
      9. Do NOT push. Do NOT modify scripts/research_conductor.py.

