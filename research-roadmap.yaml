    milestone: "2026.04.12"
    deliverable: python/carnot/models/lagoon.py
    title: "Exp 174: LagONN constraint solver — escape infeasible Ising states (arxiv 2505.07179)"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: arxiv 2505.07179 (2025) introduces Lagrange Oscillatory Neural Networks (LagONN):
      Ising machines using Lagrange multipliers to escape infeasible states in constrained
      optimization. Standard Ising machines get stuck in infeasible local minima when hard
      constraints exist. LagONN augments the energy with constraint-violation penalties that
      grow over time via dual ascent, pushing solutions toward feasibility. This implements
      that approach as a new model in the Carnot ecosystem.

      Date: {date}. Target models: Qwen3.5-0.8B, google/gemma-4-E4B-it

      EXISTING CODE TO READ FIRST:
      - python/carnot/models/ising.py — IsingEBM base (LagONN extends Ising)
      - python/carnot/samplers/parallel_ising.py — ParallelIsingSampler (compare against)
      - python/carnot/verify/constraint.py — ConstraintTerm protocol
      - crates/carnot-ising/src/lib.rs — Rust Ising (understand coupling structure)
      - research-references.md — "Lagrange Oscillatory Neural Networks" section

      TASK: Create python/carnot/models/lagoon.py
            and scripts/experiment_174_lagoon_benchmark.py
            and results/experiment_174_results.json

      CONCRETE STEPS:
      1. LagONN class implementing EnergyFunction protocol:
         class LagONN:
           J: jnp.ndarray  # coupling matrix (n × n)
           bias: jnp.ndarray  # bias vector (n,)
           A: jnp.ndarray  # constraint matrix (m × n) — Ax ≤ b hard constraints
           b: jnp.ndarray  # constraint bounds (m,)
           lambda_: jnp.ndarray  # Lagrange multipliers (m,) — initialized to zeros

           def energy(self, x: jnp.ndarray) -> jnp.ndarray:
             # Base Ising energy
             e_ising = -0.5 * x @ self.J @ x - self.bias @ x
             # Constraint violation penalty (non-negative: only penalize violations)
             violation = jnp.maximum(0.0, self.A @ x - self.b)
             e_lagrange = self.lambda_ @ violation
             return e_ising + e_lagrange

           def update_lambda(self, x: jnp.ndarray, lr: float = 0.01) -> 'LagONN':
             # Dual ascent step: increase penalty for currently-violated constraints
             violation = jnp.maximum(0.0, self.A @ x - self.b)
             new_lambda = jnp.maximum(0.0, self.lambda_ + lr * violation)  # λ ≥ 0 always
             return dataclasses.replace(self, lambda_=new_lambda)

           def sample(self, n_steps: int = 100, n_samples: int = 10, lr: float = 0.01):
             # Interleave Gibbs sampling with lambda updates
             # After each Gibbs sweep: update_lambda(current_x)
             # Return final samples and final lambda_

