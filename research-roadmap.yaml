  - id: exp101-agent-workflow-e2e
    milestone: "2026.04.6"
    deliverable: scripts/experiment_101_agent_verification.py
    title: "Exp 101: Agent workflow verification end-to-end"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: Exp 99 built ConstraintState propagation and Exp 100 added rollback.
      This experiment puts them together in realistic agent workflow scenarios to
      validate the full agentic verification pipeline end-to-end. Three workflow
      templates test different reasoning patterns: sequential computation (math tutor),
      code generation (code assistant), and information synthesis (research assistant).

      Target models: Qwen3.5-0.8B, google/gemma-4-E4B-it

      EXISTING CODE TO READ FIRST:
      - python/carnot/pipeline/agentic.py — ConstraintState, AgentStep, AgentVerifier,
        verify_chain, find_root_cause, rollback_to, repair_chain (Exp 99-100)
      - python/carnot/pipeline/verify_repair.py — VerifyRepairPipeline
      - python/carnot/pipeline/extract.py — AutoExtractor (with new extractors from Phase 21)

      TASK: Create scripts/experiment_101_agent_verification.py

      CONCRETE STEPS:
      1. Define 3 agent workflow templates, each with 10 instances (5 correct, 5 with errors):

         a. Math Tutor workflow (4 steps):
            Step 1: Read and understand the problem
            Step 2: Identify the mathematical approach
            Step 3: Execute computation step by step
            Step 4: Verify and state final answer
            Error types: wrong operation in step 3, incorrect approach in step 2

         b. Code Assistant workflow (4 steps):
            Step 1: Parse the specification/requirements
            Step 2: Write the function implementation
            Step 3: Write test cases
            Step 4: Run tests and report results
            Error types: incorrect implementation in step 2, wrong test in step 3

         c. Research Assistant workflow (4 steps):
            Step 1: Formulate search query from user question
            Step 2: Gather relevant facts (simulated search results)
            Step 3: Synthesize facts into coherent answer
            Step 4: Cite sources and provide confidence
            Error types: misattributed fact in step 3, wrong citation in step 4

      2. For each workflow instance:
         a. Run AgentVerifier.verify_chain() with full constraint propagation
         b. Record: per-step verification results, constraint state snapshots
         c. For error cases: record find_root_cause result vs actual error step
         d. Attempt repair_chain() and record success/failure

      3. Analysis:
         a. Error detection rate: what fraction of planted errors were detected?
         b. Detection latency: how many steps after the error before detection?
            (ideal: detect AT the error step, not 2 steps later)
         c. Root cause accuracy: find_root_cause vs actual error step
         d. Repair success: does repair_chain fix the error AND downstream steps?
         e. False positive rate: how many correct chains flagged incorrectly?
         f. Per-workflow-type comparison
         g. Constraint coverage: what fraction of each step's claims were extractable?

      4. Compare: per-step agentic verification vs final-answer-only verification
         a. Run same workflows with only final step verification
         b. Which errors does agentic catch that final-only misses?

      5. Save results to {project_root}/results/experiment_101_results.json

      6. Run: JAX_PLATFORMS=cpu .venv/bin/python scripts/experiment_101_agent_verification.py
      7. Do NOT push. Do NOT modify scripts/research_conductor.py.

  - id: exp104-energy-guided-sampling
    milestone: "2026.04.6"
    deliverable: python/carnot/inference/guided_decoding.py
    title: "Exp 104: Energy-guided token sampling prototype"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: Exp 102 measured constraint check latency. This experiment builds
      the first prototype of energy-guided LLM generation: constraint energy modifies
      token probabilities during generation, steering the LLM away from constraint-
      violating continuations. If Exp 102 showed latency is too high (>10ms per check),
      this experiment still builds the prototype but uses batched checking (every K
      tokens) instead of per-token checking.

      This is the bridge from post-hoc verification to generation-time steering —
      the path to Kona (research-program.md Goal #9).

      Target models: Qwen3.5-0.8B, google/gemma-4-E4B-it

      EXISTING CODE TO READ FIRST:
      - scripts/experiment_102_latency_benchmark.py — latency results (Exp 102)
      - results/experiment_102_results.json — timing data
      - scripts/experiment_66_differentiable_constraints.py — differentiable verifier
      - python/carnot/pipeline/verify_repair.py — VerifyRepairPipeline
      - python/carnot/pipeline/extract.py — AutoExtractor

      TASK: Create python/carnot/inference/guided_decoding.py + experiment script

      CONCRETE STEPS:
      1. Create python/carnot/inference/guided_decoding.py:
         a. EnergyGuidedSampler class:
            - __init__(pipeline: VerifyRepairPipeline, alpha: float = 0.5,
                       check_every_k: int = 1):
              alpha = guidance strength (how much energy influences logits)
              check_every_k = frequency of constraint checks (1 = every token)
            - compute_energy_penalty(text_so_far: str) -> float:
              Run AutoExtractor + energy computation on partial text
              Return constraint energy (higher = more violations)
            - modify_logits(logits: jnp.ndarray, text_so_far: str) -> jnp.ndarray:
              penalty = compute_energy_penalty(text_so_far)
              If penalty > threshold: reduce probability of continuation tokens
              that would increase energy (via energy gradient if differentiable
              pipeline available, else uniform penalty on all tokens)
              Return modified logits
            - generate(prompt: str, model, tokenizer, max_tokens: int = 256,
                       temperature: float = 1.0) -> str:
              Token-by-token generation with energy guidance:
              For each token:
                1. Get model logits for next token
                2. If step % check_every_k == 0: modify logits via energy penalty
                3. Sample from modified distribution
                4. Append token to sequence
              Return generated text

      2. Create scripts/experiment_104_guided_decoding.py:
         a. Test on 50 GSM8K-style arithmetic word problems:
            - Use Qwen3.5-0.8B if available, else simulate token-by-token generation
            - If model unavailable: simulate by generating correct/incorrect answers
              and applying energy penalties to demonstrate the mechanism
         b. Three modes:
            - Greedy baseline (no energy guidance)
            - Energy-guided with check_every_k=1 (per-token, if latency permits)
            - Energy-guided with check_every_k=5 (batched, always feasible)
            - Post-hoc verify-repair (for comparison)
         c. Alpha sweep: [0.1, 0.3, 0.5, 1.0, 2.0]
         d. Metrics per mode:
            - Accuracy (correct final answer)
            - Constraint satisfaction rate during generation
            - Total wall-clock time per question
            - Latency overhead vs unguided generation

      3. Create tests/python/test_guided_decoding.py:
         a. Test EnergyGuidedSampler initialization
         b. Test compute_energy_penalty with known inputs
         c. Test modify_logits reduces high-energy continuations
         d. Test generate with mock model (verify token-by-token flow)
         e. Every test references REQ-VERIFY-001 or SCENARIO-VERIFY-004

      4. Save results to {project_root}/results/experiment_104_results.json

      5. Run: JAX_PLATFORMS=cpu .venv/bin/pytest tests/python/test_guided_decoding.py -q
      6. Run: JAX_PLATFORMS=cpu .venv/bin/pytest tests/python -q
      7. Run: JAX_PLATFORMS=cpu .venv/bin/python scripts/experiment_104_guided_decoding.py
      8. Do NOT push. Do NOT modify scripts/research_conductor.py.

