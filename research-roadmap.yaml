  # ── Phase 36: LNN Adaptive Constraints ──────────────────────
  - id: exp128-lnn-prototype
    milestone: "2026.04.8"
    deliverable: python/carnot/models/lnn.py
    title: "Exp 128: LNN adaptive constraint model"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: Liquid Neural Networks have parameters that adapt during inference
      via differential equations. For Carnot, this means constraint coupling
      strengths that evolve as new facts arrive in multi-turn agent workflows.

      EXISTING CODE TO READ FIRST:
      - python/carnot/models/ising.py — static Ising model (for comparison)
      - python/carnot/models/kan.py — KAN model (Exp 108)
      - python/carnot/pipeline/state_machine.py — agent state machine (Exp 125)

      TASK: Create python/carnot/models/lnn.py

      CONCRETE STEPS:
      1. LiquidConstraintModel class:
         - Coupling matrix that evolves via ODE: dJ/dt = f(J, observations)
         - f parameterized as small MLP (learnable)
         - step(observation) -> updates couplings based on new information
         - energy(state) -> computed with current (adapted) couplings
         - reset() -> return to initial couplings

      2. Training: learn the ODE parameters from multi-step sequences
         - Input: sequence of (observation, correct_label) pairs
         - Loss: sum of energy-based classification losses across sequence
         - The model should learn to ADAPT its couplings to be more accurate
           as it sees more observations

      3. Tests in tests/python/test_lnn.py

      4. Run: JAX_PLATFORMS=cpu .venv/bin/pytest tests/python -q
      5. Do NOT push. Do NOT modify scripts/research_conductor.py.
