  # ── Phase 45: Factual Constraint Extraction ──────────────────
  - id: exp157-spilled-energy
    milestone: "2026.04.11"
    deliverable: python/carnot/pipeline/spilled_energy.py
    title: "Exp 157: Spilled energy pre-filter for factual hallucination detection"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: arxiv 2602.18671 (ICLR 2026) shows LLMs can be reinterpreted as EBMs where
      "spilled energy" = discrepancy between logit energy and output energy detects factual
      hallucinations. This is a fast pre-filter requiring no external KB — just the LLM's
      own logit distribution. Exp 88 showed factual domain has 0% constraint coverage;
      this adds a first lightweight signal before the KB-backed extractor (Exp 158).

      Target models: Qwen3.5-0.8B, google/gemma-4-E4B-it

      EXISTING CODE TO READ FIRST:
      - python/carnot/pipeline/extract.py — ConstraintExtractor Protocol, AutoExtractor
      - python/carnot/verify/constraint.py — ConstraintTerm, ComposedEnergy
      - python/carnot/inference/model_loader.py — generate() function (returns logits if available)
      - python/carnot/pipeline/verify_repair.py — VerifyRepairPipeline
      - research-references.md — "Spilled Energy Pre-Filter" section
      - research-program.md — Goal #3 (factual constraint extractor)

      TASK: Create python/carnot/pipeline/spilled_energy.py

      CONCRETE STEPS:
      1. SpilledEnergyExtractor class implementing ConstraintExtractor Protocol:
         a. extract(text: str, logits: jnp.ndarray | None = None) -> list[ConstraintTerm]
            - If logits is None (no model access): return empty list (graceful degradation)
            - If logits available:
              * For each generated token position t:
                spilled_t = sum(max(0, logit_energy_t - output_energy_t))
                where logit_energy = -log_softmax(logits[t]) summed over vocab
                and output_energy = -log(p_output_token)
              * Total spilled energy = mean(spilled_t) over response tokens
              * Create SpilledEnergyConstraint: satisfied iff spilled_energy < threshold
         b. SpilledEnergyConstraint: a ConstraintTerm where energy = spilled_energy value
            Interpretation: low energy = model is confident = less hallucination risk

      2. Integrate into AutoExtractor:
         - AutoExtractor.extract(text, logits=None, ...) — add optional logits parameter
         - If logits provided: run SpilledEnergyExtractor in addition to existing extractors
         - Backward compatible: logits=None → no change to existing behavior

      3. Benchmark on TruthfulQA (50 factual questions):
         a. Generate simulated logit tensors where "wrong" answers have high spilled energy
         b. Measure AUROC of SpilledEnergyConstraint (satisfied/violated) vs ground truth
         c. Compare to NL extractor coverage on the same questions
         d. Target: AUROC >0.60 on factual domain (better than random)

      4. Tests in tests/python/test_spilled_energy.py:
         - Test SpilledEnergyExtractor with mock logits
         - Test graceful degradation when logits=None
         - Test SpilledEnergyConstraint energy value is non-negative
         - Test AutoExtractor backward compatibility (logits=None gives same output)
         - 100% coverage of spilled_energy.py required

      5. Run: JAX_PLATFORMS=cpu .venv/bin/pytest tests/python/test_spilled_energy.py -q
      6. Run: JAX_PLATFORMS=cpu .venv/bin/python scripts/experiment_157_spilled_energy.py
         (create script: benchmark on TruthfulQA subset, print AUROC, save results)
      7. Do NOT push. Do NOT modify scripts/research_conductor.py.

  - id: exp158-factual-extractor
    milestone: "2026.04.11"
    deliverable: python/carnot/pipeline/factual_extractor.py
    title: "Exp 158: Wikidata-backed factual claim extractor (closes Goal #3)"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: Exp 88 showed 100% false negative rate on factual claims. No amount of
      arithmetic/logic constraint work closes this gap. The fix (research-program.md Goal #3)
      requires external knowledge grounding. arxiv 2602.03417 (FactNet, 1.7B assertions) and
      Wikidata SPARQL provide free knowledge sources. This experiment builds the FactualExtractor.

      Target models: Qwen3.5-0.8B, google/gemma-4-E4B-it

      EXISTING CODE TO READ FIRST:
      - python/carnot/pipeline/extract.py — ConstraintExtractor Protocol, AutoExtractor
      - python/carnot/verify/constraint.py — ConstraintTerm, IsingConstraint
      - python/carnot/pipeline/spilled_energy.py — SpilledEnergyExtractor (Exp 157)
      - research-references.md — "FactNet" and "Wikidata" sections
      - research-program.md — Goal #3 (factual constraint extractor)

      TASK: Create python/carnot/pipeline/factual_extractor.py

      CONCRETE STEPS:
      1. FactualExtractor class implementing ConstraintExtractor Protocol:

         a. Entity extraction layer:
            - Use regex + simple NER patterns to extract named entities from text
            - Types: person names, places (City, Country), dates (YYYY, month year),
              organizations, numeric quantities with units
            - Do NOT import spaCy — use only stdlib regex + simple pattern matching
              to keep the dependency footprint minimal

         b. Claim decomposition:
            - Extract (subject, predicate, object) triples from the text
            - Patterns: "X is Y", "X was born in Y", "X is located in Y", "X has N Y"
            - Compile a list of factual claims found in the text

         c. Knowledge base lookup:
            - PRIMARY: Wikidata SPARQL (https://query.wikidata.org/sparql) via requests
            - Build a simple entity→QID resolver (first result from wikidata label search)
            - For each claim: query if (subject_QID, predicate, object) is in Wikidata
            - FALLBACK: If network unavailable (requests timeout >5s): return empty list
              with a logged warning — graceful degradation is required
            - Cache lookups in a module-level dict to avoid duplicate API calls

         d. Constraint encoding:
            - Each verified claim → IsingConstraint (satisfied=True if KB confirms)
            - Each unverified claim → no constraint (don't add what we can't check)
            - Return list[ConstraintTerm]

      2. Integrate into AutoExtractor:
         - Add FactualExtractor as an optional extractor type in AutoExtractor
         - Default: disabled (opt-in via domain="factual" or explicit extractor= param)
         - Ensure the network timeout fallback doesn't block the pipeline

      3. Benchmark on TruthfulQA subset (50 questions):
         - Measure: constraint coverage (claims extracted per question)
         - Measure: constraint accuracy (satisfied/violated vs ground truth)
         - Target: constraint coverage >30% of factual questions have ≥1 constraint
         - Save to results/experiment_158_results.json

      4. Tests in tests/python/test_factual_extractor.py:
         - Test entity extraction regex patterns (mock text, no network)
         - Test claim decomposition on example sentences
         - Test graceful degradation on network timeout (mock requests.get to timeout)
         - Test IsingConstraint encoding of extracted claims
         - Test AutoExtractor integration with domain="factual"
         - 100% coverage of factual_extractor.py required

      5. Run: JAX_PLATFORMS=cpu .venv/bin/pytest tests/python/test_factual_extractor.py -q
      6. Run: JAX_PLATFORMS=cpu .venv/bin/python scripts/experiment_158_factual_extractor.py
         (create script: run on 50 TruthfulQA questions, report coverage + accuracy)
      7. Do NOT push. Do NOT modify scripts/research_conductor.py.

