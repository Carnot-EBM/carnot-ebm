         - Max-3-SAT: n variables, m clauses (each clause: 3 literals, exactly)
           Convert SAT to Ising: each clause penalizes violating assignment
           Hard constraint A: at least K clauses must be satisfied (Ax ≥ K → encode as ≤)
         - Scheduling: n jobs, m time slots, each job must fit in one slot without overlap
           Hard constraint: total time ≤ T, job dependencies respected
         Generate 20 instances of each type (200-variable SAT, 10-job scheduling)

      3. Benchmark vs ParallelIsingSampler:
         For each problem instance:
           - Run ParallelIsingSampler (no Lagrange): record final feasibility rate, energy
           - Run LagONN: record final feasibility rate, energy, lambda trajectory
