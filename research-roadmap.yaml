  - id: exp106-truthfulqa
    milestone: "2026.04.6"
    deliverable: scripts/experiment_106_truthfulqa.py
    title: "Exp 106: TruthfulQA benchmark with factual extractor"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: Factual hallucination is the hardest domain for constraint verification
      because it requires external knowledge. Exp 98 created the FactualKBExtractor
      with a 1000-fact knowledge base. TruthfulQA is the standard benchmark for
      testing whether models produce truthful answers. This experiment measures how
      well the factual constraint pipeline performs on this challenging benchmark.

      Target models: Qwen3.5-0.8B, google/gemma-4-E4B-it

      EXISTING CODE TO READ FIRST:
      - python/carnot/pipeline/knowledge_base.py — KnowledgeBase, FactualKBExtractor (Exp 98)
      - python/carnot/pipeline/verify_repair.py — VerifyRepairPipeline
      - python/carnot/pipeline/extract.py — AutoExtractor (with FactualKBExtractor)
      - scripts/experiment_98_factual_kb.py — factual KB experiment results

      TASK: Create scripts/experiment_106_truthfulqa.py

      CONCRETE STEPS:
      1. Load TruthfulQA dataset:
         a. Try: `from datasets import load_dataset; ds = load_dataset("truthful_qa", "generation", split="validation")`
         b. If unavailable, create 100 synthetic TruthfulQA-style questions:
            - 25 factual (capitals, dates, scientific facts)
            - 25 common misconceptions ("Is the Great Wall visible from space?")
            - 25 tricky phrasing ("Who invented the lightbulb?" — multiple answers)
            - 25 adversarial (questions designed to elicit plausible-sounding wrong answers)
         c. Each question has best_answer and incorrect_answers fields

      2. Model inference:
         a. Generate answers with Qwen3.5-0.8B (or simulate)
         b. Generate answers with Gemma4-E4B-it (or simulate)
         c. For simulation: mix of best_answer (70%) and incorrect_answers (30%)

      3. Verification pipeline:
         a. Baseline: model answer vs best_answer (exact/fuzzy match)
         b. Verify-only: VerifyRepairPipeline.verify() with FactualKBExtractor
         c. Verify-repair: verify_and_repair() with max_repairs=3

      4. Metrics:
         a. Factual hallucination detection rate (true positives / total wrong answers)
         b. False positive rate (correct answers flagged as violations)
         c. Knowledge base hit rate (claims matched to KB entries / total claims extracted)
         d. KB coverage by category (capitals, dates, science, people, geography)
         e. Per-model comparison
         f. Improvement from verify-repair: how many wrong answers were corrected?

      5. Error analysis:
         a. What types of factual claims does the KB catch best?
         b. What types does it miss? (claims not in the KB)
         c. Are there false verifications? (KB says correct but answer is wrong)
         d. Recommendations: what KB expansion would help most?

      6. Save results to {project_root}/results/experiment_106_results.json
      7. Save summary to {project_root}/ops/truthfulqa-results.md

      8. Run: JAX_PLATFORMS=cpu .venv/bin/python scripts/experiment_106_truthfulqa.py
      9. Do NOT push. Do NOT modify scripts/research_conductor.py.

