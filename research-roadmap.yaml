  - id: exp125-constraint-state-machine
    milestone: "2026.04.8"
    deliverable: python/carnot/pipeline/state_machine.py
    title: "Exp 125: Constraint state machine for agent workflows"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: Exp 99 built constraint state propagation. This experiment
      creates a production-grade ConstraintStateMachine that agent frameworks
      can integrate.

      EXISTING CODE TO READ FIRST:
      - python/carnot/pipeline/agentic.py — ConstraintState, propagate()
      - python/carnot/pipeline/verify_repair.py — VerifyRepairPipeline
      - python/carnot/pipeline/extract.py — AutoExtractor

      TASK: Create python/carnot/pipeline/state_machine.py

      CONCRETE STEPS:
      1. ConstraintStateMachine class:
         - step(input_text, output_text) -> StepResult
         - Internally: extract constraints, verify against accumulated state,
           flag contradictions with previous facts, update state
         - rollback(to_step: int) -> restores state to after that step
         - history() -> list of all steps with per-step verification results
         - verified_facts() -> all facts currently marked VERIFIED
         - pending_facts() -> all facts still ASSUMED

      2. StepResult dataclass:
         - step_index, verification, new_facts, contradictions, state_snapshot

      3. Tests in tests/python/test_state_machine.py

      4. Run: JAX_PLATFORMS=cpu .venv/bin/pytest tests/python -q
      5. Do NOT push. Do NOT modify scripts/research_conductor.py.

