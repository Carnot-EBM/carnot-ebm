      verifies via structural tests, not pattern matching. Test on live
      instruction-tuned model.

      EXISTING CODE TO READ FIRST:
      - python/carnot/pipeline/extract.py — CodeExtractor
      - scripts/experiment_53_runtime_constraints.py — instrumentation

      TASK: Create results/experiment_208_results.json

      CONCRETE STEPS:
      1. Load Gemma4-E4B-it on GPU
