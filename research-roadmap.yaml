  # ── Phase 12b: Continuous Reasoning ─────────────────────────
  - id: exp65-embedding-constraints
    milestone: "2026.04.3"
    deliverable: scripts/experiment_65_embedding_constraints.py
    title: "Exp 65: Embedding-space constraint verification"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: Exp 64 (scripts/experiment_64_continuous_ising.py) relaxed Ising to
      continuous space. This experiment bridges EMBEDDING space (semantic) with
      CONSTRAINT space (structural) by training a joint EBM.

      EXISTING CODE TO READ FIRST:
      - scripts/experiment_64_continuous_ising.py — continuous relaxation
      - python/carnot/embeddings/jepa_energy.py — JEPA energy in embedding space
      - python/carnot/verify/constraint.py — ComposedEnergy system
      - python/carnot/models/gibbs.py — Gibbs EBM (for training joint model)

      TASK: Create scripts/experiment_65_embedding_constraints.py

      CONCRETE STEPS:
      1. Create joint feature vectors for 200 LLM answers:
         - Semantic embedding: sentence-transformers all-MiniLM-L6-v2 (384-dim)
           (pip install sentence-transformers if needed, or mock with random)
         - Constraint vector: per-constraint pass/fail from Ising verifier (N-dim)
         - Concatenate: [embedding; constraint_vector] (384+N dim)

      2. Train small Gibbs EBM on joint space:
         - Positive: correct answers (low energy target)
         - Negative: wrong answers (high energy target)
         - CD training with 50 epochs
         - Hidden dimensions: 128

      3. Evaluate:
         - AUROC for correct/wrong on held-out test set
         - Compare: joint EBM vs Ising-only vs embedding-only
         - Does the joint model catch errors that neither alone does?

      4. Gradient-based repair in joint space:
         - Start from wrong answer's joint vector
         - Gradient descent to minimize joint energy
         - Decode: nearest-neighbor in embedding space to find improved answer
         - Measure: does repaired embedding correspond to correct answer?

      5. Print AUROC comparison table and repair success rates
      6. Run: JAX_PLATFORMS=cpu .venv/bin/python scripts/experiment_65_embedding_constraints.py
