  - id: exp172-global-consistency-checker
    milestone: "2026.04.12"
    deliverable: python/carnot/pipeline/consistency_checker.py
    title: "Exp 172: Global consistency checker for multi-turn chains (arxiv 2601.13600)"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: ConstraintStateMachine (Exp 125) checks each step locally — a step passes
      if its constraints are satisfied. But step 3's output can be globally inconsistent with
      step 1's verified facts even if each step passed locally (example: step 1 says "John is
      35 years old" and step 3 says "John was born in 1990" — both pass locally but are
      inconsistent at current date 2026). arxiv 2601.13600 provides the theoretical framework
      for detecting such global inconsistencies using pairwise consistency checking.

      Date: {date}. Target models: Qwen3.5-0.8B, google/gemma-4-E4B-it

      EXISTING CODE TO READ FIRST:
      - python/carnot/pipeline/state_machine.py — ConstraintStateMachine (Exp 125)
      - python/carnot/pipeline/extract.py — AutoExtractor, ArithmeticExtractor
      - python/carnot/pipeline/factual_extractor.py — FactualExtractor (Exp 158)
      - python/carnot/verify/constraint.py — ConstraintTerm, VerificationCertificate
      - research-references.md — "Foundations of Global Consistency Checking" section

      TASK: Create python/carnot/pipeline/consistency_checker.py
            and scripts/experiment_172_global_consistency.py
            and results/experiment_172_results.json

      CONCRETE STEPS:
      1. GlobalConsistencyChecker class:
         def check(self, state_machine: ConstraintStateMachine) -> GlobalConsistencyReport:
           - Iterate over all verified step pairs (i, j) where i < j
           - For each pair: extract claims from step i output and step j output
           - Check for contradiction types:
             a. Numeric contradiction: same entity, different numeric values
                Example: "X costs $50" (step 1) vs "X costs $75" (step 3)
                Method: extract (entity, numeric_value) pairs, compare
             b. Temporal contradiction: event ordering violates causality
                Example: "result was 100" (step 2) vs "input was 200, result is 100*2=100" (step 3 — math wrong)
                Method: check if step j claims violate verified arithmetic from step i
             c. Factual contradiction: same entity, different property values
                Example: "capital is Paris" (step 1) vs "capital is Berlin" (step 3)
                Method: run FactualExtractor on both, compare extracted triples
           - Returns GlobalConsistencyReport:
             (consistent: bool, inconsistent_pairs: [(i, j, contradiction_type, description)],
              severity: "none"|"warning"|"critical", recommended_rollback_step: int|None)

      2. Integration with ConstraintStateMachine:
         - Add method: state_machine.check_global_consistency() → GlobalConsistencyReport
         - Calls GlobalConsistencyChecker().check(self) internally
         - Available after verify_step() has been called at least twice

      3. Write tests/python/test_consistency_checker.py:
         - Test with 3-step chain where each step passes locally but steps 1+3 contradict
         - Test with globally consistent chain (all steps compatible)
         - Test numeric contradiction detection (same entity, different values)
