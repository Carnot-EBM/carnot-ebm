      TASK: Update python/carnot/pipeline/generation.py with improved NegationConstraint
            and CarryChainConstraint v2. Create scripts/experiment_173_constraint_gen_v2.py
            and results/experiment_173_results.json.

      CONCRETE STEPS:
      1. NegationConstraint (fully implement negation_scope pattern):
         Pattern: text contains "X is not Y", "not all A are B", "neither X nor Y",
                  "X never Y", "no A are B"
         Extraction:
           a. Regex: r"(\w+)\s+is\s+not\s+(\w+)" → (subject, negated_predicate)
                     r"not\s+all\s+(\w+)\s+are\s+(\w+)" → negated universal claim
                     r"no\s+(\w+)\s+(?:are|is|has)\s+(\w+)" → universal negation
           b. For each negated claim: check if LLM response asserts the positive version
              e.g., "Paris is not the capital of Germany" → if response says "Paris is capital of Germany" → violated
         Energy: 0 if negation respected, 1 if negation violated
         Test cases: "The answer is NOT 42. The answer is 17." → verified
                     "The answer is NOT 42. The answer is 42." → violated

      2. CarryChainConstraint v2 (improve arithmetic_carry pattern):
         Current: detects cascading carries in addition (99+1, 999+1)
         Add:
           a. Subtraction borrowing: 1000-1=999 (borrow chain). Detect when answer
              has wrong leading digit due to missed borrow.
           b. Digit count check: result of A+B should have at most max(digits(A), digits(B))+1 digits.
              If A=99, B=2 → result should be 2 digits (101 is wrong; 101 IS correct; 10099 is wrong).
           c. Negative result detection: if A-B where B>A, result should be negative.
              If response gives positive result for B>A subtraction → violated.
         Keep existing multi-carry detection. Extend _count_carries to handle subtraction.

