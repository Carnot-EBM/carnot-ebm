  # ── Phase 43: JEPA Predictive Verification (Tier 3) ─────────
  - id: exp145-jepa-fastpath
    milestone: "2026.04.10"
    deliverable: scripts/experiment_145_jepa_fastpath.py
    title: "Exp 145: JEPA fast-path / slow-path integration and benchmark"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: Exp 144 trained a JEPA predictor that estimates violation probability from
      partial responses. This experiment integrates it into VerifyRepairPipeline as an
      optional early-exit gate: if the predictor says "low risk," skip the expensive
      Ising verification (fast path). This is the Tier 3 architecture from research-program.md.

      Target models: Qwen3.5-0.8B, google/gemma-4-E4B-it

      EXISTING CODE TO READ FIRST:
      - python/carnot/pipeline/jepa_predictor.py — JEPAViolationPredictor (Exp 144)
      - results/jepa_predictor.safetensors — trained model
      - python/carnot/pipeline/verify_repair.py — VerifyRepairPipeline
      - python/carnot/embeddings/fast_embedding.py — RandomProjection
      - research-program.md — "Continuous Self-Learning" Tier 3 fast-path/slow-path

      TASK: Create scripts/experiment_145_jepa_fastpath.py

      CONCRETE STEPS:
      1. Add optional JEPA gating to VerifyRepairPipeline.verify():
         - New parameter: jepa_predictor=None, jepa_threshold=0.5
         - If predictor provided and max(predict(embed(first_50_tokens))) < threshold:
             return VerificationResult(mode="FAST_PATH", skipped=True)
         - Else: run full constraint extraction + Ising as normal
         - FAST_PATH result marks verified=True (optimistic default for low-risk)

      2. Benchmark on 500 questions (200 arithmetic, 200 code, 100 logic):
         - Three modes: no-gating baseline, JEPA-gate at threshold=0.3, at threshold=0.5
         - Metrics per mode:
             * % fast-path taken (want ≥40%)
             * Accuracy on fast-path questions specifically
             * Accuracy on slow-path questions specifically
             * Overall accuracy vs no-gating
             * Wall-clock speedup: total time with gating vs without

      3. Error analysis: for fast-path errors (we skipped but should have checked):
         - What domain/type were they? Arithmetic? Logic?
         - Is there a pattern (e.g., always short answers → higher risk?)

      4. Target: ≥40% fast-path rate with <2% accuracy degradation
      5. Save to results/experiment_145_results.json
      6. Run: JAX_PLATFORMS=cpu .venv/bin/python scripts/experiment_145_jepa_fastpath.py
      7. Do NOT push. Do NOT modify scripts/research_conductor.py.

