  - id: exp122-adversarial-analysis
    milestone: "2026.04.8"
    deliverable: scripts/experiment_122_adversarial_analysis.py
    title: "Exp 122: Adversarial robustness deep analysis"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: Exp 121 showed Carnot's performance on adversarial GSM8K. This
      experiment analyzes WHY Carnot succeeds — which error types are caught,
      which are missed, and whether Ising energy predicts LLM failure.

      EXISTING CODE TO READ FIRST:
      - results/experiment_121_results.json — adversarial verify-repair results
      - results/experiment_120_results.json — baseline results
      - results/adversarial_gsm8k_data.json — adversarial datasets

      TASK: Create scripts/experiment_122_adversarial_analysis.py

      CONCRETE STEPS:
      1. Error taxonomy: categorize every LLM error by type:
         - Keyword-triggered (saw "smaller" → subtracted)
         - Irrelevant-number (used the injected number in calculation)
         - Arithmetic (correct logic, wrong computation)
         - Logic (wrong approach to the problem)

      2. Carnot detection analysis: for each error type:
         - What fraction does Ising catch?
         - What fraction does verify-repair fix?
         - Which types are uncatchable by constraint verification?

      3. Energy-prediction analysis:
         - Does high Ising energy predict LLM will be wrong?
         - ROC curve: energy as predictor of incorrect answer
         - Can we use energy to triage which answers need human review?

      4. Irrelevant sentence analysis:
         - Does the ArithmeticExtractor ever extract the irrelevant number?
         - How robust is constraint extraction to adversarial context?

      5. Save analysis to results/experiment_122_results.json
      6. Run: JAX_PLATFORMS=cpu .venv/bin/python scripts/experiment_122_adversarial_analysis.py
      7. Do NOT push. Do NOT modify scripts/research_conductor.py.

