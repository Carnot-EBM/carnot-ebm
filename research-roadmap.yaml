  # ── Phase 33: Apple Adversarial GSM8K ────────────────────────
  - id: exp119-adversarial-gsm8k-generator
    milestone: "2026.04.8"
    deliverable: scripts/experiment_119_adversarial_gsm8k.py
    title: "Exp 119: Apple adversarial GSM8K variant generator"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: Apple (arxiv 2410.05229) proved LLMs pattern-match math instead
      of reasoning. They took GSM8K problems and: (1) swapped the numbers (same
      logic, different values), and (2) added one irrelevant sentence containing
      a number (e.g., "five of them were a bit smaller than average"). Models
      dropped up to 65%. This experiment recreates their methodology.

      Target models: Qwen3.5-0.8B, google/gemma-4-E4B-it

      EXISTING CODE TO READ FIRST:
      - scripts/experiment_91_gsm8k_live.py — GSM8K benchmark infrastructure
      - scripts/experiment_67_gsm8k_benchmark.py — earlier GSM8K experiment
      - python/carnot/pipeline/extract.py — ArithmeticExtractor

      TASK: Create scripts/experiment_119_adversarial_gsm8k.py

      CONCRETE STEPS:
      1. Create adversarial variant generator:
         a. number_swap(problem: str) -> str:
            - Parse all numbers in the problem
            - Replace with random different numbers (same magnitude range)
            - Recompute the correct answer with new numbers
            - Return (modified_problem, new_correct_answer)

         b. irrelevant_injection(problem: str) -> str:
            - Generate one irrelevant sentence containing a number, e.g.:
              "Five of the items were slightly smaller than average."
              "The store had been open for 12 years."
              "She noticed 3 birds outside the window."
            - Insert at a random position in the problem
            - The correct answer is UNCHANGED (sentence is irrelevant)

         c. combined_adversarial(problem: str) -> str:
            - Apply both: swap numbers AND inject irrelevant sentence

      2. Generate 4 datasets of 200 questions each:
         a. Standard GSM8K (control)
         b. Number-swapped only
         c. Irrelevant-sentence only
         d. Combined (both perturbations)
         Save all as JSON with original problem, perturbed problem, correct answer.

      3. Validate: spot-check 10 from each set, verify correct answers are right.

      4. Save to results/adversarial_gsm8k_data.json

      5. Run: JAX_PLATFORMS=cpu .venv/bin/python scripts/experiment_119_adversarial_gsm8k.py
      6. Do NOT push. Do NOT modify scripts/research_conductor.py.

