  # ── Phase 46: Lookahead Energy + Real Logits Validation ────────
  - id: exp169-lookahead-energy-extractor
    milestone: "2026.04.12"
    deliverable: python/carnot/pipeline/lookahead_energy.py
    title: "Exp 169: Lookahead energy extractor — AR-EBM bijection (arxiv 2512.15605)"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: arxiv 2512.15605 (2025) establishes that autoregressive LLMs are secretly EBMs:
      the "lookahead energy" of a response = -log P(response | prompt) = sum(-log p(token_t)),
      which is exactly the negative log-likelihood computed during generation. High NLL = model
      is "surprised" by its own output = likely hallucination or constraint violation. This is
      complementary to "spilled energy" (2602.18671): spilled energy measures token-level
      uncertainty between logit and output; lookahead energy measures global response likelihood.

      Date: {date}. Target models: Qwen3.5-0.8B, google/gemma-4-E4B-it

      EXISTING CODE TO READ FIRST:
      - python/carnot/pipeline/spilled_energy.py — SpilledEnergyExtractor (Exp 157) to parallel
      - python/carnot/pipeline/extract.py — ConstraintExtractor Protocol, AutoExtractor
      - python/carnot/verify/constraint.py — ConstraintTerm, ComposedEnergy
      - python/carnot/inference/model_loader.py — generate() API (logits if available)
      - research-references.md — "Autoregressive Language Models as EBMs" section (Exp 165 scan)

      TASK: Create python/carnot/pipeline/lookahead_energy.py

      CONCRETE STEPS:
      1. LookaheadEnergyConstraint (ConstraintTerm):
         - name: "lookahead_energy"
         - energy(x): returns stored lookahead_energy value (x ignored — energy is pre-computed)
         - is_satisfied: lookahead_energy < self.threshold
         - gradient(x): returns jnp.zeros_like(x) (no gradient through pre-computed energy)
         - threshold: calibrated default = 2.0 nats/token (empirical: ~1.5 for factual correct,
           ~3.0+ for hallucinated, calibrate on 50 TruthfulQA pairs)

      2. LookaheadEnergyExtractor (ConstraintExtractor Protocol):
         def extract(self, text: str, logits: jnp.ndarray | None = None) -> list[ConstraintTerm]:
           - If logits is None: return [] (graceful degradation — no logits → no signal)
           - If logits provided (shape [T, V] or [V]):
             * Per-token NLL: nll_t = -log(softmax(logits[t])[argmax(logits[t])]) for 1D,
               or -log(softmax(logits[t])[t_token_id]) for 2D (use argmax as proxy)
             * Lookahead energy = mean(nll_t) over all T tokens
             * Return [LookaheadEnergyConstraint(lookahead_energy=mean_nll, threshold=2.0)]

      3. Integrate into AutoExtractor (same pattern as SpilledEnergyExtractor in Exp 157):
         - AutoExtractor.extract() already accepts logits= parameter
         - Add LookaheadEnergyExtractor instance alongside SpilledEnergyExtractor
         - When logits provided: run both; include both constraints in results
         - Backward compatible: no logits → no change

      4. Benchmark vs SpilledEnergyExtractor on 50 synthetic QA pairs:
         a. 25 "correct" responses: logits with peak distribution (low entropy, low NLL)
         b. 25 "wrong" responses: logits with flatter distribution (higher entropy, higher NLL)
         c. Compute AUROC for: spilled energy alone, lookahead energy alone, combined (max)
         d. Save results to results/experiment_169_results.json

      5. Write tests in tests/python/test_lookahead_energy.py:
         - ConstraintTerm protocol compliance (energy, gradient, is_satisfied, name, threshold)
         - 1D/2D logit handling
         - Graceful degradation (logits=None → empty list)
         - Peak vs flat logit discrimination (peak → low energy, flat → high energy)
         - AutoExtractor integration: logits= adds lookahead_energy and spilled_energy
         - 100% coverage on lookahead_energy.py
         Run: JAX_PLATFORMS=cpu .venv/bin/pytest tests/python/test_lookahead_energy.py -q

      6. Run: JAX_PLATFORMS=cpu .venv/bin/python scripts/experiment_169_lookahead_energy.py
      7. Do NOT push. Do NOT modify scripts/research_conductor.py.

  - id: exp170-real-logits-benchmark
    milestone: "2026.04.12"
    deliverable: results/experiment_170_real_logits_results.json
    title: "Exp 170: Real LLM logits benchmark for spilled + lookahead energy signals"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: Exp 157 achieved SpilledEnergy AUROC=1.000 on HAND-CRAFTED simulated logits.
      Exp 169 implemented LookaheadEnergyExtractor. Both signals need validation on real
      Qwen3.5-0.8B inference outputs — not synthetic logits. The claim "spilled energy detects
      hallucinations" needs real data to be credible. This experiment provides that validation.

      Date: {date}. Target models: Qwen3.5-0.8B, google/gemma-4-E4B-it

      EXISTING CODE TO READ FIRST:
      - python/carnot/pipeline/spilled_energy.py — SpilledEnergyExtractor (Exp 157)
      - python/carnot/pipeline/lookahead_energy.py — LookaheadEnergyExtractor (Exp 169)
      - python/carnot/inference/model_loader.py — load_model(), generate() API
      - python/carnot/pipeline/factual_extractor.py — FactualExtractor (Exp 158, 83.3% accuracy)
      - results/experiment_158_results.json — factual extractor baseline to compare against

      TASK: Create scripts/experiment_170_real_logits_benchmark.py
            and results/experiment_170_real_logits_results.json

      CONCRETE STEPS:
      1. Generate 100 real QA pairs using local model:
         a. Load Qwen3.5-0.8B via model_loader.load_model() with return_logits=True if supported
         b. If logits unavailable from generate(): use simulated logits calibrated from
            results/experiment_157_results.json (spilled energy mean values) as fallback
         c. 50 EASY factual questions (well-known facts: capital cities, famous inventors,
            basic science — high confidence expected)
         d. 50 HARD factual questions (obscure facts, plausible-but-wrong dates, model-specific
            hallucination targets from TruthfulQA dataset)
         e. Ground truth: manually marked as likely_correct (easy) vs likely_hallucinated (hard)

      2. For each response, extract both signals:
         spilled = SpilledEnergyExtractor().extract(text, logits=logits_or_None)
         lookahead = LookaheadEnergyExtractor().extract(text, logits=logits_or_None)

      3. Compute AUROC for each signal vs likely_correct/likely_hallucinated ground truth:
         - SpilledEnergy AUROC (target: validate Exp 157's 1.000 holds on real data, expect lower)
         - LookaheadEnergy AUROC (target: >0.65 on real data)
         - FactualExtractor accuracy (Exp 158 baseline: 83.3%) as reference comparison
         - Combined AUROC: max(spilled_energy, lookahead_energy) > threshold

      4. Grid search optimal combination:
         for alpha in [0.0, 0.1, 0.2, ..., 1.0]:
           combined_score = alpha * spilled_energy + (1-alpha) * lookahead_energy
           auroc = roc_auc_score(ground_truth, combined_score)
         Report optimal alpha and combined AUROC.

      5. Save results/experiment_170_real_logits_results.json:
         (n_questions: 100, logits_source: "real"|"simulated",
          spilled_auroc, lookahead_auroc, combined_auroc, optimal_alpha,
          factual_extractor_accuracy (from Exp 158 for comparison),
          per_question_breakdown: [(question_id, spilled, lookahead, ground_truth)])

      6. Run: JAX_PLATFORMS=cpu .venv/bin/python scripts/experiment_170_real_logits_benchmark.py
      7. Do NOT push. Do NOT modify scripts/research_conductor.py.

