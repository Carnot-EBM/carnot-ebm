  # ── Phase 8: Toward Continuous Latent Reasoning ──────────
  - id: exp64-continuous-relaxation
    milestone: "2026.04.2"
    deliverable: scripts/experiment_64_continuous_ising.py
    title: "Exp 64: Continuous relaxation of Ising constraints"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: All Ising experiments so far use discrete spins. Kona-style reasoning
      operates in continuous latent space. This bridges the gap: relax binary spins
      to continuous [0,1] and use gradient descent instead of sampling.

      EXISTING CODE TO READ:
      - carnot/samplers/parallel_ising.py — ParallelIsingSampler (discrete sampling)
      - scripts/experiment_46b_scale_sat_parallel.py — SAT benchmarks
      - scripts/experiment_39_thrml_sat.py — sat_to_ising, check_assignment
      - python/carnot/verify/constraint.py — gradient-based repair

      TASK: Create scripts/experiment_64_continuous_ising.py

      CONCRETE STEPS:
      1. Implement continuous_ising_solve(biases, J, n_steps, lr, beta):
         - Initialize s in [0,1]^n, gradient descent with clip to [0,1]
         - Use jax.grad for the gradient
         - Round final s to binary (threshold 0.5)

      2. Compare on SAT benchmarks (50, 100, 200, 500 vars):
         - Continuous relaxation + GD + rounding
         - Parallel Gibbs sampling (ParallelIsingSampler)
         - Random baseline

      3. Experiment with relaxation strategies:
         a. Soft rounding: sigmoid(alpha * s) with increasing alpha
         b. Penalty: add ||s - round(s)||^2 term
         c. Straight-through rounding

      4. Run: JAX_PLATFORMS=cpu .venv/bin/python scripts/experiment_64_continuous_ising.py
      5. Do NOT push. Do NOT modify scripts/research_conductor.py.
