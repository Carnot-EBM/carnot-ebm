  # ── Phase 50: Real-Time Guided Decoding on GPU ──────────────
  - id: exp186-guided-decoding-live
    milestone: "2026.04.13"
    deliverable: results/experiment_186_results.json
    title: "Exp 186: Live guided decoding — constrain token generation on GPU"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: Guided decoding was prototyped (Exp 110) and benchmarked
      (0.006ms per check). Now test it LIVE on GPU — actually modify token
      probabilities during Qwen3.5 generation based on constraint energy.

      EXISTING CODE TO READ FIRST:
      - python/carnot/inference/guided_decoding.py — guided decoding module
      - results/experiment_102_results.json — latency benchmarks
      - results/experiment_180_results.json — GPU baseline

      TASK: Create results/experiment_186_results.json

      CONCRETE STEPS:
      1. Load Qwen3.5-0.8B on GPU with guided decoding hooks
      2. Test on 100 arithmetic questions:
         a. Standard generation (no guidance)
         b. Guided generation (constraint energy modifies logits)
      3. Measure: accuracy improvement, latency overhead per token
      4. Compare: guided decoding vs post-hoc verify-repair
      5. Can they be combined? Guided + verify-repair
      6. Run: .venv/bin/python scripts/experiment_186_guided_live.py
      7. Do NOT push. Do NOT modify scripts/research_conductor.py.

