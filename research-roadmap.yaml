  - id: exp149-truthfulqa-scale
    milestone: "2026.04.10"
    deliverable: scripts/experiment_149_truthfulqa.py
    title: "Exp 149: TruthfulQA at scale with factual constraint coverage analysis"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: Exp 88 showed factual and scheduling domains have near-zero constraint coverage
      (100% false negative rate). This experiment benchmarks TruthfulQA at scale to quantify
      the factual coverage gap and identify the top-5 constraint types that would close it.
      This maps to Goal #3 (factual constraint extractor) from research-program.md.

      Target models: Qwen3.5-0.8B, google/gemma-4-E4B-it

      EXISTING CODE TO READ FIRST:
      - python/carnot/pipeline/extract.py — AutoExtractor, extractors
      - python/carnot/pipeline/knowledge_base.py — KB factual verifier (Exp 98)
      - python/carnot/pipeline/mining.py — ConstraintMiner (Exp 88)
      - results/experiment_88_results.json — failure mode analysis
      - research-program.md — Goal #3 (factual constraint extractor)

      TASK: Create scripts/experiment_149_truthfulqa.py

      CONCRETE STEPS:
      1. Load TruthfulQA (200 questions, balanced across categories):
         Categories: misconceptions, fiction, history, science, health, law, other
         Use HuggingFace datasets if available: truthful_qa, multiple_choice split.
         If unavailable, create 200 synthetic factual questions across 7 categories.

      2. For each question: run AutoExtractor and measure:
         - Was any constraint extracted? (coverage rate per category)
         - If extracted: run verify-repair, measure accuracy
         - If not extracted: log as BLIND_SPOT

      3. Also run with KB factual verifier (Exp 98) if available:
         - Coverage with KB vs without
         - Accuracy with KB on covered questions

      4. Apply ConstraintMiner (Exp 88) to the FALSE NEGATIVES:
         - What patterns explain the coverage gaps?
         - Categorize: world_knowledge, implicit_logic, negation, comparison, etc.

      5. Output:
         - Coverage rate per TruthfulQA category
         - Accuracy: covered vs blind-spot questions
         - Top-5 constraint types that would improve coverage the most (with estimated
