  # ── Phase 11a: Model Hardening (no 04.2 deps) ───────────────
  - id: exp54-ising-fuzzing
    milestone: "2026.04.3"
    deliverable: scripts/experiment_54_ising_fuzzing.py
    title: "Exp 54: Ising-guided fuzzing"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: Exp 53 (scripts/experiment_53_runtime_constraints.py) instruments
      code to verify constraints dynamically. This experiment uses the Ising energy
      landscape to GENERATE adversarial test inputs that are likely to expose bugs.

      EXISTING CODE TO READ FIRST:
      - scripts/experiment_53_runtime_constraints.py — runtime instrumentation
      - scripts/experiment_48_code_constraints.py — static constraint extraction
      - python/carnot/samplers/parallel_ising.py — ParallelIsingSampler
      - scripts/experiment_39_thrml_sat.py — sat_to_ising encoding

      TASK: Create scripts/experiment_54_ising_fuzzing.py

      CONCRETE STEPS:
      1. Implement encode_input_space(func_signature, constraints) -> (biases, J):
         - Map function input parameters to Ising spins
         - Constraint violations become energy terms (high energy = likely bug trigger)
         - Edge cases (0, -1, empty list, max int) get low bias (more likely sampled)

      2. Implement ising_fuzz(func, reference_func, biases, J, n_samples=100):
         - Use ParallelIsingSampler to generate low-energy test inputs
         - Decode spins back to concrete function arguments
         - Run both func and reference_func on each input
         - Record disagreements (differential testing)

      3. Test on 8 function pairs (LLM-generated vs correct reference):
         - off-by-one in binary search
         - missing empty-list check in max()
         - integer overflow in factorial
         - wrong comparison operator in sort
         - missing base case in recursion
         - type coercion bug (int vs float division)
         - boundary error in substring
         - sign error in absolute value

      4. Compare: Ising-guided fuzzing vs random fuzzing (same number of inputs)
      5. Print table: bugs found per method, unique bugs, time to first bug
      6. Run: JAX_PLATFORMS=cpu .venv/bin/python scripts/experiment_54_ising_fuzzing.py
      7. Do NOT push. Do NOT modify scripts/research_conductor.py.

  # ── Phase 10a: Constraint Learning (no 04.2 deps) ───────────
  - id: exp55-trace-learning
    milestone: "2026.04.3"
    deliverable: scripts/experiment_55_trace_learning.py
    title: "Exp 55: Learn constraints from execution traces"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: Exp 53 instruments code for runtime constraint checks. Exp 51
      (scripts/experiment_51_learn_from_llm.py) trains discriminative Ising from
      correct/wrong pairs. This experiment combines both: learn constraints from
      EXECUTION TRACES rather than hand-coding them.

      EXISTING CODE TO READ FIRST:
      - scripts/experiment_53_runtime_constraints.py — runtime instrumentation
      - scripts/experiment_51_learn_from_llm.py — discriminative CD training
      - scripts/experiment_50_learn_ising.py — CD training fundamentals
      - python/carnot/samplers/parallel_ising.py — ParallelIsingSampler

      TASK: Create scripts/experiment_55_trace_learning.py

      CONCRETE STEPS:
      1. Generate trace data:
         - Create 10 Python functions with known correct implementations
         - Create 10 buggy variants (off-by-one, type errors, logic errors)
         - Execute each with 100 random inputs, recording per-line traces:
           variable types, values, branch decisions, return values

      2. Extract trace features:
         - Binary feature vector per execution (200+ features):
           a. Did variable X have type T at line L? (type features)
           b. Was branch B taken? (control flow features)
           c. Was return value in range [lo, hi]? (output features)
           d. Did loop iterate N times? (iteration features)

      3. Train discriminative Ising on trace features:
         - Correct traces as positive, buggy traces as negative
         - CD training with L1 regularization (Exp 50 approach)
         - 80/20 train/test split

      4. Evaluate: does learned model detect bugs that static analysis misses?
         Compare to Exp 53 static+dynamic detection rates
      5. Print confusion matrix and per-bug-type detection rates
      6. Run: JAX_PLATFORMS=cpu .venv/bin/python scripts/experiment_55_trace_learning.py
      7. Do NOT push. Do NOT modify scripts/research_conductor.py.

