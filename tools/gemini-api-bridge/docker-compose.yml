# Gemini CLI API Bridge — Docker Compose
#
# Start:  docker compose up -d
# Stop:   docker compose down
# Logs:   docker compose logs -f
# Test:   curl http://localhost:8081/v1/models

services:
  gemini-api-bridge:
    build: .
    image: gemini-api-bridge:latest
    container_name: gemini-api-bridge
    ports:
      - "${BRIDGE_PORT:-8081}:8081"
    volumes:
      # Mount Gemini credentials from host
      - ${GEMINI_CONFIG_DIR:-~/.gemini}:/root/.gemini:ro
    environment:
      # Override the gemini binary path if needed
      - GEMINI_BIN=${GEMINI_BIN:-gemini}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
