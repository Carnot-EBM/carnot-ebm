name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust-check:
    name: Rust Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --exclude carnot-python -- -D warnings

      - name: Build
        run: cargo build --workspace --exclude carnot-python

  rust-test:
    name: Rust Tests
    runs-on: ubuntu-latest
    needs: rust-check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}

      - name: Run tests
        run: cargo test --workspace --exclude carnot-python

      - name: Check spec coverage
        run: python3 scripts/check_spec_coverage.py

  python-test:
    name: Python Tests (100% coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Create venv and install deps
        run: |
          uv venv .venv --python 3.12
          source .venv/bin/activate
          uv pip install jax jaxlib pytest pytest-cov safetensors numpy ruff mypy

      - name: Run tests with 100% coverage
        run: |
          source .venv/bin/activate
          PYTHONPATH=python:$PYTHONPATH pytest tests/python -v \
            --cov=python/carnot \
            --cov-report=term-missing \
            --cov-fail-under=100

      - name: Ruff lint
        run: |
          source .venv/bin/activate
          ruff check python/ tests/

      - name: Ruff format check
        run: |
          source .venv/bin/activate
          ruff format --check python/ tests/

  pyo3-check:
    name: PyO3 Bindings Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-pyo3-${{ hashFiles('**/Cargo.toml') }}

      - name: Check PyO3 bindings compile
        run: cargo check -p carnot-python

  spec-coverage:
    name: Spec Traceability
    runs-on: ubuntu-latest
    needs: [rust-test, python-test]
    steps:
      - uses: actions/checkout@v4

      - name: Check all tests trace to specs
        run: python3 scripts/check_spec_coverage.py
