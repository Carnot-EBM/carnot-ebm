  # ── Phase 31: KAN Energy Tier Completion ──────────────────────────
  - id: exp108-kan-energy-function
    milestone: "2026.04.7"
    deliverable: python/carnot/models/kan.py
    title: "Exp 108: KAN Energy Function Implementation"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: Exp 103 (KAN energy tier) failed due to rate limits. KAN
      (Kolmogorov-Arnold Networks) addresses the constraint learning ceiling
      where linear Ising features cannot capture nonlinear constraint relationships.
      KAN edges have learnable B-spline activations — strictly more expressive
      than Ising (quadratic) while remaining interpretable.

      Target models: Qwen3.5-0.8B, google/gemma-4-E4B-it

      EXISTING CODE TO READ FIRST:
      - python/carnot/models/ising.py — IsingModel (quadratic energy)
      - python/carnot/models/gibbs.py — GibbsModel (MLP energy)
      - python/carnot/core/energy.py — EnergyFunction protocol
      - python/carnot/training/contrastive_divergence.py — CD training
      - scripts/experiment_62_domain_constraint_learning.py — domain CD data

      TASK: Create python/carnot/models/kan.py with KAN energy function

      CONCRETE STEPS:
      1. Create python/carnot/models/kan.py:
         a. BSpline class:
            - Parameterized by control points (learnable via JAX)
            - evaluate(x: jnp.ndarray) -> jnp.ndarray
            - num_knots, degree as hyperparameters (default: 10 knots, degree 3)
         b. KANEnergyFunction class implementing EnergyFunction protocol:
            - edges: list of (i, j) pairs (like Ising coupling matrix, but sparse)
            - splines: one BSpline per edge (learnable)
            - biases: one BSpline per node (learnable, replaces linear bias)
            - energy(state): sum of spline_ij(s_i * s_j) + sum of bias_i(s_i)
            - grad_energy(state): JAX autodiff through splines
            - n_params property: total learnable parameters
            - from_ising(ising_model): initialize KAN splines from Ising couplings
              (each spline starts as linear function matching J_ij weight)
         c. KANModel class (wraps energy + training state):
            - train_cd(data, n_epochs, lr): CD training with spline updates
            - interpret_edge(i, j): return spline shape for visualization

      2. Create crates/carnot-kan/Cargo.toml and crates/carnot-kan/src/lib.rs:
         a. Minimal scaffold: KanEnergyFunction struct implementing EnergyFunction trait
         b. BSpline struct with evaluate() using lookup table (for FPGA path)
         c. energy(), gradient() methods
         d. Mark with TODO comments for full implementation later
         e. Add to workspace Cargo.toml members list

      3. Create tests/python/test_kan.py:
         a. Test BSpline evaluation at knot points
         b. Test KANEnergyFunction produces finite energy
         c. Test gradient computation through splines
         d. Test from_ising: KAN from Ising produces similar energy values
         e. Test KAN has more params than Ising but fewer than Gibbs MLP
         f. Every test references REQ-CORE-001 or SCENARIO-CORE-001

      4. Save results to {project_root}/results/experiment_108_results.json

      5. Run: JAX_PLATFORMS=cpu .venv/bin/pytest tests/python/test_kan.py -q
      6. Run: JAX_PLATFORMS=cpu .venv/bin/pytest tests/python -q
      7. Run: cargo build -p carnot-kan
      8. Do NOT push. Do NOT modify scripts/research_conductor.py.

  - id: exp109-kan-comparison
    milestone: "2026.04.7"
    deliverable: scripts/experiment_109_kan_comparison.py
    title: "Exp 109: KAN vs Ising vs Gibbs Comparison"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: Exp 108 created the KAN energy function. This experiment trains
      KAN on domain constraint data and compares against Ising and Gibbs MLP.

      Target models: Qwen3.5-0.8B, google/gemma-4-E4B-it

      EXISTING CODE TO READ FIRST:
      - python/carnot/models/kan.py — KANModel (Exp 108)
      - python/carnot/models/ising.py — IsingModel
      - python/carnot/models/gibbs.py — GibbsModel
      - scripts/experiment_62_domain_constraint_learning.py — training data format
      - scripts/experiment_89_self_bootstrap.py — self-supervised training setup

      TASK: Create scripts/experiment_109_kan_comparison.py

      CONCRETE STEPS:
      1. Load Exp 62's domain constraint data (10K triples across arithmetic/logic/code)
         or recreate with same format

      2. Train three energy models with identical data/splits (700 train/150 val/150 test):
         a. Ising: discriminative CD on binary features
         b. KAN: discriminative CD with spline edge activations
         c. Gibbs MLP: discriminative CD with SiLU activations

      3. Compare per-domain AUROC:
         a. Arithmetic, logic, code (per-domain models)
         b. Combined model (all domains together)
         c. Bootstrap 95% confidence intervals

      4. Compare parameter counts:
         a. Ising params = num_features^2 / 2 (sparse) or num_features^2 (dense)
         b. KAN params = num_edges * spline_params + num_nodes * bias_params
         c. Gibbs params = hidden_size * input_size + hidden_size + output_size

      5. Interpretability analysis:
         a. Train KAN on arithmetic domain
         b. Plot top-5 most important edge splines
         c. Compare spline shapes: learned nonlinear vs initialized linear

      6. Ablation: initialize KAN from Ising (via from_ising) and fine-tune
         a. Does warm-starting from Ising converge faster?
         b. Does it achieve higher final AUROC?

      7. Save results to {project_root}/results/experiment_109_results.json

      8. Run: JAX_PLATFORMS=cpu .venv/bin/python scripts/experiment_109_kan_comparison.py
      9. Do NOT push. Do NOT modify scripts/research_conductor.py.

  # ── Phase 32: Production Energy-Guided Decoding ──────────────────
  - id: exp110-guided-decoding
    milestone: "2026.04.7"
    deliverable: python/carnot/inference/guided_decoding.py
    title: "Exp 110: Guided Decoding Prototype Completion"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: Exp 102 proved per-token constraint checking is viable (0.008ms JAX JIT).
      Exp 104 (guided decoding prototype) failed due to rate limits. This experiment
      completes the prototype: constraint energy modifies token probabilities during
      generation, steering the LLM away from constraint-violating continuations.

      Target models: Qwen3.5-0.8B, google/gemma-4-E4B-it

      EXISTING CODE TO READ FIRST:
      - scripts/experiment_102_latency_benchmark.py — latency results
      - scripts/experiment_66_differentiable_constraints.py — differentiable pipeline
      - python/carnot/pipeline/verify_repair.py — VerifyRepairPipeline
      - python/carnot/pipeline/extract.py — AutoExtractor
      - python/carnot/models/kan.py — KANEnergyFunction (Exp 108, optional)

      TASK: Create python/carnot/inference/guided_decoding.py

      CONCRETE STEPS:
      1. Create python/carnot/inference/guided_decoding.py:
         a. EnergyGuidedSampler class:
            - __init__(pipeline, alpha=0.5, check_every_k=1):
              alpha = guidance strength (energy influence on logits)
              check_every_k = frequency of constraint checks (1 = every token)
            - compute_energy_penalty(text_so_far):
              Run AutoExtractor + energy computation on partial text
              Return constraint energy (higher = more violations)
            - modify_logits(logits, text_so_far):
              If energy > threshold: reduce probability of high-energy continuations
              Use energy gradient if KAN/Ising available, else uniform penalty
              Return modified logits
            - generate(prompt, model, tokenizer, max_tokens=256, temperature=1.0):
              Token-by-token generation with energy guidance:
              For each token: get logits → modify via energy penalty → sample → append

      2. Create tests/python/test_guided_decoding.py:
         a. Test EnergyGuidedSampler initialization
         b. Test compute_energy_penalty with known inputs
         c. Test modify_logits reduces high-energy continuations
         d. Test generate with mock model (verify token-by-token flow)
         e. Every test references REQ-VERIFY-001 or SCENARIO-VERIFY-004

      3. Create scripts/experiment_110_guided_decoding.py:
         a. Test on 50 GSM8K-style arithmetic problems
         b. Three modes: greedy baseline, guided (check_every_k=1), guided (check_every_k=5)
         c. Alpha sweep: [0.1, 0.3, 0.5, 1.0, 2.0]
         d. Metrics: accuracy, constraint satisfaction rate, latency overhead

      4. Save results to {project_root}/results/experiment_110_results.json

      5. Run: JAX_PLATFORMS=cpu .venv/bin/pytest tests/python/test_guided_decoding.py -q
      6. Run: JAX_PLATFORMS=cpu .venv/bin/pytest tests/python -q
      7. Run: JAX_PLATFORMS=cpu .venv/bin/python scripts/experiment_110_guided_decoding.py
      8. Do NOT push. Do NOT modify scripts/research_conductor.py.

