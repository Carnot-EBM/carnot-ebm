  # ── Phase 38: Online Constraint Learning (Tier 1) ───────────
  - id: exp132-constraint-tracker
    milestone: "2026.04.9"
    deliverable: python/carnot/pipeline/tracker.py
    title: "Exp 132: Constraint performance tracker"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: Carnot currently starts every verification from scratch. This
      experiment adds the foundation for self-learning: tracking which constraints
      fire and which catch real errors, accumulating statistics over time.
      See research-program.md "Continuous Self-Learning" Tier 1 for the design.

      EXISTING CODE TO READ FIRST:
      - python/carnot/pipeline/verify_repair.py — VerifyRepairPipeline
      - python/carnot/pipeline/extract.py — constraint extractors
      - research-program.md — "Continuous Self-Learning" section

      TASK: Create python/carnot/pipeline/tracker.py

      CONCRETE STEPS:
      1. ConstraintTracker class:
         - record(constraint_type: str, fired: bool, caught_error: bool)
         - precision(constraint_type: str) -> float (caught / fired)
         - recall(constraint_type: str) -> float (caught / total_errors)
         - stats() -> dict of per-type precision/recall/count
         - save(path: str) — persist to JSON
         - load(path: str) — restore from JSON
         - merge(other: ConstraintTracker) — combine statistics

      2. Integration with VerifyRepairPipeline:
         - verify() accepts optional tracker parameter
         - After verification, records which constraints fired and caught errors
         - Tracker is NOT required (backward compatible)

      3. Tests in tests/python/test_tracker.py:
         - Test recording and precision/recall computation
         - Test save/load round-trip
         - Test merge of two trackers
         - Test integration with VerifyRepairPipeline

      4. Run: JAX_PLATFORMS=cpu .venv/bin/pytest tests/python -q
      5. Do NOT push. Do NOT modify scripts/research_conductor.py.

  - id: exp133-adaptive-weighting
    milestone: "2026.04.9"
    deliverable: python/carnot/pipeline/adaptive.py
    title: "Exp 133: Adaptive constraint weighting from tracker"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: Exp 132 built the ConstraintTracker. This experiment uses the
      accumulated statistics to automatically adjust constraint weights —
      high-precision constraints get more weight, noisy ones get downweighted.

      EXISTING CODE TO READ FIRST:
      - python/carnot/pipeline/tracker.py — ConstraintTracker (Exp 132)
      - python/carnot/pipeline/verify_repair.py — VerifyRepairPipeline
      - python/carnot/verify/constraint.py — ComposedEnergy weights

      TASK: Create python/carnot/pipeline/adaptive.py

      CONCRETE STEPS:
      1. AdaptiveWeighter class:
         - from_tracker(tracker: ConstraintTracker) -> dict of weights
         - Weight formula: w_i = precision_i * log(count_i + 1)
           (high precision + high count = high weight)
         - Minimum weight floor (0.1) to avoid zeroing out constraints
         - apply_to_pipeline(pipeline, weights) -> updates ComposedEnergy weights

      2. Compare on 200 GSM8K questions:
         - Fixed weights (default) vs adaptive weights (from 100-question warmup)
         - Metric: accuracy improvement from adaptive weighting

      3. Tests in tests/python/test_adaptive.py

      4. Run: JAX_PLATFORMS=cpu .venv/bin/pytest tests/python -q
      5. Do NOT push. Do NOT modify scripts/research_conductor.py.

