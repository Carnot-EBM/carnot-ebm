      7. Save results to results/experiment_134_results.json
      8. Run: JAX_PLATFORMS=cpu .venv/bin/python scripts/experiment_134_online_learning.py
      9. Do NOT push. Do NOT modify scripts/research_conductor.py.

  # ── Phase 39: Constraint Memory (Tier 2) ────────────────────
  - id: exp135-constraint-memory
    milestone: "2026.04.9"
    deliverable: python/carnot/pipeline/memory.py
    title: "Exp 135: Persistent constraint memory"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: Tier 1 (online weighting) adjusts existing constraint weights.
      Tier 2 goes further: LEARN NEW CONSTRAINT PATTERNS from accumulated
      verifications and persist them across sessions.

      EXISTING CODE TO READ FIRST:
      - python/carnot/pipeline/tracker.py — ConstraintTracker (Exp 132)
      - python/carnot/pipeline/extract.py — constraint extractors
      - python/carnot/pipeline/verify_repair.py — VerifyRepairPipeline
      - research-program.md — "Continuous Self-Learning" Tier 2

      TASK: Create python/carnot/pipeline/memory.py

      CONCRETE STEPS:
      1. ConstraintMemory class:
         - record_pattern(domain, error_pattern, constraint_that_caught_it)
         - suggest_constraints(text, domain) -> list of additional constraints
           based on learned patterns for this domain
         - save(path) / load(path) — JSON persistence
         - summary() -> per-domain pattern counts and top patterns

      2. Pattern learning:
         - Track (domain, error_type, frequency) triples
         - When a pattern appears 3+ times, auto-generate a constraint
         - Example: "arithmetic carry errors" seen 5 times → add carry-check
           constraint automatically for future arithmetic verifications

      3. Integration with VerifyRepairPipeline:
         - Pipeline accepts optional memory parameter
         - Before extraction, check memory for additional constraints
         - After verification, record any new patterns to memory

      4. Tests in tests/python/test_constraint_memory.py

      5. Run: JAX_PLATFORMS=cpu .venv/bin/pytest tests/python -q
      6. Do NOT push. Do NOT modify scripts/research_conductor.py.

  - id: exp136-cross-session-benchmark
    milestone: "2026.04.9"
    deliverable: scripts/experiment_136_cross_session.py
    title: "Exp 136: Cross-session learning benchmark"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: Exp 135 built persistent constraint memory. This experiment
      tests whether memory from one session improves the next session.

      EXISTING CODE TO READ FIRST:
