      - scripts/experiment_119_adversarial_gsm8k.py — variant generator
      - python/carnot/inference/model_loader.py — model loading

      TASK: Create a SMALLER, focused adversarial benchmark script

      CONCRETE STEPS:
      1. Simplify: N=200 per variant (not 400) — still statistically meaningful
      2. Single model only (Qwen3.5-0.8B) — test Gemma4 separately
      3. Reuse existing adversarial data from results/adversarial_gsm8k_data.json
