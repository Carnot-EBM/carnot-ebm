      1. Profile embedding options:
         a. Current: sentence-transformers (MiniLM) — 7.6ms baseline
         b. ONNX runtime with MiniLM-ONNX — expect 2-5x speedup
         c. Quantized MiniLM (int8/fp16) — memory + speedup
