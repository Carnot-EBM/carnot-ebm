  - id: exp90-autoresearch-constraints
    milestone: "2026.04.5"
    deliverable: scripts/experiment_90_autoresearch_constraints.py
    title: "Exp 90: Autoresearch constraint improvement loop"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: This is the FR-11 autonomous self-learning loop applied to the
      constraint pipeline itself. The autoresearch orchestrator (scripts/orchestrator.py)
      proposes hypotheses, tests them in a sandbox, and accepts/rejects based on
      evaluation gates. This experiment defines "constraint extractor improvement"
      as a hypothesis type: propose a new regex pattern or AST rule, test it on
      held-out failures (from Exp 88), accept if it improves verification accuracy.
      20 iterations of the loop.

      EXISTING CODE TO READ FIRST:
      - scripts/orchestrator.py — autoresearch orchestrator
      - python/carnot/pipeline/mining.py — FailureAnalyzer (Exp 88)
      - python/carnot/pipeline/extract.py — current extractors
      - scripts/experiment_89_self_bootstrap.py — self-bootstrapped training (Exp 89)
      - python/carnot/autoresearch/evaluator.py — three-gate evaluator

      TASK: Create scripts/experiment_90_autoresearch_constraints.py

      CONCRETE STEPS:
      1. Define the improvement hypothesis space:
         a. Type 1: New regex pattern for ArithmeticExtractor (e.g., "X times Y is Z")
         b. Type 2: New AST rule for CodeExtractor (e.g., detect list comprehensions)
         c. Type 3: New logic pattern for LogicExtractor (e.g., "unless" clauses)
         d. Type 4: Ising feature addition (new binary feature for CD training)

      2. Build a ConstraintImprovementOrchestrator:
         a. propose(): generate a random improvement hypothesis
            (select type, generate pattern/rule from templates)
         b. test(): apply hypothesis to a held-out set of 100 failure cases
            (from Exp 88's FailureAnalyzer output or synthetic failures)
         c. evaluate(): compute AUROC improvement on validation set
            (hypothesis improves pipeline → accept, else reject)
         d. incorporate(): if accepted, add pattern to extractor's pattern list

      3. Run loop:
         a. 20 iterations
         b. Track: proposals attempted, accepted, rejected, cumulative AUROC
         c. Circuit breaker: halt after 5 consecutive rejections
         d. Log each iteration: hypothesis description, test result, accept/reject

      4. Evaluation:
         a. Cumulative AUROC improvement over 20 iterations
         b. Acceptance rate
         c. Which hypothesis types were most effective?
         d. Final extractor vs original extractor: side-by-side comparison

      5. Save results to {project_root}/results/experiment_90_results.json

      6. Run: JAX_PLATFORMS=cpu .venv/bin/python scripts/experiment_90_autoresearch_constraints.py
      7. Do NOT push. Do NOT modify scripts/research_conductor.py.

  # ── Phase 20: Rust Pipeline + Cross-Language ───────────────────
  - id: exp94-rust-pipeline
    milestone: "2026.04.5"
    deliverable: crates/carnot-constraints/src/pipeline.rs
    title: "Exp 94: Rust VerifyRepairPipeline"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: The Python pipeline works (Exp 74-75) but NFR-01 requires 10x Rust
      performance. The carnot-constraints crate (Exp 70) has basic constraint types.
      This experiment ports the core verify pipeline to Rust: constraint extraction,
      composed energy evaluation, and verification. Repair is NOT ported (it requires
      LLM inference which stays in Python).

      EXISTING CODE TO READ FIRST:
      - crates/carnot-constraints/src/lib.rs — BoundConstraint, EqualityConstraint, IsingConstraint, VerificationCertificate
      - crates/carnot-core/src/lib.rs — EnergyFunction, ConstraintTerm traits
      - python/carnot/pipeline/extract.py — Python extractors (for reference)
      - python/carnot/pipeline/verify_repair.py — Python pipeline (for reference)

      TASK: Create crates/carnot-constraints/src/pipeline.rs

      CONCRETE STEPS:
