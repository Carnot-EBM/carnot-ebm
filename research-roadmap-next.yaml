  # ── Phase 72: FPGA Ising Prototype ──
  - id: exp228-fpga-ising-design
    milestone: "2026.04.16"
    deliverable: results/experiment_228_results.json
    title: "Exp 228: KV260 FPGA Ising sampler design and simulation"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: The Kria KV260 FPGA should have arrived. It has 256K LUTs,
      enough for ~4K p-bits. Reference: arxiv 2512.24558 (6400-spin FPGA
      Ising machine, 64 billion flips/second).

      EXISTING CODE TO READ FIRST:
      - python/carnot/samplers/parallel_ising.py — current CPU Ising sampler
      - python/carnot/samplers/backend.py — SamplerBackend abstraction
      - research-hardware-wishlist.md — KV260 specs

      TASK: Design the FPGA Ising sampler architecture

      CONCRETE STEPS:
      1. Design the p-bit array architecture (target: 4K spins)
      2. Define the AXI-Lite register map for coupling updates
      3. Create python/carnot/samplers/fpga_ising.py with:
         a. FPGAIsingSampler implementing SamplerBackend
         b. Coupling matrix upload via PYNQ overlay
         c. Sampling trigger and result readback
         d. Fallback to CPU sampler if FPGA not detected
      4. Simulate with software model first (no hardware needed)
      5. Benchmark: simulated FPGA vs actual CPU sampler
      6. Document the Verilog design in docs/fpga-ising-design.md
      7. Write tests
      8. Run: .venv/bin/pytest tests/python -q
      9. Do NOT push. Do NOT modify scripts/research_conductor.py.

  # ── Phase 73: Self-Learning from Code Traces ──
  - id: exp229-code-trace-learning
    milestone: "2026.04.16"
    deliverable: results/experiment_229_results.json
    title: "Exp 229: Self-learning from code verification traces"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: Code verification produces rich traces: which tests fail,
      what properties are violated, what repairs work. This is Tier 1-2
      self-learning data. Use it to improve future verifications.

      EXISTING CODE TO READ FIRST:
      - python/carnot/pipeline/tracker.py — ConstraintTracker
      - python/carnot/pipeline/pbt_code_verifier.py
      - results/experiment_225_results.json — verification traces

      TASK: Build self-learning from code verification traces

      CONCRETE STEPS:
      1. Extract patterns from Exp 225/226 verification traces:
         a. Which PBT properties catch the most bugs?
         b. Which repair strategies succeed?
         c. Which problem types benefit most from verification?
      2. Create python/carnot/pipeline/code_learning.py:
         a. TraceAnalyzer: extract patterns from verification history
         b. PropertyRanker: rank PBT properties by effectiveness
         c. RepairStrategy: learn which repairs work for which errors
      3. Demonstrate: verification improves over time with accumulated traces
      4. Write tests
      5. Run: .venv/bin/pytest tests/python -q
      6. Do NOT push. Do NOT modify scripts/research_conductor.py.

