  # ── Phase 34: LNN Adaptive Constraints + Full-Scale Benchmark ─────
  - id: exp116-lnn-adaptive
    milestone: "2026.04.7"
    deliverable: python/carnot/models/lnn_constraint.py
    title: "Exp 116: LNN-Based Adaptive Constraint Model"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: Static Ising cannot adapt as an agent acts over time — new facts
      should change which constraints matter. LNN-based constraint models update
      coupling strengths in response to new observations (Research-Program Goal #8).

      Target models: Qwen3.5-0.8B, google/gemma-4-E4B-it

      EXISTING CODE TO READ FIRST:
      - python/carnot/models/ising.py — IsingModel (static energy)
      - python/carnot/pipeline/agentic.py — ConstraintState, propagate() (Exp 99)
      - python/carnot/core/energy.py — EnergyFunction protocol
      - python/carnot/training/contrastive_divergence.py — CD training

      TASK: Create python/carnot/models/lnn_constraint.py

      CONCRETE STEPS:
      1. Create python/carnot/models/lnn_constraint.py:
         a. LNNConstraintModel implementing EnergyFunction protocol:
            - Based on Liquid Time-Constant Networks (LTCN):
              * Gate: input-dependent time constant τ(x) = τ_base / (1 + W_gx · x)
              * Memory: hidden state h(t) evolves as dh/dt = (1/τ(x)) × (-h + W · x)
              * Output: energy computed from evolved hidden state
            - adapt(observation): update coupling strengths based on new observation
            - reset(): reset to initial coupling strengths
            - train_cd(data, n_epochs, lr): CD training with LTC forward pass

      2. Create tests/python/test_lnn_constraint.py:
         a. LNN forward pass produces finite energy
         b. Adaptation changes energy values meaningfully (>10% change)
         c. Reset returns to initial energy values
         d. Training via CD converges
         e. Every test references REQ-CORE-001 or SCENARIO-CORE-001

      3. Create scripts/experiment_116_lnn_adaptive.py:
         a. 20 synthetic 5-step reasoning chains (10 correct, 10 with errors at step 2-4)
         b. Process full chain with both LNN and Ising models
         c. LNN adapts between steps, Ising does not
         d. Measure: which model detects errors faster/better?
         e. Track: energy evolution across steps for LNN vs static for Ising

      4. Save results to {project_root}/results/experiment_116_results.json

      5. Run: JAX_PLATFORMS=cpu .venv/bin/pytest tests/python/test_lnn_constraint.py -q
      6. Run: JAX_PLATFORMS=cpu .venv/bin/pytest tests/python -q
      7. Run: JAX_PLATFORMS=cpu .venv/bin/python scripts/experiment_116_lnn_adaptive.py
      8. Do NOT push. Do NOT modify scripts/research_conductor.py.

