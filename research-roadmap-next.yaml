  # ── Phase 54: Checkpoint Cleanup ─────────────────────────────
  - id: exp190-checkpoint-cleanup
    milestone: "2026.04.14"
    deliverable: scripts/experiment_190_checkpoint_cleanup.py
    title: "Exp 190: Clean up partial checkpoint results from Exp 181-183"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: Experiments 181-183 (live GPU benchmarks) partially ran but
      failed to complete. They left checkpoint files that need cleanup.

      EXISTING CODE TO READ FIRST:
      - results/exp181_ckpt_Qwen3.5-0.8B.json — Exp 181 partial (empty)
      - results/exp182_ckpt_Qwen3.5-0.8B_control_baseline.json — 250 questions
      - results/exp182_ckpt_Qwen3.5-0.8B_control_repair.json — 250 questions
      - results/exp182_ckpt_Qwen3.5-0.8B_control_verify.json — 250 questions
      - results/exp183_ckpt.json — Exp 183 partial (empty)

      TASK: Create scripts/experiment_190_checkpoint_cleanup.py

      CONCRETE STEPS:
      1. Read each checkpoint file
      2. Validate: are the results from live inference or simulated fallback?
         (check for inference_mode, model_name, or response quality indicators)
      3. If valid live data: consolidate into proper results/experiment_NNN_results.json
      4. If simulated/empty: delete the checkpoint files
      5. Report what was salvaged vs discarded
      6. Run: .venv/bin/python scripts/experiment_190_checkpoint_cleanup.py
      7. Do NOT push. Do NOT modify scripts/research_conductor.py.

