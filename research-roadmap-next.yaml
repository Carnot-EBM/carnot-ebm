      - python/carnot/pipeline/tracker.py — ConstraintTracker (Exp 132)
      - python/carnot/pipeline/adaptive.py — AdaptiveWeighter (Exp 133)

      TASK: Create scripts/experiment_136_cross_session.py

      CONCRETE STEPS:
      1. Session 1: verify 200 arithmetic questions, build memory + tracker
      2. Save memory and tracker to disk
      3. Session 2: load memory, verify 200 NEW arithmetic questions
      4. Session 3: verify 200 mixed domain (arithmetic + logic + code)
      5. Metrics per session:
         - Accuracy (with vs without memory)
         - Number of additional constraints suggested by memory
         - Time to first correct repair (does memory speed up repair?)
      6. Key question: does domain-specific memory help cross-domain?
      7. Save to results/experiment_136_results.json
      8. Run: JAX_PLATFORMS=cpu .venv/bin/python scripts/experiment_136_cross_session.py
      9. Do NOT push. Do NOT modify scripts/research_conductor.py.

