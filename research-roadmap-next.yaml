  # ── Phase 13: Extract Pipeline Library ───────────────────────
  - id: exp74-constraint-extractor-api
    milestone: "2026.04.4"
    deliverable: python/carnot/pipeline/extract.py
    title: "Exp 74: Unified ConstraintExtractor API"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: Constraint extraction logic is scattered across experiment scripts
      (exp 47, 48, 49). This task extracts it into a clean, importable library
      with a pluggable per-domain architecture. This is the FOUNDATION for the
      production pipeline — everything else builds on this.

      EXISTING CODE TO READ FIRST:
      - scripts/experiment_47_llm_self_constraints.py — LLM self-constraint extraction
      - scripts/experiment_48_code_constraints.py — AST-based code constraint extraction
      - scripts/experiment_49_nl_constraints.py — NL pattern-based constraint extraction
      - python/carnot/verify/constraint.py — ComposedEnergy, ConstraintTerm protocol
      - python/carnot/verify/__init__.py — current exports

      TASK: Create python/carnot/pipeline/ package with extract.py

      CONCRETE STEPS:
      1. Create python/carnot/pipeline/__init__.py (export key classes)

      2. Create python/carnot/pipeline/extract.py with:
         a. ConstraintExtractor Protocol:
            - extract(text: str, domain: str | None = None) -> list[ConstraintResult]
            - supported_domains: list[str] property

         b. ConstraintResult dataclass:
            - constraint_type: str (e.g., "arithmetic", "type_check", "bound")
            - description: str (human-readable)
            - energy_term: ConstraintTerm | None (for Ising verification)
            - metadata: dict (domain-specific details)

         c. ArithmeticExtractor:
            - Parse "X + Y = Z" style claims from text
            - Verify arithmetic correctness
            - Return ConstraintResult with pass/fail

         d. CodeExtractor:
            - Parse Python code blocks from text
            - Extract type annotations, bounds, returns via ast module
            - Reuse logic from experiment_48 but as clean methods

         e. LogicExtractor:
            - Parse "If P then Q" style claims
            - Check logical consistency (premises vs conclusion)
            - Reuse logic from experiment_47

         f. NLExtractor:
            - Parse factual claims (named entities, quantities)
            - Pattern-based extraction from experiment_49

         g. AutoExtractor:
            - Combines all extractors, auto-detects domain
            - extract() tries each extractor, returns merged results

      3. Create tests/python/test_pipeline_extract.py:
         - Test each extractor independently
         - Test AutoExtractor combines results
         - Test with edge cases: empty text, no constraints found, malformed input
         - Every test must reference REQ-VERIFY-* or SCENARIO-VERIFY-*

      4. Update python/carnot/pipeline/__init__.py to export:
         AutoExtractor, ArithmeticExtractor, CodeExtractor, LogicExtractor, NLExtractor

      5. Run: JAX_PLATFORMS=cpu .venv/bin/pytest tests/python -q
      6. Do NOT push. Do NOT modify scripts/research_conductor.py.

  - id: exp75-verify-repair-pipeline
    milestone: "2026.04.4"
    deliverable: python/carnot/pipeline/verify_repair.py
    title: "Exp 75: VerifyRepairPipeline class"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: The verify-repair loop works (exp 57) but lives in a script.
      This task creates the main user-facing API: a single class that wires
      constraint extraction, Ising verification, and LLM repair into one call.
      This is THE product — the class users will import and use.

      EXISTING CODE TO READ FIRST:
      - python/carnot/pipeline/extract.py — ConstraintExtractor (created in exp 74)
      - scripts/experiment_57_verify_repair_loop.py — verify-repair loop logic
      - scripts/experiment_56_live_llm_pipeline.py — LLM integration
      - python/carnot/verify/constraint.py — ComposedEnergy, repair()
      - python/carnot/samplers/parallel_ising.py — ParallelIsingSampler

      TASK: Create python/carnot/pipeline/verify_repair.py

      CONCRETE STEPS:
      1. Create VerificationResult dataclass:
         - verified: bool
         - constraints: list[ConstraintResult]
         - energy: float
         - violations: list[ConstraintResult] (subset that failed)
         - certificate: dict (full energy decomposition)

      2. Create RepairResult dataclass:
         - initial_response: str
         - final_response: str
         - verified: bool
         - repaired: bool (True if final != initial and now verified)
         - iterations: int
         - history: list[VerificationResult] (per-iteration)

      3. Create VerifyRepairPipeline class:
         - __init__(self, model: str | None = None, domains: list[str] | None = None,
                    max_repairs: int = 3, extractor: ConstraintExtractor | None = None)
         - If model is provided, load via transformers (AutoModelForCausalLM)
         - If model is None, pipeline works in "verify-only" mode (user provides responses)
         - Default extractor: AutoExtractor

         Methods:
         a. verify(question: str, response: str, domain: str | None = None) -> VerificationResult
            - Extract constraints from response
            - Build ComposedEnergy from constraint terms
            - Return verification result

         b. verify_and_repair(question: str, response: str | None = None,
                              domain: str | None = None) -> RepairResult
            - If response is None and model is loaded, generate response
            - Verify response
            - If violations found AND model is loaded: format violations as feedback,
              regenerate, re-verify (up to max_repairs)
            - If violations found but no model: return with repaired=False
            - Return full repair history

         c. extract_constraints(text: str, domain: str | None = None) -> list[ConstraintResult]
            - Convenience method, delegates to extractor

      4. Create tests/python/test_pipeline_verify_repair.py:
         - Test verify() with correct and incorrect responses
         - Test verify_and_repair() without model (verify-only mode)
         - Test verify_and_repair() with mock model (patch transformers)
         - Test pipeline with each domain
         - Test edge cases: no constraints extracted, all constraints pass, empty response

      5. Update python/carnot/pipeline/__init__.py to export VerifyRepairPipeline

      6. Run: JAX_PLATFORMS=cpu .venv/bin/pytest tests/python -q
      7. Do NOT push. Do NOT modify scripts/research_conductor.py.

