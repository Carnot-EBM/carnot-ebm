# Carnot Research Roadmap — Milestone 2026.04.16
# "Scale What Works: PBT Code Verification, FPGA Ising, Production Path"
#
# CONTEXT: Milestone 2026.04.15 established that:
# - Code verification via execution is our ONLY positive live result (+3.3pp HumanEval)
# - Arithmetic constraint extraction doesn't catch IT model errors (semantic gap)
# - Free-form reasoning prompts are best for monitorability (100% parseable)
# - Property-Based Testing shows 23-37% improvement on code benchmarks (arxiv 2506.18315)
# - KV260 FPGA should have arrived — ready for Ising sampler prototype
#
# This milestone doubles down on what works (code verification) and adds hardware.

milestone: "2026.04.16"
milestone_title: "Scale What Works: PBT Code Verification, FPGA Ising, Production Path"
milestone_doc: "openspec/change-proposals/research-roadmap-v21.md"

tasks:
  # ── Phase 70: Property-Based Code Verification (strongest result) ──
  - id: exp224-pbt-code-extractor
    milestone: "2026.04.16"
    deliverable: results/experiment_224_results.json
    title: "Exp 224: Property-based test generation for code verification"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: Our best live result is Exp 208: HumanEval 16.7% -> 20.0% (+3.3pp)
      using basic execution testing. The paper "Property-Generated Solver"
      (arxiv 2506.18315) showed 23-37% improvement using property-based testing
      instead of example-based testing. We should integrate PBT into our pipeline.

      EXISTING CODE TO READ FIRST:
      - python/carnot/pipeline/extract.py — CodeExtractor
      - python/carnot/verify/property_test.py — existing property testing
      - python/carnot/pipeline/humaneval_live_benchmark.py — Exp 208 harness

      TASK: Create python/carnot/pipeline/pbt_code_verifier.py

      CONCRETE STEPS:
      1. Create PBTCodeVerifier that:
         a. Takes LLM-generated code
         b. Generates property-based tests (invariants, edge cases, type checks)
         c. Uses hypothesis library for PBT test generation
         d. Runs PBT tests against the generated code
         e. Returns ConstraintResults with violation details
      2. Integrate with VerifyRepairPipeline as a new code verification path
      3. Test on 5 HumanEval problems to validate the approach
      4. Compare: basic execution vs PBT on the same problems
      5. Write tests achieving 100% coverage
      6. Run: .venv/bin/pytest tests/python -q
      7. Do NOT push. Do NOT modify scripts/research_conductor.py.

  # ── Phase 69: Infrastructure Acceleration ──
  - id: exp224a-warm-model-server
    milestone: "2026.04.16"
    deliverable: python/carnot/inference/model_server.py
    title: "Exp 224a: Warm model server — persistent GPU models with batched inference"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: Every experiment cold-loads models (~3s each, 400 times in
      Exp 219). We also process 1 question at a time when GPUs can batch
      8-16 questions per forward pass for 4-8x throughput.

      EXISTING CODE TO READ FIRST:
      - python/carnot/inference/model_loader.py — current model loading
      - python/carnot/pipeline/dual_model_harness.py — Exp 218 harness

      TASK: Create python/carnot/inference/model_server.py

      CONCRETE STEPS:
      1. Create ModelServer that:
         a. Loads models once and keeps them warm on GPU
         b. Accepts inference requests via a queue (multiprocessing or threading)
         c. Batches multiple questions into a single forward pass
         d. Returns results per-question from the batched output
         e. Configurable batch size (default 8, max 16)
         f. Graceful shutdown: releases GPU memory on exit
         g. Health check: reports loaded models, GPU memory, batch stats
      2. Create a context manager API:
         with ModelServer(["Qwen/Qwen3.5-0.8B", "google/gemma-4-E4B-it"]) as server:
             results = server.generate_batch(questions, model="Qwen/Qwen3.5-0.8B")
      3. Update model_loader.py to optionally connect to a running ModelServer
         instead of loading a fresh model each time
      4. Benchmark: cold-load vs warm-server on 50 questions (measure speedup)
      5. Write tests (mock GPU for CI)
      6. Run: .venv/bin/pytest tests/python -q
      7. Do NOT push. Do NOT modify scripts/research_conductor.py.

  - id: exp224b-dual-gpu-parallel
    milestone: "2026.04.16"
    deliverable: python/carnot/inference/dual_gpu.py
    title: "Exp 224b: Dual-GPU parallel inference — run both models simultaneously"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: We have 2x RTX 3090 (24GB each). Our benchmarks run Qwen on
      GPU 0 then Gemma on GPU 1 SEQUENTIALLY. Exp 219 took 90 min. Running
      both models in parallel would halve wall time to ~45 min.

      For small models (0.8B-4B), each fits on one GPU. For larger models
      (7B+), use device_map="auto" to split layers across both GPUs.

      EXISTING CODE TO READ FIRST:
      - python/carnot/inference/model_loader.py — current model loading
      - python/carnot/pipeline/dual_model_harness.py — Exp 218 harness
      - scripts/experiment_218_live_dual_model_suite.py — benchmark runner

      TASK: Create python/carnot/inference/dual_gpu.py

      CONCRETE STEPS:
      1. Create DualGPURunner that:
         a. Assigns model A to cuda:0, model B to cuda:1
         b. Runs inference on both models in parallel (threading/asyncio)
         c. Collects results from both into unified format
         d. For large models: falls back to device_map="auto" across both GPUs
      2. Update the Exp 218 harness to use DualGPURunner when 2 GPUs detected
      3. Add --parallel flag to the benchmark CLI
      4. Benchmark: sequential vs parallel wall time on 10 questions
      5. Write tests (mock GPU for CI, real GPU for local)
      6. Run: .venv/bin/pytest tests/python -q
      7. Do NOT push. Do NOT modify scripts/research_conductor.py.

