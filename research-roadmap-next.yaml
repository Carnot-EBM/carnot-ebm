  # ── Phase 17: Differentiable Constraint Reasoning ──────────────
  - id: exp66-differentiable-constraints
    milestone: "2026.04.5"
    deliverable: scripts/experiment_66_differentiable_constraints.py
    title: "Exp 66: End-to-end differentiable constraint reasoning"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: This experiment has been deferred from v8 and v9. The prerequisites
      are now met: Exp 64 proved continuous Ising relaxation works (sigmoid annealing,
      penalty, straight-through), and Exp 65 proved embedding-space constraint
      verification works (joint Gibbs EBM on semantic + constraint vectors). This
      experiment combines them into a single end-to-end differentiable verification
      forward pass. This is the foundation for Phase 17 — everything in experiments
      86 and 87 builds on this.

      Target models: Qwen3.5-0.8B, google/gemma-4-E4B-it

      EXISTING CODE TO READ FIRST:
      - scripts/experiment_64_continuous_ising.py — continuous relaxation (sigmoid annealing, penalty, STE)
      - scripts/experiment_65_embedding_constraints.py — embedding-space joint EBM
      - python/carnot/pipeline/extract.py — ConstraintExtractor, AutoExtractor
      - python/carnot/pipeline/verify_repair.py — VerifyRepairPipeline
      - python/carnot/verify/constraint.py — ComposedEnergy, ConstraintTerm
      - python/carnot/samplers/parallel_ising.py — ParallelIsingSampler

      TASK: Create scripts/experiment_66_differentiable_constraints.py

      CONCRETE STEPS:
      1. Create a DifferentiableVerifier class in the experiment script:
         a. Input: text response → sentence embedding (all-MiniLM-L6-v2, 384-dim)
            + constraint features (N-dim from AutoExtractor)
         b. Continuous Ising layer: relax binary spins to [0,1], compute energy
            via JAX (fully differentiable — no discrete sampling)
         c. Joint embedding-constraint energy: small 2-layer MLP on concatenated
            [embedding; constraint_satisfaction; relaxed_spins] vector
         d. Single forward pass: text → embedding → constraints → continuous Ising
            → joint energy → verification score

      2. Training loop:
         a. Load Exp 58 multi-domain benchmark data (500 Q/A pairs from
            scripts/experiment_58_multi_domain_benchmark.py output, or generate
            synthetic if not available)
         b. Labels: correct answer = low energy, wrong answer = high energy
         c. Loss: binary cross-entropy on verification score
         d. Optimizer: Adam with JAX, learning rate sweep [1e-4, 1e-3, 1e-2]
         e. Train/val/test split: 60/20/20

      3. Evaluation:
         a. AUROC on test set (differentiable verifier vs discrete pipeline)
         b. Gradient stability: track gradient norms across training
         c. Ablation: continuous Ising only vs embedding only vs joint
         d. Per-domain breakdown (arithmetic, code, logic, factual, scheduling)

      4. Save results to {project_root}/results/experiment_66_results.json

      5. Run: JAX_PLATFORMS=cpu .venv/bin/python scripts/experiment_66_differentiable_constraints.py
      6. Do NOT push. Do NOT modify scripts/research_conductor.py.

  - id: exp86-learned-energy-weights
    milestone: "2026.04.5"
    deliverable: scripts/experiment_86_learned_energy_weights.py
    title: "Exp 86: Learned energy composition weights"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: ComposedEnergy currently uses uniform weights (all 1.0) for each
      constraint term. Different constraint types (arithmetic, type_check, bound,
      logical) likely have different importance for verification accuracy. This
      experiment auto-tunes the weights via gradient descent on validation accuracy,
      using the differentiable pipeline from Exp 66.

      Target models: Qwen3.5-0.8B, google/gemma-4-E4B-it

      EXISTING CODE TO READ FIRST:
      - scripts/experiment_66_differentiable_constraints.py — differentiable verifier (Exp 66)
      - python/carnot/verify/constraint.py — ComposedEnergy (weights attribute)
      - python/carnot/pipeline/extract.py — constraint types (arithmetic, code, logic, NL)
      - python/carnot/pipeline/verify_repair.py — VerifyRepairPipeline

      TASK: Create scripts/experiment_86_learned_energy_weights.py

      CONCRETE STEPS:
      1. Create a LearnedComposedEnergy class:
         a. Subclass or wrap ComposedEnergy
         b. Weights are JAX parameters (trainable via grad)
         c. Forward: weighted sum of constraint energies (differentiable)

      2. Training:
         a. Generate 500 (question, response, correct/wrong) tuples across 5 domains
            using simulated responses (no LLM needed — use benchmark data)
         b. Extract constraints via AutoExtractor for each response
         c. Build LearnedComposedEnergy with one weight per constraint TYPE
            (not per instance)
         d. Loss: binary cross-entropy (correct=low energy, wrong=high energy)
         e. Optimizer: Adam, 100 epochs, lr=1e-3
         f. Train/val split: 80/20

      3. Evaluation:
         a. Compare uniform vs learned weights: verification AUROC on held-out set
         b. Compare per-domain learned weights: train separate weights per domain
         c. Print learned weight values — which constraint types matter most?
         d. Statistical significance: bootstrap 95% CI on AUROC difference

      4. Save results to {project_root}/results/experiment_86_results.json

      5. Run: JAX_PLATFORMS=cpu .venv/bin/python scripts/experiment_86_learned_energy_weights.py
      6. Do NOT push. Do NOT modify scripts/research_conductor.py.

  - id: exp87-gradient-repair
    milestone: "2026.04.5"
    deliverable: scripts/experiment_87_gradient_repair.py
    title: "Exp 87: Gradient-based repair in continuous constraint space"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: The current repair loop (Exp 57/75) is discrete: detect violation →
      format feedback text → re-prompt LLM → re-verify. This is slow (requires LLM
      inference per iteration) and limited (LLM may not fix the right thing). This
      experiment tries continuous repair: embed the response, gradient-descend on
      constraint energy in embedding space, then decode the repaired embedding back
      to text via nearest-neighbor lookup. If this works, repair becomes instant
      (no LLM call needed).

      Target models: Qwen3.5-0.8B, google/gemma-4-E4B-it

      EXISTING CODE TO READ FIRST:
      - scripts/experiment_66_differentiable_constraints.py — differentiable verifier
      - scripts/experiment_65_embedding_constraints.py — embedding-space verification
      - python/carnot/verify/constraint.py — gradient_repair() function
      - python/carnot/pipeline/verify_repair.py — VerifyRepairPipeline (discrete repair)

      TASK: Create scripts/experiment_87_gradient_repair.py

      CONCRETE STEPS:
      1. Build a GradientRepairer class:
         a. Embed response text via sentence-transformers (all-MiniLM-L6-v2)
         b. Extract constraint features via AutoExtractor
         c. Concatenate [embedding; constraint_vector] as initial state
         d. Gradient descent: minimize constraint energy w.r.t. embedding
            (freeze constraint weights, only update the embedding)
         e. Project repaired embedding back to text: build a codebook of 1000
            candidate response embeddings, return nearest neighbor
         f. Step size, max iterations, convergence threshold as hyperparameters

      2. Evaluation:
         a. Generate 100 incorrect responses across 5 domains
         b. Compare: gradient repair vs discrete repair (Exp 57) vs combined
         c. Metrics: repair success rate, iterations needed, wall-clock time
         d. Ablation: different step sizes [0.01, 0.1, 1.0], max iters [10, 50, 100]

      3. Codebook construction:
         a. For each question, generate 20 candidate responses (paraphrases, variations)
         b. Embed all candidates
         c. After gradient repair, find nearest candidate in embedding space
         d. Verify the decoded candidate — does it pass constraints?

      4. Save results to {project_root}/results/experiment_87_results.json

      5. Run: JAX_PLATFORMS=cpu .venv/bin/python scripts/experiment_87_gradient_repair.py
      6. Do NOT push. Do NOT modify scripts/research_conductor.py.

  # ── Phase 18: Self-Improving Constraint Pipeline ───────────────
  - id: exp88-failure-mining
    milestone: "2026.04.5"
    deliverable: python/carnot/pipeline/mining.py
    title: "Exp 88: Failure-driven constraint mining"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: The verify-repair pipeline catches hallucinations only when constraint
      extractors recognize the relevant claim type. Exp 57 found that constraint
      COVERAGE is the bottleneck — only 1/6 wrong answers triggered violations. This
      experiment analyzes pipeline failures to discover what types of claims we're
      MISSING, and proposes new extraction patterns to cover them. This is the first
      step toward FR-11 (autonomous self-improvement): the pipeline identifies its
      own weaknesses.

      EXISTING CODE TO READ FIRST:
      - python/carnot/pipeline/extract.py — current extractors (Arithmetic, Code, Logic, NL)
      - scripts/experiment_58_multi_domain_benchmark.py — multi-domain benchmark
      - scripts/experiment_73_constraint_coverage.py — coverage metric
      - scripts/experiment_57_verify_repair_loop.py — verify-repair with failure cases

      TASK: Create python/carnot/pipeline/mining.py + experiment script

      CONCRETE STEPS:
      1. Create python/carnot/pipeline/mining.py with FailureAnalyzer class:
         a. analyze(questions, responses, ground_truth, pipeline) -> FailureReport
         b. For each false negative (wrong answer that pipeline said was correct):
            - What claims in the response were NOT extracted as constraints?
            - Categorize uncovered claims: arithmetic_chain, implicit_logic,
              world_knowledge, code_semantics, comparison, negation
            - Score each category by frequency
         c. FailureReport dataclass: false_negatives, category_counts,
            suggested_patterns (regex/AST patterns for top 3 categories)

      2. Create scripts/experiment_88_failure_mining.py:
         a. Generate 200 questions across 5 domains with known-wrong responses
         b. Run through VerifyRepairPipeline in verify-only mode
         c. Identify false negatives (wrong but pipeline said verified)
         d. Run FailureAnalyzer to categorize and suggest patterns
         e. Test suggested patterns on the false negatives — what % would they catch?
         f. Report: top failure categories, suggested patterns, coverage improvement

      3. Create tests/python/test_pipeline_mining.py:
         - Test FailureAnalyzer with known failure cases
         - Test category classification
         - Every test references REQ-VERIFY-* or SCENARIO-VERIFY-*

      4. Update python/carnot/pipeline/__init__.py to export FailureAnalyzer

      5. Save results to {project_root}/results/experiment_88_results.json

      6. Run: JAX_PLATFORMS=cpu .venv/bin/pytest tests/python -q
      7. Run: JAX_PLATFORMS=cpu .venv/bin/python scripts/experiment_88_failure_mining.py
      8. Do NOT push. Do NOT modify scripts/research_conductor.py.

  - id: exp89-self-bootstrap
    milestone: "2026.04.5"
    deliverable: scripts/experiment_89_self_bootstrap.py
    title: "Exp 89: Self-bootstrapped constraint training"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: The pipeline can verify LLM outputs. When it verifies many outputs,
      it generates (question, response, verified, constraints) tuples — this is
      LABELED DATA for free. This experiment uses the pipeline's own verified outputs
      as training data to train BETTER Ising models. If it works, the pipeline
      improves itself without human labeling. This is the core of FR-11: the energy
      function IS the objective truth, and improvements either lower energy on
      held-out data or they don't.

      Target models: Qwen3.5-0.8B, google/gemma-4-E4B-it

      EXISTING CODE TO READ FIRST:
      - scripts/experiment_62_domain_constraint_learning.py — domain CD training (10K triples)
      - scripts/experiment_50_learn_ising.py — basic CD training
      - python/carnot/pipeline/verify_repair.py — VerifyRepairPipeline
      - python/carnot/pipeline/extract.py — AutoExtractor
      - python/carnot/training/contrastive_divergence.py — JAX CD implementation

      TASK: Create scripts/experiment_89_self_bootstrap.py

      CONCRETE STEPS:
      1. Data collection phase:
         a. Generate 1000 questions (200 per domain: arithmetic, code, logic,
            factual, scheduling) — use the benchmark generator from Exp 58
         b. For each question, generate a correct and incorrect response
            (use templates, not LLM — deterministic and fast)
         c. Run each through VerifyRepairPipeline.verify() to get constraint features
         d. Encode each response as a binary feature vector (200+ dims):
            - Per-constraint pass/fail flags
            - Constraint type indicators
            - Energy quantization bins
            - Domain indicators

      2. Training phase:
         a. Split: 70% train, 15% val, 15% test
         b. Train discriminative Ising via CD (like Exp 62):
            - Positive: verified-correct responses (low energy target)
            - Negative: verified-wrong responses (high energy target)
         c. Train per-domain and combined models
         d. Hyperparameters: CD-k={1,5,10}, lr={0.01,0.001}, L1 reg={0.0,0.01}

      3. Evaluation:
         a. AUROC on test set: self-bootstrapped vs Exp 62 models vs random
         b. Per-domain breakdown
         c. Compare: does training on pipeline outputs match training on ground truth?
         d. Ablation: how much training data is enough? (100, 300, 500, 1000 samples)

      4. Save results to {project_root}/results/experiment_89_results.json

      5. Run: JAX_PLATFORMS=cpu .venv/bin/python scripts/experiment_89_self_bootstrap.py
      6. Do NOT push. Do NOT modify scripts/research_conductor.py.

