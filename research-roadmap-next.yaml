  - id: exp92-math-benchmark
    milestone: "2026.04.5"
    deliverable: scripts/experiment_92_math_benchmark.py
    title: "Exp 92: MATH benchmark subset with CoT constraint tracing"
    prompt: |
      You are working on the Carnot EBM framework in {project_root}.
      Read CLAUDE.md for code style requirements.

      CONTEXT: GSM8K tests single-step arithmetic. MATH problems require multi-step
      reasoning chains where errors compound. This experiment tests whether
      step-by-step constraint verification catches intermediate errors that
      final-answer-only verification misses. The key insight: verify EACH reasoning
      step, not just the conclusion.

      Target models: Qwen3.5-0.8B, google/gemma-4-E4B-it

      EXISTING CODE TO READ FIRST:
      - scripts/experiment_91_gsm8k_live.py — GSM8K benchmark setup (Exp 91)
      - python/carnot/pipeline/extract.py — ArithmeticExtractor
      - python/carnot/pipeline/verify_repair.py — VerifyRepairPipeline
      - scripts/experiment_42c_arithmetic_carry_fix.py — carry chain verification

      TASK: Create scripts/experiment_92_math_benchmark.py

      CONCRETE STEPS:
      1. Load MATH dataset:
         a. Try: `from datasets import load_dataset; ds = load_dataset("lighteval/MATH", split="test")`
         b. Filter to Level 1-3 (easier) and algebra/number_theory subjects
         c. Select 100 problems
         d. If not available, create 100 multi-step algebra problems with known solutions

      2. Chain-of-thought generation:
         a. Prompt each model with "Solve step by step: {problem}"
         b. Parse response into reasoning steps (split on newlines, "Step N:", etc.)
         c. Extract the final answer (boxed or last numerical value)

      3. Step-level verification:
         a. For EACH reasoning step, extract arithmetic constraints
            (e.g., "3x + 5 = 20" → verify x = 5)
         b. Verify step-by-step: does each intermediate claim hold?
         c. Track: which step FIRST introduces an error?
         d. Compare: step-level verification vs final-answer-only verification

      4. Metrics:
         a. End-to-end accuracy: final answer correct?
         b. Step-level error detection: at which step did we first flag an error?
         c. Error propagation: how many steps after first error before final answer?
         d. Coverage: what fraction of reasoning steps had extractable constraints?
         e. Per-model comparison: Qwen3.5 vs Gemma4

      5. Save results to {project_root}/results/experiment_92_results.json

      6. Run: JAX_PLATFORMS=cpu .venv/bin/python scripts/experiment_92_math_benchmark.py
      7. Do NOT push. Do NOT modify scripts/research_conductor.py.

