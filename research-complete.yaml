- id: 2026.04.1
  title: Constraint-Based Reasoning via Ising/thrml
  doc: openspec/change-proposals/research-roadmap-v6.md
  completed: '2026-04-09'
  finding: 'Ising constraint verification works: 10/10 hallucination detection,

    5000-var SAT in 0.7s, CD training generalizes. Parallel sampler 183x faster

    than thrml. Pipeline validated on arithmetic, logic, code, NL, scheduling.

    '
  tasks:
  - id: exp42b-arithmetic-qubo
    title: 'Exp 42b: Arithmetic QUBO encoding'
    deliverable: scripts/experiment_42b_arithmetic_qubo.py
    result: 8/12 correct (carry chains fail)
  - id: exp42c-carry-chain-fix
    title: 'Exp 42c: Deterministic carry chain verification'
    deliverable: scripts/experiment_42c_arithmetic_carry_fix.py
    result: 16/16 perfect
  - id: exp44-scheduling
    title: 'Exp 44: Scheduling constraints'
    deliverable: scripts/experiment_44_scheduling_constraints.py
    result: OK (conductor)
  - id: exp45-logical-consistency
    title: 'Exp 45: Logical consistency verification'
    deliverable: scripts/experiment_45_logical_consistency.py
    result: 8/8 perfect
  - id: exp46b-scale-sat
    title: 'Exp 46b: Scale SAT to 5000 vars'
    deliverable: scripts/experiment_46b_scale_sat_parallel.py
    result: 93.7% in 0.7s at 5000 vars (+5.5% vs random)
  - id: exp47-llm-self-constraints
    title: 'Exp 47: LLM self-constraint extraction'
    deliverable: scripts/experiment_47_llm_self_constraints.py
    result: 10/10 perfect
  - id: exp48-code-constraints
    title: "Exp 48: Code \u2192 constraint extraction"
    deliverable: scripts/experiment_48_code_constraints.py
    result: OK (conductor)
  - id: exp49-nl-constraints
    title: "Exp 49: NL \u2192 constraint extraction"
    deliverable: scripts/experiment_49_nl_constraints.py
    result: OK (conductor)
  - id: exp50-learn-ising
    title: 'Exp 50: Learn SAT couplings via CD'
    deliverable: scripts/experiment_50_learn_ising.py
    result: 89/100 perfect, generalizes
  - id: exp51-learn-from-llm
    title: 'Exp 51: Learn from LLM (correct/wrong) pairs'
    deliverable: scripts/experiment_51_learn_from_llm.py
    result: OK (conductor)
  - id: exp52-transfer-ising
    title: 'Exp 52: Transfer Ising across domains'
    deliverable: scripts/experiment_52_transfer_ising.py
    result: OK (conductor)
  - id: parallel-ising-sampler
    title: Parallel Ising Gibbs sampler
    deliverable: python/carnot/samplers/parallel_ising.py
    result: 183x faster than thrml (572x at 500 vars)
